<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volontari - Radio C.B. Lunigiana</title>
<style>
:root {
  --bg: #F2F2F7; --card: #FFFFFF; --text: #1C1C1E; --text-secondary: #8E8E93;
  --primary: #0A84FF; --green: #30D158; --red: #FF453A; --border: #E5E5EA;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 24px; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
h1 { font-size: 28px; font-weight: 700; }
.btn {
  background: var(--primary); color: white; border: none; padding: 12px 20px;
  border-radius: 12px; font-weight: 600; font-size: 14px; cursor: pointer;
}
.btn:hover { opacity: 0.85; }
.btn-secondary { background: var(--bg); color: var(--text); }
.card { background: var(--card); border-radius: 16px; padding: 24px; box-shadow: var(--shadow); }
.search-box {
  width: 100%; padding: 12px 16px; border: 1px solid var(--border);
  border-radius: 12px; font-size: 14px; margin-bottom: 20px;
}
table { width: 100%; border-collapse: collapse; }
th { text-align: left; font-size: 12px; font-weight: 600; color: var(--text-secondary); padding: 12px 0; text-transform: uppercase; border-bottom: 1px solid var(--border); }
td { padding: 16px 0; border-bottom: 1px solid var(--bg); font-size: 14px; }
tr:last-child td { border-bottom: none; }
.volontario-row { display: flex; align-items: center; gap: 12px; }
.volontario-avatar {
  width: 40px; height: 40px; border-radius: 10px;
  background: linear-gradient(135deg, var(--primary), #AF52DE);
  color: white; display: flex; align-items: center; justify-content: center;
  font-weight: 600; font-size: 14px;
}
.badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; }
.badge-green { background: rgba(48,209,88,0.1); color: var(--green); }
.badge-gray { background: var(--bg); color: var(--text-secondary); }
.actions { display: flex; gap: 8px; }
.btn-icon {
  width: 32px; height: 32px; border-radius: 8px; border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { background: var(--bg); }
.modal {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4); z-index: 1000; align-items: center; justify-content: center;
}
.modal.show { display: flex; }
.modal-content {
  background: var(--card); border-radius: 20px; padding: 32px;
  width: 90%; max-width: 500px;
}
.modal-title { font-size: 20px; font-weight: 700; margin-bottom: 24px; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; }
.form-group input, .form-group select {
  width: 100%; padding: 12px; border: 1px solid var(--border);
  border-radius: 12px; font-size: 14px;
}
.modal-actions { display: flex; gap: 12px; margin-top: 24px; }
.empty { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
</style>
</head>
<body>

<div class="header">
  <h1>Volontari</h1>
  <button class="btn" onclick="apriModalVolontario()">+ Nuovo Volontario</button>
</div>

<div class="card">
  <input type="text" class="search-box" placeholder="Cerca volontario..." id="searchInput" onkeyup="filtraVolontari()">
  <table>
    <thead>
      <tr><th>Volontario</th><th>Email</th><th>Telefono</th><th>Stato</th><th>Azioni</th></tr>
    </thead>
    <tbody id="volontariTable"></tbody>
  </table>
</div>

<!-- Modal Nuovo Volontario -->
<div class="modal" id="modalVolontario">
  <div class="modal-content">
    <div class="modal-title">Nuovo Volontario</div>
    <div class="form-group">
      <label>Nome Completo *</label>
      <input type="text" id="volNome" placeholder="Mario Rossi">
    </div>
    <div class="form-group">
      <label>Email *</label>
      <input type="email" id="volEmail" placeholder="mario@email.it">
    </div>
    <div class="form-group">
      <label>Telefono</label>
      <input type="tel" id="volTelefono" placeholder="3331234567">
    </div>
    <div class="form-group">
      <label>Stato</label>
      <select id="volAttivo">
        <option value="true">Attivo</option>
        <option value="false">Non Attivo</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="chiudiModalVolontario()">Annulla</button>
      <button class="btn" onclick="salvaVolontario()">Salva Volontario</button>
    </div>
  </div>
</div>

<script>
let dbVolontari = JSON.parse(localStorage.getItem('pc_volontari_v4') || '[]');

function renderVolontari() {
  const filtro = document.getElementById('searchInput').value.toLowerCase();
  const volontari = dbVolontari.filter(v => 
    v.nome.toLowerCase().includes(filtro) || v.email.toLowerCase().includes(filtro)
  );

  const tbody = document.getElementById('volontariTable');
  if (volontari.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">Nessun volontario trovato</td></tr>';
    return;
  }

  tbody.innerHTML = volontari.map(v => `
    <tr>
      <td>
        <div class="volontario-row">
          <div class="volontario-avatar">${v.nome.split(' ').map(n=>n[0]).join('').substring(0,2)}</div>
          <span>${v.nome}</span>
        </div>
      </td>
      <td>${v.email}</td>
      <td>${v.telefono || '-'}</td>
      <td><span class="badge ${v.attivo? 'badge-green' : 'badge-gray'}">${v.attivo? 'Attivo' : 'Non Attivo'}</span></td>
      <td>
        <div class="actions">
          <button class="btn-icon" onclick="toggleStato(${v.id})" title="${v.attivo? 'Disattiva' : 'Attiva'}">
            ${v.attivo? '⏸️' : '▶️'}
          </button>
          <button class="btn-icon" onclick="eliminaVolontario(${v.id})" title="Elimina">🗑️</button>
        </div>
      </td>
    </tr>
  `).join('');
}

function apriModalVolontario() {
  document.getElementById('modalVolontario').classList.add('show');
}

function chiudiModalVolontario() {
  document.getElementById('modalVolontario').classList.remove('show');
  document.getElementById('volNome').value = '';
  document.getElementById('volEmail').value = '';
  document.getElementById('volTelefono').value = '';
}

function salvaVolontario() {
  const nome = document.getElementById('volNome').value.trim();
  const email = document.getElementById('volEmail').value.trim();
  const telefono = document.getElementById('volTelefono').value.trim();
  const attivo = document.getElementById('volAttivo').value === 'true';

  if (!nome ||!email) {
    alert('Compila nome ed email');
    return;
  }

  dbVolontari.push({ id: Date.now(), nome, email, telefono, attivo });
  localStorage.setItem('pc_volontari_v4', JSON.stringify(dbVolontari));
  chiudiModalVolontario();
  renderVolontari();
}

function toggleStato(id) {
  const v = dbVolontari.find(vol => vol.id === id);
  if (v) {
    v.attivo =!v.attivo;
    localStorage.setItem('pc_volontari_v4', JSON.stringify(dbVolontari));
    renderVolontari();
  }
}

function eliminaVolontario(id) {
  if (!confirm('Eliminare questo volontario?')) return;
  dbVolontari = dbVolontari.filter(v => v.id!== id);
  localStorage.setItem('pc_volontari_v4', JSON.stringify(dbVolontari));
  renderVolontari();
}

function filtraVolontari() {
  renderVolontari();
}

renderVolontari();
</script>

</body>
</html>
