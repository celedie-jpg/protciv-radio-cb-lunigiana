<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volontari - Radio C.B. Lunigiana</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100">

  <div class="lg:hidden bg-blue-900 text-white p-4 flex justify-between items-center fixed top-0 left-0 right-0 z-50">
    <button onclick="toggleMenu()" class="text-2xl"><i class="fas fa-bars"></i></button>
    <a href="index.html" class="flex items-center gap-2">
      <img src="https://i.imgur.com/8RvEWed.png" alt="Logo" class="w-8 h-8 rounded-full object-cover">
      <span class="font-bold text-sm">Radio C.B. Lunigiana</span>
    </a>
    <a href="login.html" class="text-xl"><i class="fas fa-sign-out-alt"></i></a>
  </div>

  <div id="sidebar" class="fixed left-0 top-0 h-full w-64 bg-blue-900 text-white transform -translate-x-full lg:translate-x-0 transition-transform duration-200 z-40 overflow-y-auto">
    <div class="p-5 border-b border-blue-800 mt-16 lg:mt-0 text-center">
      <a href="index.html">
        <img src="https://i.imgur.com/8RvEWed.png" alt="Logo" class="w-16 h-16 mx-auto mb-2 rounded-full object-cover hover:opacity-80">
        <h2 class="text-xl font-bold hover:text-blue-200">ProtCiv Manager</h2>
      </a>
    </div>
    <nav class="p-4">
      <a href="index.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-home w-5"></i> Dashboard</a>
      <a href="servizi.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-tasks w-5"></i> Servizi</a>
      <a href="volontari.html" class="flex items-center gap-3 p-3 rounded bg-blue-800 mb-2"><i class="fas fa-users w-5"></i> Volontari</a>
      <a href="mezzi.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-truck w-5"></i> Mezzi</a>
      <a href="attrezzature.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-walkie-talkie w-5"></i> Attrezzature</a>
      <a href="login.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mt-8"><i class="fas fa-sign-out-alt w-5"></i> Logout</a>
    </nav>
  </div>

  <div id="overlay" onclick="toggleMenu()" class="hidden fixed inset-0 bg-black bg-opacity-50 z-30 lg:hidden"></div>

  <div class="lg:ml-64 pt-20 lg:pt-8 p-4 lg:p-8">
    <div class="mb-4">
      <a href="index.html" class="inline-flex items-center gap-2 text-blue-600 hover:text-blue-800 font-semibold">
        <i class="fas fa-arrow-left"></i> Torna alla Dashboard
      </a>
    </div>

    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold text-gray-800">Gestione Volontari</h1>
      <button onclick="toggleForm()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold">
        <i class="fas fa-plus"></i> Nuovo Volontario
      </button>
    </div>

    <!-- Form Nuovo Volontario -->
    <div id="formVolontario" class="hidden bg-white rounded-lg shadow p-6 mb-6">
      <h3 class="font-bold text-lg mb-4" id="titoloForm">Nuovo Volontario</h3>
      <form onsubmit="salvaVolontario(event)">
        <input type="hidden" id="idVolontario">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-4">
          <input type="text" id="nome" placeholder="Nome *" required class="border p-2 rounded">
          <input type="text" id="cognome" placeholder="Cognome *" required class="border p-2 rounded">
          <input type="date" id="dataNascita" placeholder="Data Nascita" class="border p-2 rounded">
          <input type="text" id="codiceFiscale" placeholder="Codice Fiscale" class="border p-2 rounded uppercase">
          <input type="tel" id="telefono" placeholder="Telefono *" required class="border p-2 rounded">
          <input type="email" id="email" placeholder="Email" class="border p-2 rounded">
          <input type="text" id="indirizzo" placeholder="Indirizzo" class="border p-2 rounded">
          <input type="text" id="citta" placeholder="Città" class="border p-2 rounded">
          <select id="patente" class="border p-2 rounded">
            <option value="">Patente...</option>
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
            <option value="D">D</option>
            <option value="E">E</option>
          </select>
          <select id="gruppoSanguigno" class="border p-2 rounded">
            <option value="">Gruppo Sanguigno...</option>
            <option value="0+">0+</option><option value="0-">0-</option>
            <option value="A+">A+</option><option value="A-">A-</option>
            <option value="B+">B+</option><option value="B-">B-</option>
            <option value="AB+">AB+</option><option value="AB-">AB-</option>
          </select>
          <select id="taglia" class="border p-2 rounded">
            <option value="">Taglia Divisa...</option>
            <option value="XS">XS</option><option value="S">S</option><option value="M">M</option>
            <option value="L">L</option><option value="XL">XL</option><option value="XXL">XXL</option>
          </select>
          <input type="text" id="nominativo" placeholder="Nominativo Radio" class="border p-2 rounded">
          <select id="stato" required class="border p-2 rounded">
            <option value="Attivo">Attivo</option>
            <option value="Inattivo">Inattivo</option>
            <option value="Sospeso">Sospeso</option>
          </select>
        </div>
        <div class="flex gap-2">
          <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded font-bold">Salva</button>
          <button type="button" onclick="annullaForm()" class="bg-gray-400 text-white px-6 py-2 rounded">Annulla</button>
        </div>
      </form>
    </div>

    <!-- Lista Volontari -->
    <div id="listaVolontari" class="space-y-3"></div>
  </div>

  <script>
    function toggleMenu() {
      document.getElementById('sidebar').classList.toggle('-translate-x-full');
      document.getElementById('overlay').classList.toggle('hidden');
    }

    function toggleForm() {
      document.getElementById('formVolontario').classList.toggle('hidden');
      document.getElementById('titoloForm').textContent = 'Nuovo Volontario';
      document.querySelector('form').reset();
      document.getElementById('idVolontario').value = '';
    }

    function annullaForm() {
      document.getElementById('formVolontario').classList.add('hidden');
      document.querySelector('form').reset();
    }

    function salvaVolontario(e) {
      e.preventDefault();
      const volontari = JSON.parse(localStorage.getItem('volontari') || '[]');
      const id = document.getElementById('idVolontario').value;
      
      const dati = {
        id: id? parseInt(id) : Date.now(),
        nome: document.getElementById('nome').value,
        cognome: document.getElementById('cognome').value,
        dataNascita: document.getElementById('dataNascita').value,
        codiceFiscale: document.getElementById('codiceFiscale').value.toUpperCase(),
        telefono: document.getElementById('telefono').value,
        email: document.getElementById('email').value,
        indirizzo: document.getElementById('indirizzo').value,
        citta: document.getElementById('citta').value,
        patente: document.getElementById('patente').value,
        gruppoSanguigno: document.getElementById('gruppoSanguigno').value,
        taglia: document.getElementById('taglia').value,
        nominativo: document.getElementById('nominativo').value,
        stato: document.getElementById('stato').value
      };

      if (id) {
        const index = volontari.findIndex(v => v.id === parseInt(id));
        volontari[index] = dati;
      } else {
        volontari.push(dati);
      }
      
      localStorage.setItem('volontari', JSON.stringify(volontari));
      annullaForm();
      mostraVolontari();
    }

    function modificaVolontario(id) {
      const volontari = JSON.parse(localStorage.getItem('volontari') || '[]');
      const v = volontari.find(v => v.id === id);
      document.getElementById('idVolontario').value = v.id;
      document.getElementById('nome').value = v.nome;
      document.getElementById('cognome').value = v.cognome;
      document.getElementById('dataNascita').value = v.dataNascita;
      document.getElementById('codiceFiscale').value = v.codiceFiscale;
      document.getElementById('telefono').value = v.telefono;
      document.getElementById('email').value = v.email;
      document.getElementById('indirizzo').value = v.indirizzo;
      document.getElementById('citta').value = v.citta;
      document.getElementById('patente').value = v.patente;
      document.getElementById('gruppoSanguigno').value = v.gruppoSanguigno;
      document.getElementById('taglia').value = v.taglia;
      document.getElementById('nominativo').value = v.nominativo;
      document.getElementById('stato').value = v.stato;
      document.getElementById('titoloForm').textContent = 'Modifica Volontario';
      document.getElementById('formVolontario').classList.remove('hidden');
      window.scrollTo(0, 0);
    }

    function eliminaVolontario(id) {
      if (!confirm('Eliminare questo volontario?')) return;
      let volontari = JSON.parse(localStorage.getItem('volontari') || '[]');
      volontari = volontari.filter(v => v.id!== id);
      localStorage.setItem('volontari', JSON.stringify(volontari));
      mostraVolontari();
    }

    function mostraVolontari() {
      const volontari = JSON.parse(localStorage.getItem('volontari') || '[]');
      const lista = document.getElementById('listaVolontari');
      
      if (volontari.length === 0) {
        lista.innerHTML = `<div class="bg-white rounded-lg shadow p-8 text-center text-gray-500">
          <i class="fas fa-users text-5xl mb-3 text-gray-300"></i>
          <p class="text-lg">Nessun volontario inserito</p>
        </div>`;
        return;
      }

      lista.innerHTML = volontari.map(v => `
        <div class="bg-white rounded-lg shadow p-4">
          <div class="flex justify-between items-start mb-2">
            <div>
              <h3 class="font-bold text-lg">${v.nome} ${v.cognome}</h3>
              <span class="text-xs px-2 py-1 rounded ${v.stato === 'Attivo'? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">${v.stato}</span>
            </div>
            <div class="flex gap-2">
              <button onclick="modificaVolontario(${v.id})" class="text-blue-600 hover:text-blue-800"><i class="fas fa-edit"></i></button>
              <button onclick="eliminaVolontario(${v.id})" class="text-red-600 hover:text-red-800"><i class="fas fa-trash"></i></button>
            </div>
          </div>
          <div class="grid grid-cols-2 lg:grid-cols-4 gap-2 text-sm text-gray-600">
            <div><i class="fas fa-phone"></i> ${v.telefono}</div>
            ${v.email? `<div><i class="fas fa-envelope"></i> ${v.email}</div>` : ''}
            ${v.nominativo? `<div><i class="fas fa-walkie-talkie"></i> ${v.nominativo}</div>` : ''}
            ${v.patente? `<div><i class="fas fa-id-card"></i> Patente ${v.patente}</div>` : ''}
          </div>
        </div>
      `).join('');
    }

    mostraVolontari();
  </script>
</body>
</html>
