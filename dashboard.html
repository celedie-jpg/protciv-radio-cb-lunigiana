<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --bg: #F2F2F7; --card: #FFFFFF; --text: #1C1C1E; --text-secondary: #8E8E93;
  --primary: #0A84FF; --green: #30D158; --orange: #FF9F0A; --red: #FF453A;
  --purple: #AF52DE; --border: #E5E5EA; --shadow: 0 1px 3px rgba(0,0,0,0.06);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 24px; }
.header { margin-bottom: 24px; }
h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
.subtitle { font-size: 14px; color: var(--text-secondary); }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card {
  background: var(--card); border-radius: 16px; padding: 20px;
  box-shadow: var(--shadow); display: flex; align-items: center; gap: 16px;
}
.stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
.stat-icon.blue { background: rgba(10,132,255,0.1); }
.stat-icon.green { background: rgba(48,209,88,0.1); }
.stat-icon.orange { background: rgba(255,159,10,0.1); }
.stat-icon.purple { background: rgba(175,82,222,0.1); }
.stat-info { flex: 1; }
.stat-value { font-size: 28px; font-weight: 700; margin-bottom: 2px; }
.stat-label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; }
.charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 24px; }
.chart-card { background: var(--card); border-radius: 16px; padding: 24px; box-shadow: var(--shadow); }
.chart-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
.tables-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.table-card { background: var(--card); border-radius: 16px; padding: 24px; box-shadow: var(--shadow); }
.table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.table-title { font-size: 16px; font-weight: 600; }
.table-link { font-size: 13px; color: var(--primary); text-decoration: none; font-weight: 500; cursor: pointer; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; font-size: 11px; font-weight: 600; color: var(--text-secondary); padding: 8px 0; text-transform: uppercase; border-bottom: 1px solid var(--border); }
td { padding: 12px 0; border-bottom: 1px solid var(--bg); font-size: 13px; }
tr:last-child td { border-bottom: none; }
.volontario-row { display: flex; align-items: center; gap: 10px; }
.volontario-avatar {
  width: 32px; height: 32px; border-radius: 8px;
  background: linear-gradient(135deg, var(--primary), var(--purple));
  color: white; display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600;
}
.badge { display: inline-block; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 500; }
.badge-green { background: rgba(48,209,88,0.1); color: var(--green); }
.badge-orange { background: rgba(255,159,10,0.1); color: var(--orange); }
.badge-blue { background: rgba(10,132,255,0.1); color: var(--primary); }
.empty { text-align: center; padding: 40px; color: var(--text-secondary); font-size: 13px; }
@media (max-width: 1024px) {.charts-row,.tables-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="header">
  <h1>Dashboard</h1>
  <div class="subtitle" id="subtitle">Panoramica generale</div>
</div>

<div style="display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;align-items:center">
  <select id="filtroAnno" onchange="aggiornaFiltri()" style="padding:10px 16px;border:1px solid var(--border);border-radius:12px;font-size:14px;font-weight:500;background:var(--card);cursor:pointer">
    <option value="all">Tutti gli anni</option>
  </select>
  <select id="filtroMese" onchange="aggiornaFiltri()" style="padding:10px 16px;border:1px solid var(--border);border-radius:12px;font-size:14px;font-weight:500;background:var(--card);cursor:pointer">
    <option value="all">Tutti i mesi</option>
    <option value="0">Gennaio</option><option value="1">Febbraio</option><option value="2">Marzo</option>
    <option value="3">Aprile</option><option value="4">Maggio</option><option value="5">Giugno</option>
    <option value="6">Luglio</option><option value="7">Agosto</option><option value="8">Settembre</option>
    <option value="9">Ottobre</option><option value="10">Novembre</option><option value="11">Dicembre</option>
  </select>
  <button onclick="exportDashboardPDF()" style="margin-left:auto;padding:10px 20px;background:var(--primary);color:white;border:none;border-radius:12px;font-weight:600;font-size:14px;cursor:pointer">
    📄 Esporta PDF
  </button>
</div>

<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-icon blue">👥</div>
    <div class="stat-info">
      <div class="stat-value" id="statVolontari">0</div>
      <div class="stat-label">Volontari Attivi</div>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon green">📋</div>
    <div class="stat-info">
      <div class="stat-value" id="statServizi">0</div>
      <div class="stat-label">Servizi Periodo</div>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon orange">⏱️</div>
    <div class="stat-info">
      <div class="stat-value" id="statOre">0h</div>
      <div class="stat-label">Ore Totali</div>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon purple">🚒</div>
    <div class="stat-info">
      <div class="stat-value" id="statMezzi">0</div>
      <div class="stat-label">Mezzi Disponibili</div>
    </div>
  </div>
</div>

<div class="charts-row">
  <div class="chart-card">
    <div class="chart-title">Servizi per Mese</div>
    <canvas id="chartServiziMese"></canvas>
  </div>
  <div class="chart-card">
    <div class="chart-title">Mansioni</div>
    <canvas id="chartMansioni"></canvas>
  </div>
</div>

<div class="tables-row">
  <div class="table-card">
    <div class="table-header"><div class="table-title">Top Volontari per Ore</div></div>
    <table>
      <thead><tr><th>Volontario</th><th>Servizi</th><th>Ore</th></tr></thead>
      <tbody id="topVolontari"></tbody>
    </table>
  </div>
  <div class="table-card">
    <div class="table-header">
      <div class="table-title">Prossimi Servizi</div>
      <a class="table-link" onclick="parent.document.querySelector('.nav-item:nth-child(3)').click()">Vedi tutti →</a>
    </div>
    <table>
      <thead><tr><th>Data</th><th>Servizio</th><th>Vol.</th></tr></thead>
      <tbody id="prossimiServizi"></tbody>
    </table>
  </div>
</div>

<script>
const session = JSON.parse(localStorage.getItem('pc_session') || 'null');

// FIX: Cerca tutte le chiavi possibili per volontari e servizi
let dbVolontari = JSON.parse(
  localStorage.getItem('volontari') ||
  localStorage.getItem('volontariList') ||
  localStorage.getItem('pc_volontari_v4') ||
  '[]'
);

let dbServizi = JSON.parse(
  localStorage.getItem('servizi') ||
  localStorage.getItem('serviziList') ||
  localStorage.getItem('pc_servizi_v3') ||
  localStorage.getItem('attivita') ||
  localStorage.getItem('eventi') ||
  '[]'
);

let dbPresenze = JSON.parse(localStorage.getItem('pc_presenze') || '[]');
let dbMezzi = JSON.parse(localStorage.getItem('mezzi') || localStorage.getItem('pc_mezzi') || '[]');

console.log('✅ Dashboard caricata:', {
  volontari: dbVolontari.length,
  servizi: dbServizi.length,
  chiavi_trovate: Object.keys(localStorage)
});

const mansioniLabels = {
  monitoraggio: 'Monitoraggio', evento_sportivo: 'Evento Sportivo',
  assistenza_popolazione: 'Assistenza', manutenzione: 'Manutenzione',
  riunione: 'Riunione', emergenza_meteo: 'Emergenza Meteo',
  viabilita: 'Viabilità', esercitazione: 'Esercitazione',
  accesso_eventi: 'Accesso Eventi', altro: 'Altro'
};

let chartServizi, chartMansioni;
let filtroAnnoCorrente = 'all';
let filtroMeseCorrente = 'all';

function init() {
  const anni = [...new Set(dbServizi.map(s => new Date(s.dataInizio || s.data || s.dataServizio).getFullYear()))].sort((a,b) => b-a);
  const selectAnno = document.getElementById('filtroAnno');
  anni.forEach(a => { if(!isNaN(a)) selectAnno.innerHTML += `<option value="${a}">${a}</option>`; });
  aggiornaFiltri();
}

window.aggiornaFiltri = function() {
  filtroAnnoCorrente = document.getElementById('filtroAnno').value;
  filtroMeseCorrente = document.getElementById('filtroMese').value;
  renderDashboard();
}

function getServiziFiltrati() {
  let servizi = dbServizi;
  if (session?.ruolo === 'volontario') servizi = servizi.filter(s => (s.volontari || []).includes(session.volontarioId));
  if (filtroAnnoCorrente!== 'all') servizi = servizi.filter(s => new Date(s.dataInizio || s.data || s.dataServizio).getFullYear() == filtroAnnoCorrente);
  if (filtroMeseCorrente!== 'all') servizi = servizi.filter(s => new Date(s.dataInizio || s.data || s.dataServizio).getMonth() == filtroMeseCorrente);
  return servizi;
}

function renderDashboard() {
  const oggi = new Date();
  const serviziVisibili = getServiziFiltrati();

  let meseInizio, meseFine;
  if (filtroAnnoCorrente!== 'all' && filtroMeseCorrente!== 'all') {
    meseInizio = new Date(parseInt(filtroAnnoCorrente), parseInt(filtroMeseCorrente), 1);
    meseFine = new Date(parseInt(filtroAnnoCorrente), parseInt(filtroMeseCorrente) + 1, 0);
  } else if (filtroAnnoCorrente!== 'all') {
    meseInizio = new Date(parseInt(filtroAnnoCorrente), 0, 1);
    meseFine = new Date(parseInt(filtroAnnoCorrente), 11, 31);
  } else {
    meseInizio = new Date(oggi.getFullYear(), oggi.getMonth(), 1);
    meseFine = new Date(oggi.getFullYear(), oggi.getMonth() + 1, 0);
  }

  let volontariVisibili = dbVolontari.filter(v => v.attivo!== false && v.stato!== 'Inattivo');
  if (session?.ruolo === 'volontario') {
    volontariVisibili = dbVolontari.filter(v => (v.id || v.cf) === session.volontarioId);
    document.getElementById('subtitle').textContent = `I tuoi dati - ${session.nome}`;
  } else {
    const labelPeriodo = filtroAnnoCorrente === 'all'? 'Panoramica generale' :
      filtroMeseCorrente === 'all'? `Anno ${filtroAnnoCorrente}` :
      `${['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'][filtroMeseCorrente]} ${filtroAnnoCorrente}`;
    document.getElementById('subtitle').textContent = labelPeriodo;
  }

  document.getElementById('statVolontari').textContent = volontariVisibili.length;

  const serviziPeriodo = serviziVisibili.filter(s => {
    const d = new Date(s.dataInizio || s.data || s.dataServizio);
    return d >= meseInizio && d <= meseFine;
  });
  document.getElementById('statServizi').textContent = serviziPeriodo.length;

  // FIX: Calcolo ore con fallback su tutti i campi possibili
  const orePeriodo = serviziPeriodo.reduce((sum, s) => {
    const ore = parseFloat(s.ore || s.durata || s.oreTotali || s.h || 0);
    if (ore > 0) return sum + ore;
    // Fallback: calcola da dataFine - dataInizio
    const inizio = new Date(s.dataInizio || s.data);
    const fine = new Date(s.dataFine || s.data);
    if (!isNaN(fine) &&!isNaN(inizio)) {
      return sum + (fine - inizio) / (1000 * 60 * 60);
    }
    return sum;
  }, 0);
  document.getElementById('statOre').textContent = Math.round(orePeriodo) + 'h';

  const mezziDisponibili = dbMezzi.filter(m => m.stato === 'Operativo' || m.stato === 'Disponibile').length;
  document.getElementById('statMezzi').textContent = mezziDisponibili;

  // Grafico servizi per mese
  const mesi = [];
  const serviziPerMese = [];
  const mesiDaMostrare = filtroAnnoCorrente!== 'all'? 12 : 6;

  for (let i = mesiDaMostrare - 1; i >= 0; i--) {
    const d = filtroAnnoCorrente!== 'all'? new Date(parseInt(filtroAnnoCorrente), i, 1) : new Date(oggi.getFullYear(), oggi.getMonth() - i, 1);
    const inizio = new Date(d.getFullYear(), d.getMonth(), 1);
    const fine = new Date(d.getFullYear(), d.getMonth() + 1, 0);
    mesi.push(d.toLocaleDateString('it-IT', { month: 'short' }));
    const count = serviziVisibili.filter(s => {
      const ds = new Date(s.dataInizio || s.data || s.dataServizio);
      return ds >= inizio && ds <= fine;
    }).length;
    serviziPerMese.push(count);
  }

  if (chartServizi) chartServizi.destroy();
  chartServizi = new Chart(document.getElementById('chartServiziMese'), {
    type: 'line',
    data: { labels: mesi, datasets: [{ label: 'Servizi', data: serviziPerMese, borderColor: '#0A84FF', backgroundColor: 'rgba(10,132,255,0.1)', tension: 0.4, fill: true }] },
    options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
  });

  // Grafico mansioni
  const mansioniCount = {};
  serviziPeriodo.forEach(s => {
    const m = s.mansione || s.tipo || 'altro';
    mansioniCount[m] = (mansioniCount[m] || 0) + 1;
  });

  if (chartMansioni) chartMansioni.destroy();
  chartMansioni = new Chart(document.getElementById('chartMansioni'), {
    type: 'doughnut',
    data: {
      labels: Object.keys(mansioniCount).map(k => mansioniLabels[k] || k),
      datasets: [{ data: Object.values(mansioniCount), backgroundColor: ['#0A84FF','#30D158','#FF9F0A','#AF52DE','#FF453A','#64D2FF'] }]
    },
    options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom' } } }
  });

  // Top volontari
  const statsVol = {};
  serviziPeriodo.forEach(s => {
    (s.volontari || []).forEach(vId => {
      const id = typeof vId === 'object'? vId.id : vId;
      if (!statsVol[id]) statsVol[id] = { servizi: 0, ore: 0 };
      statsVol[id].servizi++;
      statsVol[id].ore += parseFloat(s.ore || s.durata || 0);
    });
  });

  const topV = Object.entries(statsVol)
  .map(([id, s]) => ({...dbVolontari.find(v => (v.id || v.cf) == id),...s }))
  .filter(v => v.nome)
  .sort((a,b) => b.ore - a.ore)
  .slice(0, 5);

  document.getElementById('topVolontari').innerHTML = topV.length? topV.map(v => `
    <tr>
      <td><div class="volontario-row"><div class="volontario-avatar">${v.nome[0]}${v.cognome[0]}</div>${v.nome} ${v.cognome}</div></td>
      <td><span class="badge badge-blue">${v.servizi}</span></td>
      <td><strong>${Math.round(v.ore)}h</strong></td>
    </tr>
  `).join('') : '<tr><td colspan="3" class="empty">Nessun dato</td></tr>';

  // Prossimi servizi
  const prossimi = serviziVisibili
  .filter(s => new Date(s.dataInizio || s.data) >= oggi)
  .sort((a,b) => new Date(a.dataInizio || a.data) - new Date(b.dataInizio || b.data))
  .slice(0, 5);

  document.getElementById('prossimiServizi').innerHTML = prossimi.length? prossimi.map(s => `
    <tr>
      <td>${new Date(s.dataInizio || s.data).toLocaleDateString('it-IT', {day:'2-digit',month:'short'})}</td>
      <td>${s.titolo || s.descrizione || s.tipo || 'Servizio'}</td>
      <td><span class="badge badge-green">${(s.volontari || []).length}</span></td>
    </tr>
  `).join('') : '<tr><td colspan="3" class="empty">Nessun servizio programmato</td></tr>';
}

function exportDashboardPDF() {
  alert("Funzione PDF in sviluppo");
}

window.onload = init;
</script>
</body>
</html>
