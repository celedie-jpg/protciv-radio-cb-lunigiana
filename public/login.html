<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Protciv Lunigiana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    
    <div class="bg-slate-800/80 backdrop-blur-sm p-8 rounded-lg shadow-2xl w-full max-w-sm border border-slate-700">
        <!-- LOGO IMMAGINE -->
        <div class="text-center mb-6">
            <img src="logo.png" alt="Logo Protciv Lunigiana" class="w-24 h-24 mx-auto mb-4 object-contain">
            <h1 class="text-white text-2xl font-bold">Protciv Lunigiana</h1>
            <p class="text-slate-400 text-sm mt-1">Accesso Riservato</p>
        </div>
        
        <div class="space-y-4">
            <input 
                id="email" 
                type="email" 
                placeholder="Email"
                class="w-full p-3 rounded bg-slate-700 text-white border-2 border-slate-600 focus:border-sky-500 focus:outline-none"
            >
            <input 
                id="password" 
                type="password" 
                placeholder="Password"
                class="w-full p-3 rounded bg-slate-700 text-white border-2 border-slate-600 focus:border-sky-500 focus:outline-none"
            >
            
            <button 
                id="bottoneLogin" 
                class="w-full bg-sky-500 hover:bg-sky-600 text-white p-3 rounded font-semibold transition-colors"
            >
                Entra
            </button>
            
            <p id="messaggioErrore" class="text-red-400 text-center text-sm h-4"></p>
        </div>
    </div>

    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
      import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
      
      const firebaseConfig = {
        apiKey: "AIzaSyCEPlRtBwj21c06YljPbqt8kZkUCrY-yDU",
        authDomain: "protciv-lunigiana.firebaseapp.com",
        projectId: "protciv-lunigiana",
        storageBucket: "protciv-lunigiana.firebasestorage.app",
        messagingSenderId: "1017323230397",
        appId: "1:1017323230397:web:db463ccc9d02cce5b653d4"
      };
      
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      
      onAuthStateChanged(auth, (user) => {
        if (user) window.location.href = 'index.html';
      });
      
      document.getElementById('bottoneLogin').onclick = () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const msgErrore = document.getElementById('messaggioErrore');
        msgErrore.textContent = '';
        
        signInWithEmailAndPassword(auth, email, password)
          .then(() => {
            window.location.href = 'index.html';
          })
          .catch(() => {
            msgErrore.textContent = 'Email o password errati';
          });
      };
      
      // Invio con Enter
      document.getElementById('password').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('bottoneLogin').click();
      });
    </script>
</body>
</html>
