<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Login - Protciv Lunigiana</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen">
    <div class="bg-slate-800 p-8 rounded-lg w-96">
        <h1 class="text-white text-2xl mb-6 text-center">Accesso Riservato</h1>
        <input id="email" type="email" placeholder="Email" class="w-full p-3 mb-4 rounded bg-slate-700 text-white">
        <input id="password" type="password" placeholder="Password" class="w-full p-3 mb-4 rounded bg-slate-700 text-white">
        <button id="bottoneLogin" class="w-full bg-sky-600 hover:bg-sky-700 text-white p-3 rounded">Entra</button>
        <p id="errore" class="text-red-500 mt-4 text-center h-4"></p>
    </div>

    <script type="module">
      // Importo Firebase - versione corretta
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
      import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
      
      // LA TUA CONFIGURAZIONE - QUELLA CHE MI HAI MANDATO
      const firebaseConfig = {
        apiKey: "AIzaSyCEPlRtBwj21c06YljPbqt8kZkUCrY-yDU",
        authDomain: "protciv-lunigiana.firebaseapp.com",
        projectId: "protciv-lunigiana",
        storageBucket: "protciv-lunigiana.firebasestorage.app",
        messagingSenderId: "1017323230397",
        appId: "1:1017323230397:web:db463ccc9d02cce5b653d4"
      };
      
      // Avvio Firebase
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      
      // Quando clicchi "Entra"
      document.getElementById('bottoneLogin').onclick = () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const msgErrore = document.getElementById('errore');
        msgErrore.textContent = '';
        
        signInWithEmailAndPassword(auth, email, password)
          .then(() => {
            window.location.href = 'index.html';
          })
          .catch((error) => {
            msgErrore.textContent = 'Email o password errati';
            console.log(error.code);
          });
      };
    </script>
</body>
</html>
