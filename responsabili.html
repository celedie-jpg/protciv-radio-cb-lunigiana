<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsabili - Radio C.B. Lunigiana</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100">

  <div class="lg:hidden bg-blue-900 text-white p-4 flex justify-between items-center fixed top-0 left-0 right-0 z-50">
    <button onclick="toggleMenu()" class="text-2xl"><i class="fas fa-bars"></i></button>
    <a href="index.html" class="flex items-center gap-2">
      <img src="https://i.imgur.com/8RvEWed.png" alt="Logo" class="w-8 h-8 rounded-full object-cover">
      <span class="font-bold text-sm">Radio C.B. Lunigiana</span>
    </a>
    <a href="login.html" class="text-xl"><i class="fas fa-sign-out-alt"></i></a>
  </div>

  <div id="sidebar" class="fixed left-0 top-0 h-full w-64 bg-blue-900 text-white transform -translate-x-full lg:translate-x-0 transition-transform duration-200 z-40 overflow-y-auto">
    <div class="p-5 border-b border-blue-800 mt-16 lg:mt-0 text-center">
      <a href="index.html">
        <img src="https://i.imgur.com/8RvEWed.png" alt="Logo" class="w-16 h-16 mx-auto mb-2 rounded-full object-cover hover:opacity-80">
        <h2 class="text-xl font-bold hover:text-blue-200">ProtCiv Manager</h2>
      </a>
    </div>
    <nav class="p-4">
      <a href="index.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-home w-5"></i> Dashboard</a>
      <a href="servizi.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-tasks w-5"></i> Servizi</a>
      <a href="volontari.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-users w-5"></i> Volontari</a>
      <a href="attestati.html" id="linkAttestati" class="hidden flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2">
  <i class="fas fa-certificate w-5"></i> Attestati</a>
      <a href="corsi.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-graduation-cap w-5"></i> Corsi</a>
      <a href="responsabili.html" class="flex items-center gap-3 p-3 rounded bg-blue-800 mb-2"><i class="fas fa-user-tie w-5"></i> Responsabili</a>
      <a href="mezzi.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-truck w-5"></i> Mezzi</a>
      <a href="attrezzature.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-walkie-talkie w-5"></i> Attrezzature</a>
      <a href="report.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-file-pdf w-5"></i> Report</a>
      <a href="login.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mt-8"><i class="fas fa-sign-out-alt w-5"></i> Logout</a>
    </nav>
  </div>

  <div id="overlay" onclick="toggleMenu()" class="hidden fixed inset-0 bg-black bg-opacity-50 z-30 lg:hidden"></div>

  <div class="lg:ml-64 pt-20 lg:pt-8 p-4 lg:p-8">
    <div class="mb-4">
      <a href="index.html" class="inline-flex items-center gap-2 text-blue-600 hover:text-blue-800 font-semibold">
        <i class="fas fa-arrow-left"></i> Torna alla Dashboard
      </a>
    </div>

    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold text-gray-800">Consiglio Direttivo</h1>
      <button onclick="toggleForm()" class="bg-red-600 text-white px-4 py-2 rounded-lg font-bold">
        <i class="fas fa-plus"></i> Nuovo Membro
      </button>
    </div>

    <div id="formResponsabile" class="hidden bg-white rounded-lg shadow p-6 mb-6">
      <h3 class="font-bold text-lg mb-4" id="titoloForm">Nuovo Membro Direttivo</h3>
      <form onsubmit="salvaResponsabile(event)">
        <input type="hidden" id="idResponsabile">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
          <input type="text" id="nomeResp" placeholder="Nome *" required class="border p-2 rounded">
          <input type="text" id="cognomeResp" placeholder="Cognome *" required class="border p-2 rounded">
          <select id="ruoloResp" required class="border p-2 rounded">
            <option value="">Ruolo *</option>
            <option value="Presidente">Presidente</option>
            <option value="Vice Presidente">Vice Presidente</option>
            <option value="Segretario">Segretario</option>
            <option value="Tesoriere">Tesoriere</option>
            <option value="Consigliere">Consigliere</option>
            <option value="Revisore dei Conti">Revisore dei Conti</option>
            <option value="Probiviro">Probiviro</option>
            <option value="Coordinatore Operativo">Coordinatore Operativo</option>
          </select>
          <input type="tel" id="telefonoResp" placeholder="Telefono *" required class="border p-2 rounded">
          <input type="email" id="emailResp" placeholder="Email" class="border p-2 rounded">
          <input type="date" id="dataInizioMandato" placeholder="Inizio Mandato" class="border p-2 rounded">
          <input type="date" id="dataFineMandato" placeholder="Fine Mandato" class="border p-2 rounded lg:col-span-2">
          <input type="text" id="deleghe" placeholder="Deleghe (es: Rapporti Istituzioni)" class="border p-2 rounded lg:col-span-2">
        </div>
        <textarea id="noteResp" placeholder="Note" rows="2" class="border p-2 rounded w-full mb-4"></textarea>
        <div class="flex gap-2">
          <button type="submit" class="bg-red-600 text-white px-6 py-2 rounded font-bold">Salva</button>
          <button type="button" onclick="annullaForm()" class="bg-gray-400 text-white px-6 py-2 rounded">Annulla</button>
        </div>
      </form>
    </div>

    <div id="listaResponsabili" class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-4"></div>
  </div>

  <script>
    function toggleMenu() {
      document.getElementById('sidebar').classList.toggle('-translate-x-full');
      document.getElementById('overlay').classList.toggle('hidden');
    }

   function toggleForm() {
  const form = document.getElementById('formResponsabile');
  const btn = document.getElementById('btnToggleForm');
  const listaResponsabili = document.getElementById('listaResponsabili');
  
  form.classList.toggle('hidden');

  if (!form.classList.contains('hidden')) {
    // Apro il form
    document.getElementById('titoloForm').textContent = 'Nuovo Membro';
    document.querySelector('form').reset();
    document.getElementById('idResponsabile').value = '';
    
    listaResponsabili.classList.add('hidden');

    btn.innerHTML = '<i class="fas fa-arrow-left"></i> Indietro';
    btn.classList.remove('bg-red-600');
    btn.classList.add('bg-blue-600');
  } else {
    // Chiudo il form
    listaResponsabili.classList.remove('hidden');
    
    btn.innerHTML = '<i class="fas fa-plus"></i> Nuovo Membro';
    btn.classList.remove('bg-blue-600');
    btn.classList.add('bg-red-600');
  }
}

    function annullaForm() {
      document.getElementById('formResponsabile').classList.add('hidden');
      document.querySelector('form').reset();
    }

    function salvaResponsabile(e) {
      e.preventDefault();
      const responsabili = JSON.parse(localStorage.getItem('responsabili') || '[]');
      const id = document.getElementById('idResponsabile').value;

      const dati = {
        id: id? parseInt(id) : Date.now(),
        nome: document.getElementById('nomeResp').value,
        cognome: document.getElementById('cognomeResp').value,
        ruolo: document.getElementById('ruoloResp').value,
        telefono: document.getElementById('telefonoResp').value,
        email: document.getElementById('emailResp').value,
        dataInizioMandato: document.getElementById('dataInizioMandato').value,
        dataFineMandato: document.getElementById('dataFineMandato').value,
        deleghe: document.getElementById('deleghe').value,
        note: document.getElementById('noteResp').value
      };

      if (id) {
        const index = responsabili.findIndex(r => r.id === parseInt(id));
        responsabili[index] = dati;
      } else {
        responsabili.push(dati);
      }

      localStorage.setItem('responsabili', JSON.stringify(responsabili));
      annullaForm();
      mostraResponsabili();
    }

    function modificaResponsabile(id) {
      const responsabili = JSON.parse(localStorage.getItem('responsabili') || '[]');
      const r = responsabili.find(r => r.id === id);

      document.getElementById('idResponsabile').value = r.id;
      document.getElementById('nomeResp').value = r.nome;
      document.getElementById('cognomeResp').value = r.cognome;
      document.getElementById('ruoloResp').value = r.ruolo;
      document.getElementById('telefonoResp').value = r.telefono;
      document.getElementById('emailResp').value = r.email || '';
      document.getElementById('dataInizioMandato').value = r.dataInizioMandato || '';
      document.getElementById('dataFineMandato').value = r.dataFineMandato || '';
      document.getElementById('deleghe').value = r.deleghe || '';
      document.getElementById('noteResp').value = r.note || '';

      document.getElementById('titoloForm').textContent = 'Modifica Membro';
      document.getElementById('formResponsabile').classList.remove('hidden');
      window.scrollTo(0, 0);
    }

    function eliminaResponsabile(id) {
      if (!confirm('Eliminare questo membro del direttivo?')) return;
      let responsabili = JSON.parse(localStorage.getItem('responsabili') || '[]');
      responsabili = responsabili.filter(r => r.id!== id);
      localStorage.setItem('responsabili', JSON.stringify(responsabili));
      mostraResponsabili();
    }

    function mostraResponsabili() {
      const responsabili = JSON.parse(localStorage.getItem('responsabili') || '[]');
      const lista = document.getElementById('listaResponsabili');

      // Ordine gerarchico
      const ordine = ['Presidente','Vice Presidente','Segretario','Tesoriere','Coordinatore Operativo','Consigliere','Revisore dei Conti','Probiviro'];
      responsabili.sort((a,b) => ordine.indexOf(a.ruolo) - ordine.indexOf(b.ruolo));

      if (responsabili.length === 0) {
        lista.innerHTML = `<div class="col-span-full bg-white rounded-lg shadow p-8 text-center text-gray-500">
          <i class="fas fa-user-tie text-5xl mb-3 text-gray-300"></i>
          <p class="text-lg">Nessun membro inserito</p>
          <p class="text-sm mt-2">Clicca "Nuovo Membro" per iniziare</p>
        </div>`;
        return;
      }

      lista.innerHTML = responsabili.map(r => {
        const iniziali = r.nome.charAt(0) + r.cognome.charAt(0);
        const mandato = r.dataInizioMandato? `<p class="text-xs text-gray-500 mt-1">Mandato: ${new Date(r.dataInizioMandato).toLocaleDateString('it-IT')}${r.dataFineMandato? ' - ' + new Date(r.dataFineMandato).toLocaleDateString('it-IT') : ''}</p>` : '';

        return `
        <div class="bg-white rounded-lg shadow p-5">
          <div class="flex items-start gap-4 mb-3">
            <div class="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold text-xl flex-shrink-0">
              ${iniziali}
            </div>
            <div class="flex-1">
              <h3 class="font-bold text-lg text-gray-800">${r.nome} ${r.cognome}</h3>
              <span class="text-xs px-2 py-1 rounded bg-blue-100 text-blue-800 font-semibold">${r.ruolo}</span>
              ${mandato}
            </div>
            <div class="flex gap-2">
              <button onclick="modificaResponsabile(${r.id})" class="text-blue-600 hover:text-blue-800"><i class="fas fa-edit"></i></button>
              <button onclick="eliminaResponsabile(${r.id})" class="text-red-600 hover:text-red-800"><i class="fas fa-trash"></i></button>
            </div>
          </div>
          <div class="space-y-1">
            <a href="tel:${r.telefono}" class="text-sm text-gray-700 hover:text-blue-600 block"><i class="fas fa-phone w-4"></i> ${r.telefono}</a>
            ${r.email? `<a href="mailto:${r.email}" class="text-sm text-gray-700 hover:text-blue-600 block"><i class="fas fa-envelope w-4"></i> ${r.email}</a>` : ''}
            ${r.deleghe? `<p class="text-sm text-gray-600 mt-2"><i class="fas fa-tasks w-4"></i> <strong>Deleghe:</strong> ${r.deleghe}</p>` : ''}
            ${r.note? `<p class="text-xs text-gray-500 mt-2"><i class="fas fa-info-circle"></i> ${r.note}</p>` : ''}
          </div>
        </div>
      `}).join('');
    }

    mostraResponsabili();
  </script>
  <script>
  // Mostra link Attestati solo ad Admin
  if (localStorage.getItem('utente_ruolo') === 'Admin') {
    document.getElementById('linkAttestati').classList.remove('hidden');
  }
</script>
</body>
</html>
