<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colonna Mobile Nazionale - ProtCiv Manager</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --blu: #1e3a8a;
      --blu-scuro: #172554;
      --grigio-bg: #f1f5f9;
      --bordo: #e2e8f0;
      --rosso: #dc2626;
      --rosso-hover: #b91c1c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--grigio-bg);
      display: flex;
      min-height: 100vh;
    }
  .sidebar {
      width: 260px;
      background: var(--blu-scuro);
      color: white;
      padding: 20px 0;
      flex-shrink: 0;
    }
  .sidebar-header {
      text-align: center;
      padding: 0 20px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
  .sidebar-header img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      margin-bottom: 10px;
    }
  .sidebar-header h2 { font-size: 18px; }
  .sidebar ul { list-style: none; margin-top: 20px; }
  .sidebar li a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 15px;
      transition: all 0.2s;
    }
  .sidebar li a:hover, .sidebar li a.active {
      background: var(--blu);
      color: white;
    }
  .main {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
    }
  .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
  .top-bar h1 { font-size: 24px; color: #1e293b; }
  .btn-nuovo {
      background: var(--rosso);
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
  .btn-nuovo:hover { background: var(--rosso-hover); }
  .card {
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      margin-bottom: 16px;
    }
  .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 16px;
    }
    label { font-size: 14px; font-weight: 500; color: #475569; display: block; margin-bottom: 6px; }
    input, select {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--bordo);
      border-radius: 6px;
      font-size: 14px;
    }
  .card-footer { display: flex; gap: 10px; justify-content: flex-end; }
  .btn { padding: 10px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; }
  .btn-salva { background: var(--blu); color: white; }
  .btn-annulla { background: #e2e8f0; color: #334155; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--bordo); }
    th { background: #f8fafc; font-weight: 600; color: #475569; }
  .azioni { display: flex; gap: 8px; }
  .btn-icon {
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
  .btn-modifica { background: #dbeafe; color: #1e40af; }
  .btn-elimina { background: #fee2e2; color: #b91c1c; }
  .hidden { display: none; }
    @media (max-width: 768px) {
    .sidebar { display: none; }
    .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <img src="logo.png" alt="Logo">
    <h2>ProtCiv Manager</h2>
  </div>
  <ul>
    <li><a href="dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a></li>
    <li><a href="servizi.html"><i class="fa-solid fa-list-check"></i> Servizi</a></li>
    <li><a href="volontari.html"><i class="fa-solid fa-users"></i> Volontari</a></li>
    <li><a href="attestati.html"><i class="fa-solid fa-certificate"></i> Attestati</a></li>
    <li><a href="corsi.html"><i class="fa-solid fa-graduation-cap"></i> Corsi</a></li>
    <li><a href="responsabili.html"><i class="fa-solid fa-user-tie"></i> Responsabili</a></li>
    <li><a href="mezzi.html"><i class="fa-solid fa-truck"></i> Mezzi</a></li>
    <li><a href="colonna_mobile.html" class="active"><i class="fa-solid fa-people-group"></i> Colonna Mobile</a></li>
    <li><a href="attrezzature.html"><i class="fa-solid fa-toolbox"></i> Attrezzature</a></li>
    <li><a href="report.html"><i class="fa-solid fa-file-pdf"></i> Report</a></li>
  </ul>
</div>

<div class="main">
  <div class="top-bar">
    <div>
      <a href="dashboard.html" style="color:var(--blu);text-decoration:none;font-size:14px;"><i class="fa-solid fa-arrow-left"></i> Torna alla Dashboard</a>
      <h1>Gestione Colonna Mobile Nazionale</h1>
    </div>
    <button class="btn-nuovo" onclick="apriForm()"><i class="fa-solid fa-plus"></i> Nuova Disponibilità</button>
  </div>

  <div id="form-card" class="card hidden">
    <h3 id="form-titolo">Nuova Disponibilità CMN</h3>
    <form id="form-cmn">
      <input type="hidden" id="edit-id">
      <div class="form-grid">
        <div>
          <label>Volontario*</label>
          <select id="volontario_id" required></select>
        </div>
        <div>
          <label>Dal*</label>
          <input type="date" id="dal" required>
        </div>
        <div>
          <label>Al*</label>
          <input type="date" id="al" required>
        </div>
        <div>
          <label>Team*</label>
          <select id="team" required>
            <option value="">Seleziona Team</option>
            <option value="Logistica">Logistica</option>
            <option value="Sanitario">Sanitario</option>
            <option value="Antincendio">Antincendio</option>
            <option value="Telecomunicazioni">Telecomunicazioni</option>
            <option value="Generico">Generico</option>
          </select>
        </div>
      </div>
      <div class="card-footer">
        <button type="button" class="btn btn-annulla" onclick="chiudiForm()">Annulla</button>
        <button type="submit" class="btn btn-salva">Salva</button>
      </div>
    </form>
  </div>

  <div class="card">
    <h3>Elenco Disponibilità</h3>
    <table id="tabella-cmn">
      <thead>
        <tr>
          <th>Volontario</th>
          <th>Dal</th>
          <th>Al</th>
          <th>Team</th>
          <th>Azioni</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

<script>
  let disponibilitaCMN = JSON.parse(localStorage.getItem('cmn') || '[]');
  let volontari = JSON.parse(localStorage.getItem('volontari') || '[]');

  function caricaVolontari() {
    const sel = document.getElementById('volontario_id');
    sel.innerHTML = '<option value="">Seleziona volontario</option>';
    volontari.forEach(v => {
      sel.innerHTML += `<option value="${v.id}">${v.nome} ${v.cognome}</option>`;
    });
  }

  function apriForm() {
    document.getElementById('form-card').classList.remove('hidden');
    document.getElementById('form-titolo').innerText = 'Nuova Disponibilità CMN';
    document.getElementById('form-cmn').reset();
    document.getElementById('edit-id').value = '';
  }

  function chiudiForm() {
    document.getElementById('form-card').classList.add('hidden');
  }

  document.getElementById('form-cmn').addEventListener('submit', function(e) {
    e.preventDefault();
    const id = document.getElementById('edit-id').value;
    const record = {
      id: id? parseInt(id) : Date.now(),
      volontario_id: parseInt(document.getElementById('volontario_id').value),
      dal: document.getElementById('dal').value,
      al: document.getElementById('al').value,
      team: document.getElementById('team').value
    };

    if (id) {
      const idx = disponibilitaCMN.findIndex(x => x.id == id);
      if (idx > -1) disponibilitaCMN[idx] = record;
    } else {
      disponibilitaCMN.push(record);
    }

    localStorage.setItem('cmn', JSON.stringify(disponibilitaCMN));
    chiudiForm();
    renderTabella();
  });

  function renderTabella() {
    const tbody = document.querySelector('#tabella-cmn tbody');
    tbody.innerHTML = '';
    disponibilitaCMN.sort((a,b) => b.dal.localeCompare(a.dal));
    disponibilitaCMN.forEach(d => {
      const v = volontari.find(x => x.id === d.volontario_id);
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><strong>${v? v.nome + ' ' + v.cognome : 'N/D'}</strong></td>
        <td>${d.dal.split('-').reverse().join('/')}</td>
        <td>${d.al.split('-').reverse().join('/')}</td>
        <td>${d.team || '-'}</td>
        <td class="azioni">
          <button class="btn-icon btn-modifica" onclick="modifica(${d.id})"><i class="fa-solid fa-pen-to-square"></i> Modifica</button>
          <button class="btn-icon btn-elimina" onclick="elimina(${d.id})"><i class="fa-solid fa-trash"></i> Elimina</button>
        </td>
      `;
      tbody.appendChild(tr);
    });
  }

  function modifica(id) {
    const d = disponibilitaCMN.find(x => x.id === id);
    document.getElementById('edit-id').value = d.id;
    document.getElementById('volontario_id').value = d.volontario_id;
    document.getElementById('dal').value = d.dal;
    document.getElementById('al').value = d.al;
    document.getElementById('team').value = d.team;
    document.getElementById('form-titolo').innerText = 'Modifica Disponibilità';
    document.getElementById('form-card').classList.remove('hidden');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function elimina(id) {
    if (!confirm('Eliminare questa disponibilità?')) return;
    disponibilitaCMN = disponibilitaCMN.filter(x => x.id!== id);
    localStorage.setItem('cmn', JSON.stringify(disponibilitaCMN));
    renderTabella();
  }

  caricaVolontari();
  renderTabella();
</script>
</body>
</html>
