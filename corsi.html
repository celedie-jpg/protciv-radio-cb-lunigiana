<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corsi - Radio C.B. Lunigiana</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="bg-gray-100">

  <div class="lg:hidden bg-blue-900 text-white p-4 flex justify-between items-center fixed top-0 left-0 right-0 z-50">
    <button onclick="toggleMenu()" class="text-2xl"><i class="fas fa-bars"></i></button>
    <a href="index.html" class="flex items-center gap-2">
      <img src="https://i.imgur.com/8RvEWed.png" alt="Logo" class="w-8 h-8 rounded-full object-cover">
      <span class="font-bold text-sm">Radio C.B. Lunigiana</span>
    </a>
    <a href="login.html" class="text-xl"><i class="fas fa-sign-out-alt"></i></a>
  </div>

  <div id="sidebar" class="fixed left-0 top-0 h-full w-64 bg-blue-900 text-white transform -translate-x-full lg:translate-x-0 transition-transform duration-200 z-40 overflow-y-auto">
    <div class="p-5 border-b border-blue-800 mt-16 lg:mt-0 text-center">
      <a href="index.html">
        <img src="https://i.imgur.com/8RvEWed.png" alt="Logo" class="w-16 h-16 mx-auto mb-2 rounded-full object-cover hover:opacity-80">
        <h2 class="text-xl font-bold hover:text-blue-200">ProtCiv Manager</h2>
      </a>
    </div>
    <nav class="p-4">
      <a href="index.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-home w-5"></i> Dashboard</a>
      <a href="servizi.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-tasks w-5"></i> Servizi</a>
      <a href="volontari.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-users w-5"></i> Volontari</a>
      <a href="attestati.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-certificate w-5"></i> Attestati</a>
      <a href="corsi.html" class="flex items-center gap-3 p-3 rounded bg-blue-800 mb-2"><i class="fas fa-graduation-cap w-5"></i> Corsi</a>
      <a href="responsabili.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-user-tie w-5"></i> Responsabili</a>
      <a href="mezzi.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-truck w-5"></i> Mezzi</a>
      <a href="attrezzature.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-walkie-talkie w-5"></i> Attrezzature</a>
      <a href="report.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-file-pdf w-5"></i> Report</a>
      <a href="login.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mt-8"><i class="fas fa-sign-out-alt w-5"></i> Logout</a>
    </nav>
  </div>

  <div id="overlay" onclick="toggleMenu()" class="hidden fixed inset-0 bg-black bg-opacity-50 z-30 lg:hidden"></div>

  <div class="lg:ml-64 pt-20 lg:pt-8 p-4 lg:p-8">
    <div class="mb-4">
      <a href="index.html" class="inline-flex items-center gap-2 text-blue-600 hover:text-blue-800 font-semibold">
        <i class="fas fa-arrow-left"></i> Torna alla Dashboard
      </a>
    </div>

    <div class="flex flex-col lg:flex-row lg:justify-between lg:items-center gap-3 mb-6">
      <h1 class="text-2xl font-bold text-gray-800">Gestione Corsi di Formazione</h1>
      <div class="flex gap-2">
        <button onclick="esportaPDF()" class="bg-green-600 text-white px-4 py-2 rounded-lg font-bold text-sm">
          <i class="fas fa-file-pdf"></i> Esporta PDF
        </button>
        <button onclick="toggleForm()" class="bg-red-600 text-white px-4 py-2 rounded-lg font-bold text-sm">
          <i class="fas fa-plus"></i> Nuovo Corso
        </button>
      </div>
    </div>

    <div id="formCorso" class="hidden bg-white rounded-lg shadow p-6 mb-6">
      <h3 class="font-bold text-lg mb-4" id="titoloForm">Nuovo Corso</h3>
      <form onsubmit="salvaCorso(event)">
        <input type="hidden" id="idCorso">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
          <input type="text" id="titoloCorso" placeholder="Titolo Corso *" required class="border p-2 rounded">
          <select id="tipoCorso" required class="border p-2 rounded">
            <option value="">Tipo Corso *</option>
            <option value="Corso Base RT">Corso Base RT</option>
            <option value="Corso Base FIR">Corso Base FIR</option>
            <option value="Brevetto C">Brevetto C</option>
            <option value="Brevetto Carrello Idrogeologico">Brevetto Carrello Idrogeologico</option>
            <option value="Corso Idrogeologico">Corso Idrogeologico</option>
            <option value="Corso Motosega">Corso Motosega</option>
            <option value="BLS">BLS</option>
            <option value="BLSD">BLSD</option>
            <option value="DL-81">DL-81</option>
            <option value="HACCP">HACCP</option>
            <option value="Cartografia">Cartografia</option>
            <option value="TLC Base">TLC Base</option>
            <option value="TLC Avanzato">TLC Avanzato</option>
            <option value="Logistica">Logistica</option>
            <option value="Segreteria">Segreteria</option>
            <option value="Pilota Droni">Pilota Droni</option>
            <option value="Altro">Altro</option>
          </select>
          <input type="text" id="enteErogatore" placeholder="Ente Erogatore" class="border p-2 rounded">
          <input type="text" id="luogo" placeholder="Luogo" class="border p-2 rounded">
          <input type="date" id="dataInizio" required class="border p-2 rounded">
          <input type="date" id="dataFine" class="border p-2 rounded">
          <input type="number" id="oreCorso" placeholder="Ore totali" class="border p-2 rounded">
          <select id="statoCorso" required class="border p-2 rounded">
            <option value="Programmato">Programmato</option>
            <option value="In corso">In corso</option>
            <option value="Concluso">Concluso</option>
            <option value="Annullato">Annullato</option>
          </select>
        </div>

        <div class="bg-yellow-50 border-2 border-yellow-300 rounded-lg p-4 mb-4">
          <h4 class="font-bold text-yellow-900 mb-2"><i class="fas fa-certificate"></i> Gestione Attestato</h4>
          <label class="flex items-center mb-2">
            <input type="checkbox" id="rilasciaAttestato" onchange="toggleScadenza()" class="mr-2">
            <span class="font-semibold">Il corso rilascia attestato</span>
          </label>
          <div id="divScadenza" class="hidden">
            <label class="block text-sm font-semibold text-gray-700 mb-1">Scadenza Attestato</label>
            <input type="date" id="scadenzaAttestato" class="border p-2 rounded w-full lg:w-1/2">
          </div>
        </div>

        <div class="bg-blue-50 border-2 border-blue-300 rounded-lg p-4 mb-4">
          <h4 class="font-bold text-blue-900 mb-3"><i class="fas fa-users"></i> Partecipanti</h4>
          <div id="listaVolontariCorso" class="max-h-60 overflow-y-auto space-y-2">
            <p class="text-sm text-gray-500">Caricamento volontari...</p>
          </div>
        </div>

        <textarea id="noteCorso" placeholder="Note / Programma / Docenti" rows="2" class="border p-2 rounded w-full mb-4"></textarea>
        <div class="flex gap-2">
          <button type="submit" class="bg-red-600 text-white px-6 py-2 rounded font-bold">Salva Corso</button>
          <button type="button" onclick="annullaForm()" class="bg-gray-400 text-white px-6 py-2 rounded">Annulla</button>
        </div>
      </form>
    </div>

    <div class="bg-white rounded-lg shadow p-4 mb-4">
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-3">
        <input type="text" id="cercaCorso" onkeyup="filtraCorsi()" placeholder="Cerca corso..." class="border p-2 rounded">
        <select id="filtroTipo" onchange="filtraCorsi()" class="border p-2 rounded">
          <option value="">Tutti i tipi</option>
          <option value="Corso Base RT">Corso Base RT</option>
          <option value="Corso Base FIR">Corso Base FIR</option>
          <option value="Brevetto C">Brevetto C</option>
          <option value="Corso Motosega">Corso Motosega</option>
          <option value="BLSD">BLSD</option>
          <option value="DL-81">DL-81</option>
          <option value="HACCP">HACCP</option>
          <option value="TLC Base">TLC Base</option>
          <option value="TLC Avanzato">TLC Avanzato</option>
          <option value="Pilota Droni">Pilota Droni</option>
        </select>
        <select id="filtroStato" onchange="filtraCorsi()" class="border p-2 rounded">
          <option value="">Tutti gli stati</option>
          <option value="Programmato">Programmato</option>
          <option value="In corso">In corso</option>
          <option value="Concluso">Concluso</option>
        </select>
      </div>
    </div>

    <div id="listaCorsi" class="space-y-4"></div>
  </div>

  <script>
    const { jsPDF } = window.jspdf;
    
    function toggleMenu() {
      document.getElementById('sidebar').classList.toggle('-translate-x-full');
      document.getElementById('overlay').classList.toggle('hidden');
    }

    function toggleForm() {
      const form = document.getElementById('formCorso');
      form.classList.toggle('hidden');
      if (!form.classList.contains('hidden')) {
        document.getElementById('titoloForm').textContent = 'Nuovo Corso';
        document.querySelector('form').reset();
        document.getElementById('idCorso').value = '';
        document.getElementById('divScadenza').classList.add('hidden');
        caricaVolontariCorso();
      }
    }

    function toggleScadenza() {
      document.getElementById('divScadenza').classList.toggle('hidden', !document.getElementById('rilasciaAttestato').checked);
    }

    function annullaForm() {
      document.getElementById('formCorso').classList.add('hidden');
      document.querySelector('form').reset();
    }

    function caricaVolontariCorso() {
      const volontari = JSON.parse(localStorage.getItem('volontari') || '[]').filter(v => v.stato === 'Attivo');
      const container = document.getElementById('listaVolontariCorso');

      if (volontari.length === 0) {
        container.innerHTML = '<p class="text-sm text-gray-500">Nessun volontario attivo</p>';
        return;
      }

      container.innerHTML = volontari.map(v => `
        <label class="flex items-center p-2 bg-white rounded border cursor-pointer hover:bg-blue-50">
          <input type="checkbox" value="${v.id}" data-nome="${v.nome} ${v.cognome}" class="volontario-corso mr-3">
          <div class="flex-1">
            <span class="font-semibold text-sm">${v.nome} ${v.cognome}</span>
            <select class="ml-2 text-xs border rounded px-1 esito-corso" data-id="${v.id}">
              <option value="Superato">Superato</option>
              <option value="Non superato">Non superato</option>
              <option value="Assente">Assente</option>
            </select>
          </div>
        </label>
      `).join('');
    }

    function salvaCorso(e) {
      e.preventDefault();
      const corsi = JSON.parse(localStorage.getItem('corsi') || '[]');
      const id = document.getElementById('idCorso').value;

      const partecipanti = Array.from(document.querySelectorAll('.volontario-corso:checked')).map(cb => {
        const esito = document.querySelector(`.esito-corso[data-id="${cb.value}"]`).value;
        return {
          id: parseInt(cb.value),
          nome: cb.dataset.nome,
          esito: esito
        };
      });

      const dati = {
        id: id ? parseInt(id) : Date.now(),
        titolo: document.getElementById('titoloCorso').value,
        tipo: document.getElementById('tipoCorso').value,
        enteErogatore: document.getElementById('enteErogatore').value,
        luogo: document.getElementById('luogo').value,
        data: document.getElementById('dataInizio').value,
        dataFine: document.getElementById('dataFine').value,
        ore: document.getElementById('oreCorso').value,
        stato: document.getElementById('statoCorso').value,
        rilasciaAttestato: document.getElementById('rilasciaAttestato').checked,
        scadenzaAttestato: document.getElementById('scadenzaAttestato').value,
        partecipanti: partecipanti,
        note: document.getElementById('noteCorso').value
      };

      if (id) {
        const index = corsi.findIndex(c => c.id === parseInt(id));
        corsi[index] = dati;
      } else {
        corsi.push(dati);
      }

      localStorage.setItem('corsi', JSON.stringify(corsi));
      annullaForm();
      mostraCorsi();
    }

    function modificaCorso(id) {
      const corsi = JSON.parse(localStorage.getItem('corsi') || '[]');
      const c = corsi.find(c => c.id === id);

      document.getElementById('idCorso').value = c.id;
      document.getElementById('titoloCorso').value = c.titolo;
      document.getElementById('tipoCorso').value = c.tipo;
      document.getElementById('enteErogatore').value = c.enteErogatore || '';
      document.getElementById('luogo').value = c.luogo || '';
      document.getElementById('dataInizio').value = c.data;
      document.getElementById('dataFine').value = c.dataFine || '';
      document.getElementById('oreCorso').value = c.ore || '';
      document.getElementById('statoCorso').value = c.stato;
      document.getElementById('rilasciaAttestato').checked = c.rilasciaAttestato || false;
      document.getElementById('scadenzaAttestato').value = c.scadenzaAttestato || '';
      document.getElementById('noteCorso').value = c.note || '';

      toggleScadenza();
      caricaVolontariCorso();

      setTimeout(() => {
        if (c.partecipanti) {
          c.partecipanti.forEach(p => {
            const cb = document.querySelector(`.volontario-corso[value="${p.id}"]`);
            if (cb) {
              cb.checked = true;
              document.querySelector(`.esito-corso[data-id="${p.id}"]`).value = p.esito;
            }
          });
        }
      }, 100);

      document.getElementById('titoloForm').textContent = 'Modifica Corso';
      document.getElementById('formCorso').classList.remove('hidden');
      window.scrollTo(0, 0);
    }

    function eliminaCorso(id) {
      if (!confirm('Eliminare questo corso?')) return;
      let corsi = JSON.parse(localStorage.getItem('corsi') || '[]');
      corsi = corsi.filter(c => c.id !== id);
      localStorage.setItem('corsi', JSON.stringify(corsi));
      mostraCorsi();
    }

    function filtraCorsi() {
      mostraCorsi();
    }

    function mostraCorsi() {
      let corsi = JSON.parse(localStorage.getItem('corsi') || '[]');
      const filtro = document.getElementById('cercaCorso').value.toLowerCase();
      const filtroTipo = document.getElementById('filtroTipo').value;
      const filtroStato = document.getElementById('filtroStato').value;

      if (filtro) {
        corsi = corsi.filter(c => c.titolo.toLowerCase().includes(filtro) || c.tipo.toLowerCase().includes(filtro));
      }
      if (filtroTipo) {
        corsi = corsi.filter(c => c.tipo === filtroTipo);
      }
      if (filtroStato) {
        corsi = corsi.filter(c => c.stato === filtroStato);
      }

      corsi.sort((a, b) => new Date(b.data) - new Date(a.data));

      const lista = document.getElementById('listaCorsi');

      if (corsi.length === 0) {
        lista.innerHTML = `<div class="bg-white rounded-lg shadow p-8 text-center text-gray-500">
          <i class="fas fa-graduation-cap text-5xl mb-3 text-gray-300"></i>
          <p class="text-lg">Nessun corso trovato</p>
        </div>`;
        return;
      }

      const oggi = new Date();
      lista.innerHTML = corsi.map(c => {
        const coloreStato = c.stato === 'Concluso' ? 'bg-green-100 text-green-800' :
                           c.stato === 'In corso' ? 'bg-blue-100 text-blue-800' :
                           c.stato === 'Annullato' ? 'bg-red-100 text-red-800' :
                           'bg-yellow-100 text-yellow-800';

        const superati = c.partecipanti ? c.partecipanti.filter(p => p.esito === 'Superato').length : 0;
        const totali = c.partecipanti ? c.partecipanti.length : 0;

        let scadenzaHtml = '';
        if (c.rilasciaAttestato && c.scadenzaAttestato) {
          const scad = new Date(c.scadenzaAttestato);
          const giorni = Math.ceil((scad - oggi) / (1000 * 60 * 60 * 24));
          const coloreScad = giorni < 0 ? 'bg-red-100 text-red-800' : giorni < 60 ? 'bg-orange-100 text-orange-800' : 'bg-green-100 text-green-800';
          scadenzaHtml = `<span class="text-xs px-2 py-1 rounded ${coloreScad} ml-1"><i class="fas fa-certificate"></i> Scad: ${scad.toLocaleDateString('it-IT')}</span>`;
        }

        return `
        <div class="bg-white rounded-lg shadow p-5">
          <div class="flex flex-col lg:flex-row lg:justify-between lg:items-start gap-3 mb-3">
            <div class="flex-1">
              <h3 class="font-bold text-lg text-gray-800">${c.titolo}</h3>
              <div class="flex flex-wrap gap-2 mt-1">
                <span class="text-xs px-2 py-1 rounded bg-purple-100 text-purple-800">${c.tipo}</span>
                <span class="text-xs px-2 py-1 rounded ${coloreStato}">${c.stato}</span>
                ${scadenzaHtml}
              </div>
            </div>
            <div class="flex gap-2">
              <button onclick="modificaCorso(${c.id})" class="text-blue-600 hover:text-blue-800 text-xl"><i class="fas fa-edit"></i></button>
              <button onclick="eliminaCorso(${c.id})" class="text-red-600 hover:text-red-800 text-xl"><i class="fas fa-trash"></i></button>
            </div>
          </div>
          
          <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-3 text-sm">
            <div><i class="fas fa-calendar text-gray-500"></i> ${new Date(c.data).toLocaleDateString('it-IT')}${c.dataFine ? ' - ' + new Date(c.dataFine).toLocaleDateString('it-IT') : ''}</div>
            ${c.luogo ? `<div><i class="fas fa-map-marker-alt text-gray-500"></i> ${c.luogo}</div>` : ''}
            ${c.ore ? `<div><i class="fas fa-clock text-gray-500"></i> ${c.ore} ore</div>` : ''}
            ${c.enteErogatore ? `<div><i class="fas fa-building text-gray-500"></i> ${c.enteErogatore}</div>` : ''}
          </div>

          ${totali > 0 ? `
          <div class="bg-gray-50 rounded p-3">
            <p class="text-sm font-semibold mb-2"><i class="fas fa-users"></i> Partecipanti: ${superati}/${totali} superati</p>
            <div class="flex flex-wrap gap-1">
              ${c.partecipanti.map(p => `
                <span class="text-xs px-2 py-1 rounded ${p.esito === 'Superato' ? 'bg-green-100 text-green-800' : p.esito === 'Non superato' ? 'bg-red-100 text-red-800' : 'bg-gray-100 text-gray-800'}">
                  ${p.nome} - ${p.esito}
                </span>
              `).join('')}
            </div>
          </div>` : ''}
          
          ${c.note ? `<p class="text-sm text-gray-600 mt-2"><i class="fas fa-info-circle"></i> ${c.note}</p>` : ''}
        </div>
      `;
      }).join('');
    }

    function esportaPDF() {
      const corsi = JSON.parse(localStorage.getItem('corsi') || '[]');
      if (corsi.length === 0) {
        alert('Nessun corso da esportare');
        return;
      }

      const doc = new jsPDF();
      doc.setFontSize(18);
      doc.text('Elenco Corsi - Radio C.B. Lunigiana', 14, 20);
      doc.setFontSize(10);
      doc.text(`Generato il ${new Date().toLocaleDateString('it-IT')}`, 14, 27);

      const tableData = corsi.map(c => [
        c.titolo,
        c.tipo,
        new Date(c.data).toLocaleDateString('it-IT'),
        c.stato,
        c.partecipanti ? `${c.partecipanti.filter(p => p.esito === 'Superato').length}/${c.partecipanti.length}` : '0/0',
        c.rilasciaAttestato && c.scadenzaAttestato ? new Date(c.scadenzaAttestato).toLocaleDateString('it-IT') : '-'
      ]);

      doc.autoTable({
        startY: 35,
        head: [['Corso', 'Tipo', 'Data', 'Stato', 'Superati', 'Scad. Attestato']],
        body: tableData,
        styles: { fontSize: 8 },
        headStyles: { fillColor: [220, 38, 38] }
      });

      doc.save(`corsi_${new Date().toISOString().split('T')[0]}.pdf`);
    }

    mostraCorsi();
  </script>
  <script>
  // Mostra link Attestati solo ad Admin
  if (localStorage.getItem('utente_ruolo') === 'Admin') {
    document.getElementById('linkAttestati').classList.remove('hidden');
  }
</script>
</body>
</html>
