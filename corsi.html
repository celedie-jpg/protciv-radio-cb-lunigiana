<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corsi - Radio C.B. Lunigiana</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/jspdf@latest/dist/jspdf.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100">

  <div class="lg:hidden bg-blue-900 text-white p-4 flex justify-between items-center fixed top-0 left-0 right-0 z-50">
    <button onclick="toggleMenu()" class="text-2xl"><i class="fas fa-bars"></i></button>
    <a href="index.html" class="flex items-center gap-2">
      <img src="https://i.imgur.com/8RvEWed.png" alt="Logo" class="w-8 h-8 rounded-full object-cover">
      <span class="font-bold text-sm">Radio C.B. Lunigiana</span>
    </a>
    <a href="login.html" class="text-xl"><i class="fas fa-sign-out-alt"></i></a>
  </div>

  <div id="sidebar" class="fixed left-0 top-0 h-full w-64 bg-blue-900 text-white transform -translate-x-full lg:translate-x-0 transition-transform duration-200 z-40 overflow-y-auto">
    <div class="p-5 border-b border-blue-800 mt-16 lg:mt-0 text-center">
      <a href="index.html">
        <img src="https://i.imgur.com/8RvEWed.png" alt="Logo" class="w-16 h-16 mx-auto mb-2 rounded-full object-cover hover:opacity-80">
        <h2 class="text-xl font-bold hover:text-blue-200">ProtCiv Manager</h2>
      </a>
    </div>
    <nav class="p-4">
      <a href="index.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-home w-5"></i> Dashboard</a>
      <a href="servizi.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-tasks w-5"></i> Servizi</a>
      <a href="volontari.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-users w-5"></i> Volontari</a>
      <a href="corsi.html" class="flex items-center gap-3 p-3 rounded bg-blue-800 mb-2"><i class="fas fa-graduation-cap w-5"></i> Corsi</a>
      <a href="mezzi.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-truck w-5"></i> Mezzi</a>
      <a href="attrezzature.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-walkie-talkie w-5"></i> Attrezzature</a>
      <a href="report.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-file-pdf w-5"></i> Report</a>
      <a href="login.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mt-8"><i class="fas fa-sign-out-alt w-5"></i> Logout</a>
    </nav>
  </div>

  <div id="overlay" onclick="toggleMenu()" class="hidden fixed inset-0 bg-black bg-opacity-50 z-30 lg:hidden"></div>

  <div class="lg:ml-64 pt-20 lg:pt-8 p-4 lg:p-8">
    <div class="mb-4">
      <a href="index.html" class="inline-flex items-center gap-2 text-blue-600 hover:text-blue-800 font-semibold">
        <i class="fas fa-arrow-left"></i> Torna alla Dashboard
      </a>
    </div>

    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold text-gray-800">Gestione Corsi Formazione</h1>
      <button onclick="toggleForm()" class="bg-red-600 text-white px-4 py-2 rounded-lg font-bold">
        <i class="fas fa-plus"></i> Nuovo Corso
      </button>
    </div>

    <div id="formCorso" class="hidden bg-white rounded-lg shadow p-6 mb-6">
      <h3 class="font-bold text-lg mb-4" id="titoloForm">Nuovo Corso</h3>
      <form onsubmit="salvaCorso(event)">
        <input type="hidden" id="idCorso">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
          <input type="text" id="titoloCorso" placeholder="Titolo Corso *" required class="border p-2 rounded lg:col-span-2">
          <select id="tipoCorso" required class="border p-2 rounded">
            <option value="">Tipo Corso...</option>
            <option value="Base">Corso Base Protezione Civile</option>
            <option value="Antincendio">Antincendio Boschivo</option>
            <option value="Primo Soccorso">Primo Soccorso</option>
            <option value="BLSD">BLSD</option>
            <option value="Droni">Pilota Droni</option>
            <option value="Radiocomunicazioni">Radiocomunicazioni</option>
            <option value="Sicurezza">Sicurezza sul Lavoro</option>
            <option value="Logistica">Logistica Emergenze</option>
            <option value="Aggiornamento">Aggiornamento</option>
            <option value="Altro">Altro</option>
          </select>
          <input type="text" id="enteErogatore" placeholder="Ente Erogatore *" required class="border p-2 rounded">
          <input type="date" id="dataCorso" required class="border p-2 rounded">
          <input type="number" id="durataOre" placeholder="Durata ore *" required class="border p-2 rounded">
          <input type="text" id="sede" placeholder="Sede" class="border p-2 rounded">
          <input type="date" id="scadenzaAttestato" placeholder="Scadenza Attestato" class="border p-2 rounded">
          <select id="statoCorso" required class="border p-2 rounded">
            <option value="Programmato">Programmato</option>
            <option value="In corso">In corso</option>
            <option value="Concluso">Concluso</option>
            <option value="Annullato">Annullato</option>
          </select>
        </div>

        <div class="bg-green-50 border-2 border-green-300 rounded-lg p-4 mb-4">
          <h4 class="font-bold text-green-900 mb-3"><i class="fas fa-users"></i> Partecipanti</h4>
          <div id="listaVolontariCorso" class="max-h-64 overflow-y-auto bg-white rounded p-3">
            <p class="text-sm text-gray-500">Caricamento...</p>
          </div>
        </div>

        <textarea id="noteCorso" placeholder="Note / Programma" rows="2" class="border p-2 rounded w-full mb-4"></textarea>
        <div class="flex gap-2">
          <button type="submit" class="bg-red-600 text-white px-6 py-2 rounded font-bold">Salva</button>
          <button type="button" onclick="annullaForm()" class="bg-gray-400 text-white px-6 py-2 rounded">Annulla</button>
        </div>
      </form>
    </div>

    <div class="bg-white rounded-lg shadow p-4 mb-4">
      <div class="flex flex-wrap gap-2 mb-3">
        <button onclick="filtraCorsi('tutti')" id="btn-tutti" class="px-3 py-1 rounded-lg text-sm font-semibold bg-blue-600 text-white">
          Tutti
        </button>
        <button onclick="filtraCorsi('Programmato')" id="btn-Programmato" class="px-3 py-1 rounded-lg text-sm font-semibold bg-gray-200 text-gray-700">
          Programmati
        </button>
        <button onclick="filtraCorsi('In corso')" id="btn-In corso" class="px-3 py-1 rounded-lg text-sm font-semibold bg-gray-200 text-gray-700">
          In Corso
        </button>
        <button onclick="filtraCorsi('Concluso')" id="btn-Concluso" class="px-3 py-1 rounded-lg text-sm font-semibold bg-gray-200 text-gray-700">
          Conclusi
        </button>
        <button onclick="filtraCorsi('scadenza')" id="btn-scadenza" class="px-3 py-1 rounded-lg text-sm font-semibold bg-gray-200 text-gray-700">
          In Scadenza
        </button>
      </div>
      <span id="conteggioFiltro" class="ml-3 text-sm text-gray-600"></span>
    </div>

    <div id="listaCorsi" class="space-y-3"></div>
  </div>

  <script>
    let filtroAttuale = 'tutti';

    function toggleMenu() {
      document.getElementById('sidebar').classList.toggle('-translate-x-full');
      document.getElementById('overlay').classList.toggle('hidden');
    }

    function toggleForm() {
      const form = document.getElementById('formCorso');
      form.classList.toggle('hidden');
      if (!form.classList.contains('hidden')) {
        document.getElementById('titoloForm').textContent = 'Nuovo Corso';
        document.querySelector('form').reset();
        document.getElementById('idCorso').value = '';
        caricaVolontariForm();
      }
    }

    function annullaForm() {
      document.getElementById('formCorso').classList.add('hidden');
      document.querySelector('form').reset();
    }

    function caricaVolontariForm() {
      const volontari = JSON.parse(localStorage.getItem('volontari') || '[]').filter(v => v.stato === 'Attivo');
      const container = document.getElementById('listaVolontariCorso');

      if (volontari.length === 0) {
        container.innerHTML = '<p class="text-sm text-red-500">Nessun volontario attivo</p>';
        return;
      }

      container.innerHTML = volontari.map(v => `
        <label class="flex items-center p-2 hover:bg-gray-50 rounded cursor-pointer">
          <input type="checkbox" value="${v.id}" class="mr-2 volontario-corso-check">
          <span class="text-sm flex-1">${v.nome} ${v.cognome}</span>
          <select class="border p-1 rounded text-xs ml-2 esito-select" data-vol-id="${v.id}">
            <option value="Iscritto">Iscritto</option>
            <option value="Superato">Superato</option>
            <option value="Non superato">Non superato</option>
            <option value="Assente">Assente</option>
          </select>
        </label>
      `).join('');
    }

    function salvaCorso(e) {
      e.preventDefault();
      const corsi = JSON.parse(localStorage.getItem('corsi') || '[]');
      const id = document.getElementById('idCorso').value;

      const partecipanti = [];
      document.querySelectorAll('.volontario-corso-check:checked').forEach(cb => {
        const volId = parseInt(cb.value);
        const esito = document.querySelector(`.esito-select[data-vol-id="${volId}"]`).value;
        partecipanti.push({ id: volId, esito: esito });
      });

      const dati = {
        id: id? parseInt(id) : Date.now(),
        titolo: document.getElementById('titoloCorso').value,
        tipo: document.getElementById('tipoCorso').value,
        enteErogatore: document.getElementById('enteErogatore').value,
        data: document.getElementById('dataCorso').value,
        durataOre: parseInt(document.getElementById('durataOre').value),
        sede: document.getElementById('sede').value,
        scadenzaAttestato: document.getElementById('scadenzaAttestato').value,
        stato: document.getElementById('statoCorso').value,
        partecipanti: partecipanti,
        note: document.getElementById('noteCorso').value
      };

      if (id) {
        const index = corsi.findIndex(c => c.id === parseInt(id));
        corsi[index] = dati;
      } else {
        corsi.push(dati);
      }

      localStorage.setItem('corsi', JSON.stringify(corsi));
      annullaForm();
      mostraCorsi();
    }

    function modificaCorso(id) {
      const corsi = JSON.parse(localStorage.getItem('corsi') || '[]');
      const c = corsi.find(co => co.id === id);

      document.getElementById('idCorso').value = c.id;
      document.getElementById('titoloCorso').value = c.titolo;
      document.getElementById('tipoCorso').value = c.tipo;
      document.getElementById('enteErogatore').value = c.enteErogatore;
      document.getElementById('dataCorso').value = c.data;
      document.getElementById('durataOre').value = c.durataOre;
      document.getElementById('sede').value = c.sede || '';
      document.getElementById('scadenzaAttestato').value = c.scadenzaAttestato || '';
      document.getElementById('statoCorso').value = c.stato;
      document.getElementById('noteCorso').value = c.note || '';

      document.getElementById('titoloForm').textContent = 'Modifica Corso';
      document.getElementById('formCorso').classList.remove('hidden');
      caricaVolontariForm();

      setTimeout(() => {
        if (c.partecipanti) {
          c.partecipanti.forEach(p => {
            const cb = document.querySelector(`.volontario-corso-check[value="${p.id}"]`);
            if (cb) {
              cb.checked = true;
              const select = document.querySelector(`.esito-select[data-vol-id="${p.id}"]`);
              if (select) select.value = p.esito;
            }
          });
        }
      }, 100);

      window.scrollTo(0, 0);
    }

    function eliminaCorso(id) {
      if (!confirm('Eliminare questo corso?')) return;
      let corsi = JSON.parse(localStorage.getItem('corsi') || '[]');
      corsi = corsi.filter(c => c.id!== id);
      localStorage.setItem('corsi', JSON.stringify(corsi));
      mostraCorsi();
    }

    function filtraCorsi(tipo) {
      filtroAttuale = tipo;
      document.querySelectorAll('[id^="btn-"]').forEach(btn => {
        btn.classList.remove('bg-blue-600', 'text-white');
        btn.classList.add('bg-gray-200', 'text-gray-700');
      });
      const btnId = tipo === 'In corso'? 'btn-In corso' : 'btn-' + tipo;
      document.getElementById(btnId).classList.remove('bg-gray-200', 'text-gray-700');
      document.getElementById(btnId).classList.add('bg-blue-600', 'text-white');
      mostraCorsi();
    }

    function getCorsiFiltrati() {
      let corsi = JSON.parse(localStorage.getItem('corsi') || '[]');

      if (filtroAttuale === 'scadenza') {
        const oggi = new Date();
        const tra60gg = new Date();
        tra60gg.setDate(oggi.getDate() + 60);
        corsi = corsi.filter(c => {
          if (!c.scadenzaAttestato) return false;
          const scad = new Date(c.scadenzaAttestato);
          return scad >= oggi && scad <= tra60gg;
        });
      } else if (filtroAttuale!== 'tutti') {
        corsi = corsi.filter(c => c.stato === filtroAttuale);
      }

      return corsi;
    }

    function mostraCorsi() {
      const corsi = getCorsiFiltrati();
      const volontari = JSON.parse(localStorage.getItem('volontari') || '[]');
      const lista = document.getElementById('listaCorsi');
      document.getElementById('conteggioFiltro').textContent = `${corsi.length} corsi trovati`;

      if (corsi.length === 0) {
        lista.innerHTML = `<div class="bg-white rounded-lg shadow p-8 text-center text-gray-500">
          <i class="fas fa-graduation-cap text-5xl mb-3 text-gray-300"></i>
          <p class="text-lg">Nessun corso trovato</p>
        </div>`;
        return;
      }

      lista.innerHTML = corsi.map(c => {
        const coloreStato = c.stato === 'Concluso'? 'bg-green-100 text-green-800' :
                           c.stato === 'In corso'? 'bg-blue-100 text-blue-800' :
                           c.stato === 'Annullato'? 'bg-red-100 text-red-800' :
                           'bg-yellow-100 text-yellow-800';

        const scadBadge = c.scadenzaAttestato? `<span class="text-xs px-2 py-1 rounded bg-orange-100 text-orange-800 ml-2"><i class="fas fa-calendar-times"></i> Scade: ${new Date(c.scadenzaAttestato).toLocaleDateString('it-IT')}</span>` : '';

        let listaPart = '';
        if (c.partecipanti && c.partecipanti.length > 0) {
          const superati = c.partecipanti.filter(p => p.esito === 'Superato').length;
          listaPart = `<div class="mt-2 text-xs text-gray-600"><i class="fas fa-users"></i> ${c.partecipanti.length} partecipanti - ${superati} superati</div>`;
        }

        return `
        <div class="bg-white rounded-lg shadow p-4">
          <div class="flex justify-between items-start mb-3">
            <div>
              <h3 class="font-bold text-lg">${c.titolo}${scadBadge}</h3>
              <span class="text-xs px-2 py-1 rounded ${coloreStato}">${c.stato}</span>
              <span class="text-xs px-2 py-1 rounded bg-purple-100 text-purple-800 ml-1">${c.tipo}</span>
            </div>
            <div class="flex gap-2">
              <button onclick="modificaCorso(${c.id})" class="text-blue-600 hover:text-blue-800"><i class="fas fa-edit"></i></button>
              <button onclick="eliminaCorso(${c.id})" class="text-red-600 hover:text-red-800"><i class="fas fa-trash"></i></button>
            </div>
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-2 text-sm">
            <p><i class="fas fa-calendar text-gray-500"></i> ${new Date(c.data).toLocaleDateString('it-IT')}</p>
            <p><i class="fas fa-clock text-gray-500"></i> ${c.durataOre} ore</p>
            <p><i class="fas fa-building text-gray-500"></i> ${c.enteErogatore}</p>
            ${c.sede? `<p><i class="fas fa-map-marker-alt text-gray-500"></i> ${c.sede}</p>` : ''}
          </div>
          ${listaPart}
        </div>
      `}).join('');
    }

    mostraCorsi();
  </script>
</body>
</html>
