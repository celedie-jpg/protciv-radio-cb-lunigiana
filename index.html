<!DOCTYPE html>
<html lang="it">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProtCiv Manager - Radio C.B. Lunigiana</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F2F2F7; --sidebar: #FFFFFF; --text: #1C1C1E; --text-secondary: #8E8E93;
  --primary: #0A84FF; --green: #30D158; --red: #FF453A; --border: #E5E5EA;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg); display: flex; height: 100vh; overflow: hidden;
}
.sidebar {
  width: 240px; background: var(--sidebar); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; padding: 24px 16px;
}
.logo { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; padding: 0 8px; }
.logo-img { width: 40px; height: 40px; object-fit: contain; border-radius: 10px; }
.logo-text { flex: 1; }
.logo-title { font-size: 13px; font-weight: 600; line-height: 1.2; }
.logo-subtitle { font-size: 11px; color: var(--text-secondary); }
.nav { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.nav-item {
  display: flex; align-items: center; gap: 12px; padding: 12px 16px;
  border-radius: 12px; cursor: pointer; transition: all 0.2s;
  color: var(--text-secondary); font-size: 14px; font-weight: 500; text-decoration: none;
}
.nav-item:hover { background: var(--bg); color: var(--text); }
.nav-item.active { background: var(--primary); color: white; }
.nav-icon { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; }
.user-section { padding: 16px 8px; border-top: 1px solid var(--border); margin-top: auto; }
.user-info { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.user-avatar {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--primary), #AF52DE);
  color: white; display: flex; align-items: center; justify-content: center;
  font-weight: 600; font-size: 14px;
}
.user-details { flex: 1; }
.user-name { font-size: 14px; font-weight: 600; }
.user-role { font-size: 12px; color: var(--text-secondary); }
.btn-logout {
  width: 100%; padding: 10px; background: var(--bg); border: none;
  border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer;
}
.btn-logout:hover { background: rgba(255,69,58,0.1); color: var(--red); }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.content { flex: 1; overflow: hidden; }
iframe { width: 100%; height: 100%; border: none; }
</style>
</head<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    * {
    box-sizing: border-box;
  }
  
  body {
    margin: 0;
    padding: 0;
    width: 100% !important;
    max-width: 100% !important;
  }
  
  /* Su mobile nasconde sidebar e la rende a scomparsa */
  @media (max-width: 768px) {
    .sidebar, #sidebar, aside {
      transform: translateX(-100%);
      position: fixed;
      z-index: 999;
    }
    .sidebar.open, #sidebar.open {
      transform: translateX(0);
    }
    .main-content, #main, main {
      margin-left: 0 !important;
      width: 100% !important;
      padding: 1rem !important;
    }
  }
</style>>
<body>

<div class="sidebar">
  <div class="logo">
    <img src="https://i.imgur.com/8RvEWed.png" class="logo-img" alt="Logo">
    <div class="logo-text">
      <div class="logo-title">Radio C.B. Lunigiana</div>
      <div class="logo-subtitle">ProtCiv Manager</div>
    </div>
  </div>

  <nav class="nav">
    <a class="nav-item active" onclick="loadPage('dashboard.html', this)">
      <div class="nav-icon">📊</div><span>Dashboard</span>
    </a>
    <a class="nav-item" onclick="loadPage('volontari.html', this)" data-admin="true">
      <div class="nav-icon">👥</div><span>Volontari</span>
    </a>
    <a class="nav-item" onclick="loadPage('servizi.html', this)">
      <div class="nav-icon">📋</div><span>Servizi</span>
    </a>
    <a class="nav-item" onclick="loadPage('miei_turni.html', this)" data-volontario="true">
      <div class="nav-icon">📅</div><span>I Miei Turni</span>
    </a>
    <a class="nav-item" onclick="loadPage('mezzi.html', this)" data-admin="true">
      <div class="nav-icon">🚒</div><span>Mezzi</span>
    </a>
    <a class="nav-item" onclick="loadPage('utenti.html', this)" data-admin="true">
      <div class="nav-icon">⚙️</div><span>Utenti</span>
    </a>
  </nav>

  <div class="user-section">
    <div class="user-info">
      <div class="user-avatar" id="userAvatar">A</div>
      <div class="user-details">
        <div class="user-name" id="userName">Admin</div>
        <div class="user-role" id="userRole">Amministratore</div>
      </div>
    <button class="btn-logout" onclick="logout()">Esci</button>
  </div>
</div>

<div class="main">
  <div class="content">
    <iframe id="contentFrame" src="dashboard.html"></iframe>
  </div>
</div>

<script>
// Controllo sessione
const session = JSON.parse(localStorage.getItem('pc_session') || 'null');
if (!session) {
  window.location.href = 'login.html';
}

// Inizializza dati demo
if (!localStorage.getItem('pc_volontari_v4')) {
  localStorage.setItem('pc_volontari_v4', JSON.stringify([
    { id: 1, nome: 'Mario Rossi', email: 'mario@email.it', telefono: '3331234567', attivo: true },
    { id: 2, nome: 'Luigi Bianchi', email: 'luigi@email.it', telefono: '3337654321', attivo: true }
  ]));
}
if (!localStorage.getItem('pc_servizi_v3')) {
  const domani = new Date();
  domani.setDate(domani.getDate() + 1);
  domani.setHours(10, 0, 0, 0);
  const fine = new Date(domani);
  fine.setHours(14, 0, 0, 0);

  localStorage.setItem('pc_servizi_v3', JSON.stringify([
    {
      id: 1, titolo: 'Monitoraggio Fiume Magra',
      dataInizio: domani.toISOString(), dataFine: fine.toISOString(),
      mansione: 'monitoraggio', ambito: 'locale', luogo: 'Ponte Aulla',
      volontari: [1], volontariRichiesti: 2, stato: 'programmato'
    }
  ]));
}
if (!localStorage.getItem('pc_presenze')) {
  localStorage.setItem('pc_presenze', JSON.stringify([]));
}
if (!localStorage.getItem('pc_mezzi')) {
  localStorage.setItem('pc_mezzi', JSON.stringify([
    { id: 1, nome: 'Pick-up Protezione Civile', targa: 'PC001XX', stato: 'disponibile' }
  ]));
}

// Setup UI per ruolo
document.getElementById('userName').textContent = session.nome;
document.getElementById('userRole').textContent = session.ruolo === 'admin'? 'Amministratore' : 'Volontario';
document.getElementById('userAvatar').textContent = session.nome.split(' ').map(n => n[0]).join('').substring(0, 2);

// Nascondi menu in base al ruolo
if (session.ruolo === 'volontario') {
  document.querySelectorAll('[data-admin="true"]').forEach(el => el.style.display = 'none');
} else {
  document.querySelectorAll('[data-volontario="true"]').forEach(el => el.style.display = 'none');
}

function loadPage(page, element) {
  document.getElementById('contentFrame').src = page;
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  element.classList.add('active');
}

function logout() {
  if (confirm('Vuoi uscire?')) {
    localStorage.removeItem('pc_session');
    window.location.href = 'login.html';
  }
}

// NOTIFICHE PUSH 24H PRIMA
async function initNotifiche() {
  if (!('Notification' in window)) return;

  if (Notification.permission === 'default') {
    const permesso = await Notification.requestPermission();
    if (permesso!== 'granted') return;
  }

  if (Notification.permission === 'granted') {
    controllaServizi24h();
    setInterval(controllaServizi24h, 60 * 60 * 1000); // Ogni ora
  }
}

function controllaServizi24h() {
  const servizi = JSON.parse(localStorage.getItem('pc_servizi_v3') || '[]');
  const ora = new Date();
  const tra24h = new Date(ora.getTime() + 24 * 60 * 60 * 1000);
  const tra23h = new Date(ora.getTime() + 23 * 60 * 60 * 1000);

  const notificheInviate = JSON.parse(localStorage.getItem('pc_notifiche_inviate') || '[]');

  servizi.forEach(s => {
    const dataServ = new Date(s.dataInizio);

    if (dataServ >= tra23h && dataServ <= tra24h &&!notificheInviate.includes(s.id)) {
      if (session.ruolo === 'admin' || s.volontari.includes(session.volontarioId)) {
        new Notification('Servizio domani - Radio C.B. Lunigiana', {
          body: `${s.titolo}\n${dataServ.toLocaleTimeString('it-IT', {hour: '2-digit', minute: '2-digit'})} - ${s.luogo}`,
          icon: 'https://i.imgur.com/8RvEWed.png',
          tag: `servizio-${s.id}`
        });

        notificheInviate.push(s.id);
        localStorage.setItem('pc_notifiche_inviate', JSON.stringify(notificheInviate));
      }
    }
  });
}

initNotifiche();
</script>

</body>
</html>
