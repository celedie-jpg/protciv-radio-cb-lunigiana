<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ProtCiv Radio C.B. Lunigiana</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100">

  <!-- Menu Mobile -->
  <div class="lg:hidden fixed top-0 left-0 right-0 bg-blue-900 text-white p-4 z-50 flex justify-between items-center">
    <div class="flex items-center gap-3">
      <button onclick="toggleMenu()" class="text-2xl">
        <i class="fas fa-bars"></i>
      </button>
      <span class="font-bold">Radio C.B. Lunigiana</span>
    </div>
    <button onclick="logout()" class="text-sm">
      <i class="fas fa-sign-out-alt"></i>
    </button>
  </div>

  <!-- Sidebar -->
  <div id="sidebar" class="fixed left-0 top-0 h-full w-64 bg-blue-900 text-white transform -translate-x-full lg:translate-x-0 transition-transform duration-200 z-40">
    <div class="p-5 border-b border-blue-800 mt-16 lg:mt-0">
      <h2 class="text-xl font-bold">ProtCiv Manager</h2>
      <p class="text-xs text-blue-200 mt-1">Radio C.B. Lunigiana</p>
    </div>
    <nav class="p-4">
      <a href="index.html" class="flex items-center gap-3 p-3 rounded bg-blue-800 mb-2">
        <i class="fas fa-home w-5"></i> Dashboard
      </a>
      <a href="servizi.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2">
        <i class="fas fa-tasks w-5"></i> Servizi
      </a>
      <a href="volontari.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2">
        <i class="fas fa-users w-5"></i> Volontari
      </a>
      <a href="#" onclick="logout()" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mt-8">
        <i class="fas fa-sign-out-alt w-5"></i> Logout
      </a>
    </nav>
  </div>

  <!-- Overlay -->
  <div id="overlay" onclick="toggleMenu()" class="hidden fixed inset-0 bg-black bg-opacity-50 z-30 lg:hidden"></div>

  <!-- Contenuto -->
  <div class="lg:ml-64 pt-20 lg:pt-8 p-4 lg:p-8">
    <div class="mb-6 hidden lg:block">
      <h1 class="text-3xl font-bold text-gray-800">Dashboard</h1>
      <p class="text-gray-600">Benvenuto, <span id="userName">Admin</span></p>
    </div>

    <!-- Statistiche -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 lg:gap-4 mb-6">
      <div class="bg-white p-4 rounded-lg shadow">
        <p class="text-gray-500 text-xs lg:text-sm">Volontari</p>
        <p class="text-2xl lg:text-3xl font-bold text-blue-600">0</p>
      </div>
      <div class="bg-white p-4 rounded-lg shadow">
        <p class="text-gray-500 text-xs lg:text-sm">Servizi Mese</p>
        <p class="text-2xl lg:text-3xl font-bold text-green-600">0</p>
      </div>
      <div class="bg-white p-4 rounded-lg shadow">
        <p class="text-gray-500 text-xs lg:text-sm">In Corso</p>
        <p class="text-2xl lg:text-3xl font-bold text-orange-600">0</p>
      </div>
      <div class="bg-white p-4 rounded-lg shadow">
        <p class="text-gray-500 text-xs lg:text-sm">Emergenze</p>
        <p class="text-2xl lg:text-3xl font-bold text-red-600">0</p>
      </div>
    </div>

    <!-- Pulsanti Rapidi -->
    <div class="grid grid-cols-1 gap-4">
      <a href="servizi.html" class="bg-red-600 text-white p-6 rounded-lg shadow-lg text-center">
        <i class="fas fa-exclamation-triangle text-3xl mb-2"></i>
        <p class="font-bold text-lg">NUOVA EMERGENZA</p>
      </a>
      <a href="volontari.html" class="bg-blue-600 text-white p-6 rounded-lg shadow-lg text-center">
        <i class="fas fa-user-plus text-3xl mb-2"></i>
        <p class="font-bold text-lg">Aggiungi Volontario</p>
      </a>
    </div>
  </div>

  <script>
    // Controlla login DOPO che la pagina è caricata
    window.addEventListener('load', function() {
      const user = localStorage.getItem('user');
      if (!user) {
        window.location.href = 'login.html';
      } else {
        const userData = JSON.parse(user);
        document.getElementById('userName').textContent = userData.username || 'Admin';
      }
    });

    function toggleMenu() {
      document.getElementById('sidebar').classList.toggle('-translate-x-full');
      document.getElementById('overlay').classList.toggle('hidden');
    }

    function logout() {
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    }
  </script>
</body>
</html>
