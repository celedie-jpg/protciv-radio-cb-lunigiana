<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ProtCiv Radio C.B. Lunigiana</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body class="bg-gray-100">
  
  <!-- Controllo login -->
  <script>
    if (!localStorage.getItem('user')) {
      window.location.href = 'login.html';
    }
    const user = JSON.parse(localStorage.getItem('user'));
  </script>

  <!-- Menu Mobile -->
  <div class="lg:hidden fixed top-0 left-0 right-0 bg-blue-900 text-white p-4 z-50 flex justify-between items-center">
    <div class="flex items-center gap-3">
      <button onclick="toggleMenu()" class="text-2xl">
        <i class="fas fa-bars"></i>
      </button>
      <span class="font-bold">Radio C.B. Lunigiana</span>
    </div>
    <button onclick="logout()" class="text-sm">
      <i class="fas fa-sign-out-alt"></i> Esci
    </button>
  </div>

  <!-- Sidebar -->
  <div id="sidebar" class="fixed left-0 top-0 h-full w-64 bg-blue-900 text-white transform -translate-x-full lg:translate-x-0 transition-transform duration-200 z-40 lg:z-30">
    <div class="p-5 border-b border-blue-800">
      <h2 class="text-xl font-bold">ProtCiv Manager</h2>
      <p class="text-xs text-blue-200 mt-1">Radio C.B. Lunigiana</p>
    </div>
    <nav class="p-4">
      <a href="index.html" class="flex items-center gap-3 p-3 rounded bg-blue-800 mb-2">
        <i class="fas fa-home w-5"></i> Dashboard
      </a>
      <a href="servizi.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2">
        <i class="fas fa-tasks w-5"></i> Servizi
      </a>
      <a href="volontari.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2">
        <i class="fas fa-users w-5"></i> Volontari
      </a>
      <a href="login.html" onclick="logout()" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mt-8">
        <i class="fas fa-sign-out-alt w-5"></i> Logout
      </a>
    </nav>
  </div>

  <!-- Overlay per chiudere menu su mobile -->
  <div id="overlay" onclick="toggleMenu()" class="hidden fixed inset-0 bg-black bg-opacity-50 z-30 lg:hidden"></div>

  <!-- Contenuto Principale -->
  <div class="lg:ml-64 pt-16 lg:pt-0 p-4 lg:p-8">
    <div class="mb-6 hidden lg:block">
      <h1 class="text-3xl font-bold text-gray-800">Dashboard</h1>
      <p class="text-gray-600">Benvenuto, <span id="userName"></span></p>
    </div>

    <!-- Statistiche -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
      <div class="bg-white p-5 rounded-lg shadow">
        <div class="flex justify-between items-center">
          <div>
            <p class="text-gray-500 text-sm">Volontari Attivi</p>
            <p class="text-3xl font-bold text-blue-600" id="totVolontari">0</p>
          </div>
          <i class="fas fa-users text-3xl text-blue-200"></i>
        </div>
      </div>
      <div class="bg-white p-5 rounded-lg shadow">
        <div class="flex justify-between items-center">
          <div>
            <p class="text-gray-500 text-sm">Servizi Mese</p>
            <p class="text-3xl font-bold text-green-600" id="totServizi">0</p>
          </div>
          <i class="fas fa-calendar-check text-3xl text-green-200"></i>
        </div>
      </div>
      <div class="bg-white p-5 rounded-lg shadow">
        <div class="flex justify-between items-center">
          <div>
            <p class="text-gray-500 text-sm">In Corso</p>
            <p class="text-3xl font-bold text-orange-600" id="serviziCorso">0</p>
          </div>
          <i class="fas fa-clock text-3xl text-orange-200"></i>
        </div>
      </div>
      <div class="bg-white p-5 rounded-lg shadow">
        <div class="flex justify-between items-center">
          <div>
            <p class="text-gray-500 text-sm">Emergenze</p>
            <p class="text-3xl font-bold text-red-600" id="emergenze">0</p>
          </div>
          <i class="fas fa-exclamation-triangle text-3xl text-red-200"></i>
        </div>
      </div>
    </div>

    <!-- Pulsanti Rapidi -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <a href="servizi.html?action=new" class="bg-red-600 text-white p-6 rounded-lg shadow-lg text-center hover:bg-red-700">
        <i class="fas fa-plus-circle text-3xl mb-2"></i>
        <p class="font-bold">Nuova Emergenza</p>
      </a>
      <a href="volontari.html" class="bg-blue-600 text-white p-6 rounded-lg shadow-lg text-center hover:bg-blue-700">
        <i class="fas fa-user-plus text-3xl mb-2"></i>
        <p class="font-bold">Aggiungi Volontario</p>
      </a>
      <a href="servizi.html" class="bg-green-600 text-white p-6 rounded-lg shadow-lg text-center hover:bg-green-700">
        <i class="fas fa-list text-3xl mb-2"></i>
        <p class="font-bold">Vedi Servizi</p>
      </a>
    </div>
  </div>

  <script>
    // Menu mobile
    function toggleMenu() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('overlay');
      sidebar.classList.toggle('-translate-x-full');
      overlay.classList.toggle('hidden');
    }

    // Logout
    function logout() {
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    }

    // Carica dati utente
    document.getElementById('userName').textContent = user.username || 'Admin';
    
    // Chiudi menu quando clicchi un link su mobile
    document.querySelectorAll('#sidebar a').forEach(link => {
      link.addEventListener('click', () => {
        if (window.innerWidth < 1024) toggleMenu();
      });
    });
  </script>
</body>
</html>
