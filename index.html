<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProtCiv Radio C.B. Lunigiana</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100">

  <!-- Menu Mobile -->
  <div class="lg:hidden bg-blue-900 text-white p-4 flex justify-between items-center fixed top-0 left-0 right-0 z-50">
    <button onclick="toggleMenu()" class="text-2xl">
      <i class="fas fa-bars"></i>
    </button>
    <a href="index.html" class="flex items-center gap-2">
      <img src="https://i.imgur.com/8RvEWed.png" alt="Logo" class="w-8 h-8 rounded-full object-cover">
      <span class="font-bold text-sm">Radio C.B. Lunigiana</span>
    </a>
    <a href="login.html" class="text-xl"><i class="fas fa-sign-out-alt"></i></a>
  </div>

  <!-- Sidebar -->
  <div id="sidebar" class="fixed left-0 top-0 h-full w-64 bg-blue-900 text-white transform -translate-x-full lg:translate-x-0 transition-transform duration-200 z-40 overflow-y-auto">
    <div class="p-5 border-b border-blue-800 mt-16 lg:mt-0 text-center">
      <a href="index.html">
        <img src="https://i.imgur.com/8RvEWed.png" alt="Logo" class="w-16 h-16 mx-auto mb-2 rounded-full object-cover hover:opacity-80">
        <h2 class="text-xl font-bold hover:text-blue-200">ProtCiv Manager</h2>
      </a>
      <p class="text-xs text-blue-200 mt-1">Radio C.B. Lunigiana</p>
    </div>
    <nav class="p-4">
      <a href="index.html" class="flex items-center gap-3 p-3 rounded bg-blue-800 mb-2">
        <i class="fas fa-home w-5"></i> Dashboard
      </a>
      <a href="servizi.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2">
        <i class="fas fa-tasks w-5"></i> Servizi
      </a>
      <a href="volontari.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2">
        <i class="fas fa-users w-5"></i> Volontari
      </a>
      <a href="mezzi.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2">
        <i class="fas fa-truck w-5"></i> Mezzi
      </a>
      <a href="attrezzature.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2">
        <i class="fas fa-walkie-talkie w-5"></i> Attrezzature
      </a>
      <a href="login.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mt-8">
        <i class="fas fa-sign-out-alt w-5"></i> Logout
      </a>
    </nav>
  </div>

  <div id="overlay" onclick="toggleMenu()" class="hidden fixed inset-0 bg-black bg-opacity-50 z-30 lg:hidden"></div>

  <!-- Contenuto -->
  <div class="lg:ml-64 pt-20 lg:pt-8 p-4 lg:p-8">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Dashboard</h1>

    <div class="grid grid-cols-2 lg:grid-cols-5 gap-3 mb-6">
      <div class="bg-white p-4 rounded-lg shadow text-center">
        <p class="text-gray-500 text-xs lg:text-sm">Volontari</p>
        <p class="text-2xl lg:text-3xl font-bold text-blue-600">0</p>
      </div>
      <div class="bg-white p-4 rounded-lg shadow text-center">
        <p class="text-gray-500 text-xs lg:text-sm">Servizi</p>
        <p class="text-2xl lg:text-3xl font-bold text-green-600">0</p>
      </div>
      <div class="bg-white p-4 rounded-lg shadow text-center">
        <p class="text-gray-500 text-xs lg:text-sm">Mezzi</p>
        <p class="text-2xl lg:text-3xl font-bold text-purple-600">0</p>
      </div>
      <div class="bg-white p-4 rounded-lg shadow text-center">
        <p class="text-gray-500 text-xs lg:text-sm">Radio</p>
        <p class="text-2xl lg:text-3xl font-bold text-orange-600">0</p>
      </div>
      <div class="bg-white p-4 rounded-lg shadow text-center">
        <p class="text-gray-500 text-xs lg:text-sm">Emergenze</p>
        <p class="text-2xl lg:text-3xl font-bold text-red-600">0</p>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
      <a href="servizi.html" class="block bg-red-600 text-white p-6 rounded-lg shadow-lg text-center">
        <i class="fas fa-exclamation-triangle text-3xl mb-2"></i>
        <p class="font-bold text-lg">NUOVA EMERGENZA</p>
      </a>
      
      <a href="volontari.html" class="block bg-blue-600 text-white p-6 rounded-lg shadow-lg text-center">
        <i class="fas fa-user-plus text-3xl mb-2"></i>
        <p class="font-bold text-lg">Aggiungi Volontario</p>
      </a>

      <a href="mezzi.html" class="block bg-green-600 text-white p-6 rounded-lg shadow-lg text-center">
        <i class="fas fa-truck text-3xl mb-2"></i>
        <p class="font-bold text-lg">Gestisci Mezzi</p>
      </a>

      <a href="attrezzature.html" class="block bg-orange-600 text-white p-6 rounded-lg shadow-lg text-center">
        <i class="fas fa-walkie-talkie text-3xl mb-2"></i>
        <p class="font-bold text-lg">Attrezzature</p>
      </a>
    </div>
  </div>

  <script>
    function toggleMenu() {
      document.getElementById('sidebar').classList.toggle('-translate-x-full');
      document.getElementById('overlay').classList.toggle('hidden');
    }
  </script>
</body>
</html>
