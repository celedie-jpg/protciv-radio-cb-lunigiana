<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attrezzature - Radio C.B. Lunigiana</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100">

  <div class="lg:hidden bg-blue-900 text-white p-4 flex justify-between items-center fixed top-0 left-0 right-0 z-50">
    <button onclick="toggleMenu()" class="text-2xl"><i class="fas fa-bars"></i></button>
    <a href="index.html" class="flex items-center gap-2">
      <img src="https://i.imgur.com/8RvEWed.png" alt="Logo" class="w-8 h-8 rounded-full object-cover">
      <span class="font-bold text-sm">Radio C.B. Lunigiana</span>
    </a>
    <a href="login.html" class="text-xl"><i class="fas fa-sign-out-alt"></i></a>
  </div>

  <div id="sidebar" class="fixed left-0 top-0 h-full w-64 bg-blue-900 text-white transform -translate-x-full lg:translate-x-0 transition-transform duration-200 z-40 overflow-y-auto">
    <div class="p-5 border-b border-blue-800 mt-16 lg:mt-0 text-center">
      <a href="index.html">
        <img src="https://i.imgur.com/8RvEWed.png" alt="Logo" class="w-16 h-16 mx-auto mb-2 rounded-full object-cover hover:opacity-80">
        <h2 class="text-xl font-bold hover:text-blue-200">ProtCiv Manager</h2>
      </a>
    </div>
    <nav class="p-4">
      <a href="index.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-home w-5"></i> Dashboard</a>
      <a href="servizi.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-tasks w-5"></i> Servizi</a>
      <a href="volontari.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-users w-5"></i> Volontari</a>
      <a href="mezzi.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-truck w-5"></i> Mezzi</a>
      <a href="attrezzature.html" class="flex items-center gap-3 p-3 rounded bg-blue-800 mb-2"><i class="fas fa-walkie-talkie w-5"></i> Attrezzature</a>
      <a href="report.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-file-pdf w-5"></i> Report</a>
      <a href="login.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mt-8"><i class="fas fa-sign-out-alt w-5"></i> Logout</a>
    </nav>
  </div>

  <div id="overlay" onclick="toggleMenu()" class="hidden fixed inset-0 bg-black bg-opacity-50 z-30 lg:hidden"></div>

  <div class="lg:ml-64 pt-20 lg:pt-8 p-4 lg:p-8">
    <div class="mb-4">
      <a href="index.html" class="inline-flex items-center gap-2 text-blue-600 hover:text-blue-800 font-semibold">
        <i class="fas fa-arrow-left"></i> Torna alla Dashboard
      </a>
    </div>

    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold text-gray-800">Gestione Attrezzature</h1>
      <button onclick="toggleForm()" class="bg-orange-600 text-white px-4 py-2 rounded-lg font-bold">
        <i class="fas fa-plus"></i> Nuova Attrezzatura
      </button>
    </div>

    <div id="formAttrezzatura" class="hidden bg-white rounded-lg shadow p-6 mb-6">
      <h3 class="font-bold text-lg mb-4" id="titoloForm">Nuova Attrezzatura</h3>
      <form onsubmit="salvaAttrezzatura(event)">
        <input type="hidden" id="idAttrezzatura">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
          <select id="categoria" required class="border p-2 rounded">
            <option value="">Categoria...</option>
            <optgroup label="RADIO">
              <option value="Radio Portatile">Radio Portatile</option>
              <option value="Radio Veicolare">Radio Veicolare</option>
              <option value="Radio Base">Radio Base</option>
              <option value="Radio Campale">Radio Campale</option>
              <option value="Ponte Radio">Ponte Radio</option>
            </optgroup>
            <optgroup label="ANTENNE">
              <option value="Antenna Dipolo">Antenna Dipolo</option>
              <option value="Antenna Direttiva">Antenna Direttiva</option>
              <option value="Antenna Collineare">Antenna Collineare</option>
              <option value="Antenna UHF">Antenna UHF</option>
              <option value="Antenna VHF">Antenna VHF</option>
            </optgroup>
            <option value="Altro">Altro</option>
          </select>
          <input type="text" id="modello" placeholder="Modello *" required class="border p-2 rounded">
          <input type="text" id="seriale" placeholder="Numero Seriale" class="border p-2 rounded">
          <input type="text" id="frequenza" placeholder="Frequenza (es: 446.00625 MHz)" class="border p-2 rounded">
          <select id="stato" required class="border p-2 rounded">
            <option value="Operativo">Operativo</option>
            <option value="Manutenzione">In Manutenzione</option>
            <option value="Fuori servizio">Fuori Servizio</option>
          </select>
        </div>
        <textarea id="note" placeholder="Note" rows="2" class="border p-2 rounded w-full mt-4"></textarea>
        <div class="flex gap-2 mt-4">
          <button type="submit" class="bg-orange-600 text-white px-6 py-2 rounded font-bold">Salva</button>
          <button type="button" onclick="annullaForm()" class="bg-gray-400 text-white px-6 py-2 rounded">Annulla</button>
        </div>
      </form>
    </div>

    <div id="listaAttrezzature" class="space-y-3"></div>
  </div>

  <script>
    function toggleMenu() {
      document.getElementById('sidebar').classList.toggle('-translate-x-full');
      document.getElementById('overlay').classList.toggle('hidden');
    }

    function toggleForm() {
      const form = document.getElementById('formAttrezzatura');
      form.classList.toggle('hidden');
      if (!form.classList.contains('hidden')) {
        document.getElementById('titoloForm').textContent = 'Nuova Attrezzatura';
        document.querySelector('form').reset();
        document.getElementById('idAttrezzatura').value = '';
      }
    }

    function annullaForm() {
      document.getElementById('formAttrezzatura').classList.add('hidden');
      document.querySelector('form').reset();
    }

    function salvaAttrezzatura(e) {
      e.preventDefault();
      const attrezzature = JSON.parse(localStorage.getItem('attrezzature') || '[]');
      const id = document.getElementById('idAttrezzatura').value;

      const dati = {
        id: id? parseInt(id) : Date.now(),
        categoria: document.getElementById('categoria').value,
        modello: document.getElementById('modello').value,
        seriale: document.getElementById('seriale').value,
        frequenza: document.getElementById('frequenza').value,
        stato: document.getElementById('stato').value,
        note: document.getElementById('note').value
      };

      if (id) {
        const index = attrezzature.findIndex(a => a.id === parseInt(id));
        attrezzature[index] = dati;
      } else {
        attrezzature.push(dati);
      }

      localStorage.setItem('attrezzature', JSON.stringify(attrezzature));
      annullaForm();
      mostraAttrezzature();
    }

    function modificaAttrezzatura(id) {
      const attrezzature = JSON.parse(localStorage.getItem('attrezzature') || '[]');
      const a = attrezzature.find(a => a.id === id);

      document.getElementById('idAttrezzatura').value = a.id;
      document.getElementById('categoria').value = a.categoria;
      document.getElementById('modello').value = a.modello;
      document.getElementById('seriale').value = a.seriale || '';
      document.getElementById('frequenza').value = a.frequenza || '';
      document.getElementById('stato').value = a.stato;
      document.getElementById('note').value = a.note || '';

      document.getElementById('titoloForm').textContent = 'Modifica Attrezzatura';
      document.getElementById('formAttrezzatura').classList.remove('hidden');
      window.scrollTo(0, 0);
    }

    function eliminaAttrezzatura(id) {
      if (!confirm('Eliminare questa attrezzatura?')) return;
      let attrezzature = JSON.parse(localStorage.getItem('attrezzature') || '[]');
      attrezzature = attrezzature.filter(a => a.id!== id);
      localStorage.setItem('attrezzature', JSON.stringify(attrezzature));
      mostraAttrezzature();
    }

    function mostraAttrezzature() {
      const attrezzature = JSON.parse(localStorage.getItem('attrezzature') || '[]');
      const lista = document.getElementById('listaAttrezzature');

      if (attrezzature.length === 0) {
        lista.innerHTML = `<div class="bg-white rounded-lg shadow p-8 text-center text-gray-500">
          <i class="fas fa-walkie-talkie text-5xl mb-3 text-gray-300"></i>
          <p class="text-lg">Nessuna attrezzatura inserita</p>
        </div>`;
        return;
      }

      lista.innerHTML = attrezzature.map(a => {
        const coloreStato = a.stato === 'Operativo'? 'bg-green-100 text-green-800' :
                           a.stato === 'Manutenzione'? 'bg-yellow-100 text-yellow-800' :
                           'bg-red-100 text-red-800';

        return `
        <div class="bg-white rounded-lg shadow p-4">
          <div class="flex justify-between items-start mb-3">
            <div>
              <h3 class="font-bold text-lg">${a.categoria} - ${a.modello}</h3>
              <span class="text-xs px-2 py-1 rounded ${coloreStato}">${a.stato}</span>
            </div>
            <div class="flex gap-2">
              <button onclick="modificaAttrezzatura(${a.id})" class="text-blue-600 hover:text-blue-800"><i class="fas fa-edit"></i></button>
              <button onclick="eliminaAttrezzatura(${a.id})" class="text-red-600 hover:text-red-800"><i class="fas fa-trash"></i></button>
            </div>
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-2 text-sm">
            <p><i class="fas fa-barcode text-gray-500"></i> ${a.seriale || '-'}</p>
            <p><i class="fas fa-signal text-gray-500"></i> ${a.frequenza || '-'}</p>
            <p><i class="fas fa-sticky-note text-gray-500"></i> ${a.note || '-'}</p>
          </div>
        </div>
      `}).join('');
    }

    mostraAttrezzature();
  </script>
</body>
</html>
