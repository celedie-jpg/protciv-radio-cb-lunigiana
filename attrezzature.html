<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attrezzature - Radio C.B. Lunigiana</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100">

  <div class="lg:hidden bg-blue-900 text-white p-4 flex justify-between items-center fixed top-0 left-0 right-0 z-50">
    <button onclick="toggleMenu()" class="text-2xl"><i class="fas fa-bars"></i></button>
    <a href="index.html" class="flex items-center gap-2">
      <img src="https://i.imgur.com/8RvEWed.png" alt="Logo" class="w-8 h-8 rounded-full object-cover">
      <span class="font-bold text-sm">Radio C.B. Lunigiana</span>
    </a>
    <a href="login.html" class="text-xl"><i class="fas fa-sign-out-alt"></i></a>
  </div>

  <div id="sidebar" class="fixed left-0 top-0 h-full w-64 bg-blue-900 text-white transform -translate-x-full lg:translate-x-0 transition-transform duration-200 z-40 overflow-y-auto">
    <div class="p-5 border-b border-blue-800 mt-16 lg:mt-0 text-center">
      <a href="index.html">
        <img src="https://i.imgur.com/8RvEWed.png" alt="Logo" class="w-16 h-16 mx-auto mb-2 rounded-full object-cover hover:opacity-80">
        <h2 class="text-xl font-bold hover:text-blue-200">ProtCiv Manager</h2>
      </a>
    </div>
    <nav class="p-4">
      <a href="index.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-home w-5"></i> Dashboard</a>
      <a href="servizi.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-tasks w-5"></i> Servizi</a>
      <a href="volontari.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-users w-5"></i> Volontari</a>
      <a href="mezzi.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-truck w-5"></i> Mezzi</a>
      <a href="attrezzature.html" class="flex items-center gap-3 p-3 rounded bg-blue-800 mb-2"><i class="fas fa-walkie-talkie w-5"></i> Attrezzature</a>
      <a href="login.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mt-8"><i class="fas fa-sign-out-alt w-5"></i> Logout</a>
    </nav>
  </div>

  <div id="overlay" onclick="toggleMenu()" class="hidden fixed inset-0 bg-black bg-opacity-50 z-30 lg:hidden"></div>

  <div class="lg:ml-64 pt-20 lg:pt-8 p-4 lg:p-8">
    <div class="mb-4">
      <a href="index.html" class="inline-flex items-center gap-2 text-blue-600 hover:text-blue-800 font-semibold">
        <i class="fas fa-arrow-left"></i> Torna alla Dashboard
      </a>
    </div>

    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold text-gray-800">Attrezzature e Radio</h1>
      <button onclick="toggleForm()" class="bg-orange-600 text-white px-4 py-2 rounded-lg font-bold">
        <i class="fas fa-plus"></i> Nuova
      </button>
    </div>

    <div id="formAttrezzatura" class="hidden bg-white rounded-lg shadow p-4 mb-6">
      <h3 class="font-bold text-lg mb-4">Nuova Attrezzatura</h3>
      <form onsubmit="salvaAttrezzatura(event)">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
          <select id="tipo" required class="border p-2 rounded">
            <option value="">Tipo...</option>
            <option value="Radio Portatile">Radio Portatile</option>
            <option value="Radio Fissa">Radio Fissa</option>
            <option value="Generatore">Generatore</option>
            <option value="Torre Faro">Torre Faro</option>
            <option value="Altro">Altro</option>
          </select>
          <input type="text" id="modello" placeholder="Modello/Marca" required class="border p-2 rounded">
          <input type="text" id="seriale" placeholder="N. Seriale/Inventario" class="border p-2 rounded">
          <select id="stato" required class="border p-2 rounded">
            <option value="">Stato...</option>
            <option value="Operativo">Operativo</option>
            <option value="Manutenzione">Manutenzione</option>
            <option value="Guasto">Guasto</option>
          </select>
        </div>
        <div class="flex gap-2">
          <button type="submit" class="bg-orange-600 text-white px-4 py-2 rounded font-bold">Salva</button>
          <button type="button" onclick="toggleForm()" class="bg-gray-400 text-white px-4 py-2 rounded">Annulla</button>
        </div>
      </form>
    </div>

    <div id="listaAttrezzature" class="bg-white rounded-lg shadow overflow-hidden"></div>
  </div>

  <script>
    function toggleMenu() {
      document.getElementById('sidebar').classList.toggle('-translate-x-full');
      document.getElementById('overlay').classList.toggle('hidden');
    }

    function toggleForm() {
      document.getElementById('formAttrezzatura').classList.toggle('hidden');
    }

    function salvaAttrezzatura(e) {
      e.preventDefault();
      const attrezzature = JSON.parse(localStorage.getItem('attrezzature') || '[]');
      attrezzature.push({
        id: Date.now(),
        tipo: document.getElementById('tipo').value,
        modello: document.getElementById('modello').value,
        seriale: document.getElementById('seriale').value,
        stato: document.getElementById('stato').value
      });
      localStorage.setItem('attrezzature', JSON.stringify(attrezzature));
      document.querySelector('form').reset();
      toggleForm();
      mostraAttrezzature();
    }

    function eliminaAttrezzatura(id) {
      if (!confirm('Eliminare questa attrezzatura?')) return;
      let attrezzature = JSON.parse(localStorage.getItem('attrezzature') || '[]');
      attrezzature = attrezzature.filter(a => a.id !== id);
      localStorage.setItem('attrezzature', JSON.stringify(attrezzature));
      mostraAttrezzature();
    }

    function mostraAttrezzature() {
      const attrezzature = JSON.parse(localStorage.getItem('attrezzature') || '[]');
      const lista = document.getElementById('listaAttrezzature');
      
      if (attrezzature.length === 0) {
        lista.innerHTML = `<div class="p-4 text-center text-gray-500">
          <i class="fas fa-walkie-talkie text-4xl mb-2 text-gray-300"></i>
          <p>Nessuna attrezzatura inserita</p>
        </div>`;
        return;
      }

      lista.innerHTML = attrezzature.map(a => `
        <div class="border-b p-4 flex justify-between items-center">
          <div>
            <p class="font-bold">${a.tipo}</p>
            <p class="text-sm text-gray-600">${a.modello}</p>
