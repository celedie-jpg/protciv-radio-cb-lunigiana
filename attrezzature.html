<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attrezzature - Radio C.B. Lunigiana</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-gray-100">

  <!-- Mobile Header -->
  <div class="lg:hidden bg-blue-900 text-white p-4 flex justify-between items-center fixed top-0 left-0 right-0 z-50">
    <button onclick="toggleMenu()" class="text-2xl"><i class="fas fa-bars"></i></button>
    <a href="index.html" class="flex items-center gap-2">
      <img src="https://i.imgur.com/8RvEWed.png" alt="Logo" class="w-8 h-8 rounded-full object-cover">
      <span class="font-bold text-sm">Radio C.B. Lunigiana</span>
    </a>
    <a href="login.html" class="text-xl"><i class="fas fa-sign-out-alt"></i></a>
  </div>

  <!-- Sidebar -->
  <div id="sidebar" class="fixed left-0 top-0 h-full w-64 bg-blue-900 text-white transform -translate-x-full lg:translate-x-0 transition-transform duration-200 z-40 overflow-y-auto">
    <div class="p-5 border-b border-blue-800 mt-16 lg:mt-0 text-center">
      <a href="index.html">
        <img src="https://i.imgur.com/8RvEWed.png" alt="Logo" class="w-16 h-16 mx-auto mb-2 rounded-full object-cover hover:opacity-80">
        <h2 class="text-xl font-bold hover:text-blue-200">ProtCiv Manager</h2>
      </a>
    </div>
    <nav class="p-4">
      <a href="index.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-home w-5"></i> Dashboard</a>
      <a href="servizi.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-tasks w-5"></i> Servizi</a>
      <a href="volontari.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-users w-5"></i> Volontari</a>
      <a href="corsi.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-graduation-cap w-5"></i> Corsi</a>
      <a href="responsabili.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-user-tie w-5"></i> Responsabili</a>
      <a href="mezzi.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-truck w-5"></i> Mezzi</a>
      <a href="attrezzature.html" class="flex items-center gap-3 p-3 rounded bg-blue-800 mb-2"><i class="fas fa-walkie-talkie w-5"></i> Attrezzature</a>
      <a href="report.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-file-pdf w-5"></i> Report</a>
      <div class="border-t border-blue-800 my-3"></div>
      <a href="login.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mt-4"><i class="fas fa-sign-out-alt w-5"></i> Logout</a>
    </nav>
  </div>

  <div id="overlay" onclick="toggleMenu()" class="hidden fixed inset-0 bg-black bg-opacity-50 z-30 lg:hidden"></div>

  <!-- Main Content -->
  <div class="lg:ml-64 pt-20 lg:pt-8 p-4 lg:p-8">
    <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-6 gap-3">
      <div>
        <a href="index.html" class="text-blue-600 text-sm mb-1 block"><i class="fas fa-arrow-left"></i> Torna alla Dashboard</a>
        <h1 class="text-2xl lg:text-3xl font-bold text-gray-800">Gestione Attrezzature</h1>
      </div>
      <div class="flex gap-2" id="boxBottoni">
        <button id="btnExportPDF" onclick="esportaInventarioPDF()" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded font-bold text-sm">
          <i class="fas fa-file-pdf"></i> Esporta PDF
        </button>
        <button id="btnToggleForm" onclick="mostraForm()" class="bg-orange-500 hover:bg-orange-600 text-white px-4 py-2 rounded font-bold text-sm">
          <i class="fas fa-plus"></i> Nuova Attrezzatura
        </button>
      </div>
    </div>

    <!-- Alert Scadenze -->
    <div id="alertScadenze" class="hidden bg-red-50 border-l-4 border-red-500 p-4 mb-4 rounded">
      <div class="flex items-center">
        <i class="fas fa-exclamation-triangle text-red-500 text-xl mr-3"></i>
        <div>
          <p class="font-bold text-red-800">Attenzione: Revisioni in scadenza</p>
          <p class="text-sm text-red-700" id="testoAlertScadenze"></p>
        </div>
      </div>
    </div>

    <!-- Form Attrezzatura -->
    <div id="formAttrezzatura" class="bg-white rounded-lg shadow p-5 mb-6 hidden">
      <h2 class="text-lg font-bold text-gray-800 mb-4" id="titoloForm">Nuova Attrezzatura</h2>
      <form onsubmit="salvaAttrezzatura(event)">
        <input type="hidden" id="idAttrezzatura">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Categoria *</label>
            <select id="categoria" onchange="aggiornaSottocategoria()" class="w-full border rounded p-2 text-sm" required>
              <option value="">Seleziona categoria</option>
              <option value="Radio">Radio</option>
              <option value="Motosega">Motosega</option>
              <option value="DPI">DPI</option>
              <option value="Antenne">Antenne</option>
              <option value="Materiale Elettrico">Materiale Elettrico</option>
              <option value="Materiale Idro">Materiale Idro</option>
              <option value="Materiale Logistico">Materiale Logistico</option>
              <option value="Altro">Altro</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Tipo *</label>
            <select id="sottocategoria" class="w-full border rounded p-2 text-sm" required>
              <option value="">Seleziona prima la categoria</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Modello *</label>
            <input type="text" id="modello" placeholder="Es. Yaesu FT-65" class="w-full border rounded p-2 text-sm" required>
          </div>
          <div id="campoSeriale">
            <label class="block text-sm font-medium text-gray-700 mb-1">Matricola/Seriale</label>
            <input type="text" id="seriale" placeholder="Numero seriale" class="w-full border rounded p-2 text-sm">
          </div>
          <div id="campoQuantita" class="hidden">
            <label class="block text-sm font-medium text-gray-700 mb-1">Quantità *</label>
            <input type="number" id="quantita" min="1" value="1" class="w-full border rounded p-2 text-sm">
          </div>
          <div id="campoDisponibili" class="hidden">
            <label class="block text-sm font-medium text-gray-700 mb-1">Disponibili</label>
            <input type="number" id="disponibili" min="0" value="1" class="w-full border rounded p-2 text-sm">
          </div>
          <div id="campoIdRadio" class="hidden">
            <label class="block text-sm font-medium text-gray-700 mb-1">ID Radio</label>
            <input type="text" id="idRadio" placeholder="ID radio interno" class="w-full border rounded p-2 text-sm">
          </div>
          <div id="campoIdentificativo" class="hidden">
            <label class="block text-sm font-medium text-gray-700 mb-1">Identificativo</label>
            <input type="text" id="identificativo" placeholder="Es: LUNIGIANA1" class="w-full border rounded p-2 text-sm">
          </div>
          <div id="campoFrequenza" class="hidden">
            <label class="block text-sm font-medium text-gray-700 mb-1">Frequenza/Banda</label>
            <select id="frequenza" class="w-full border rounded p-2 text-sm">
              <option value="">Seleziona</option>
              <option value="VHF">VHF</option>
              <option value="UHF">UHF</option>
              <option value="PMR-LPD">PMR-LPD</option>
            </select>
          </div>
          <div id="campoDescrizioneDPI" class="hidden">
            <label class="block text-sm font-medium text-gray-700 mb-1">Descrizione DPI</label>
            <input type="text" id="descrizioneDPI" placeholder="Es. Casco con visiera" class="w-full border rounded p-2 text-sm">
          </div>
          <div id="campoRevisione" class="hidden">
            <label class="block text-sm font-medium text-gray-700 mb-1">Scadenza Revisione</label>
            <input type="date" id="revisione" class="w-full border rounded p-2 text-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Stato *</label>
            <select id="stato" class="w-full border rounded p-2 text-sm" required>
              <option value="Operativo">Operativo</option>
              <option value="In Manutenzione">In Manutenzione</option>
              <option value="Guasto">Guasto</option>
              <option value="Dismesso">Dismesso</option>
            </select>
          </div>
          <div class="lg:col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Foto attrezzatura</label>
            <input type="file" id="foto" accept="image/*" onchange="previewFoto(event)" class="w-full border rounded p-2 text-sm">
            <img id="previewFoto" class="hidden mt-2 max-h-32 rounded">
          </div>
          <div class="lg:col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Note</label>
            <textarea id="note" placeholder="Note aggiuntive" class="w-full border rounded p-2 text-sm" rows="2"></textarea>
          </div>
        </div>
        <div class="flex gap-2 mt-4">
          <button type="submit" class="bg-orange-500 text-white px-4 py-2 rounded font-bold text-sm">Salva</button>
          <button type="button" onclick="nascondiForm()" class="bg-gray-400 text-white px-4 py-2 rounded font-bold text-sm">Annulla</button>
        </div>
      </form>
    </div>

    <!-- Filtri -->
    <div class="bg-white rounded-lg shadow p-4 mb-4" id="boxFiltri">
      <div class="grid grid-cols-1 lg:grid-cols-4 gap-3">
        <div class="flex items-center gap-3">
          <i class="fas fa-filter text-gray-600"></i>
          <select id="filtroCategoria" onchange="caricaAttrezzature()" class="border rounded p-2 text-sm flex-1">
            <option value="">Tutte le categorie</option>
            <option value="Radio">Radio</option>
            <option value="Motosega">Motosega</option>
            <option value="DPI">DPI</option>
            <option value="Antenne">Antenne</option>
            <option value="Materiale Elettrico">Materiale Elettrico</option>
            <option value="Materiale Idro">Materiale Idro</option>
            <option value="Materiale Logistico">Materiale Logistico</option>
            <option value="Altro">Altro</option>
          </select>
        </div>
        <div class="flex items-center gap-3">
          <i class="fas fa-wrench text-gray-600"></i>
          <select id="filtroStato" onchange="caricaAttrezzature()" class="border rounded p-2 text-sm flex-1">
            <option value="">Tutti gli stati</option>
            <option value="Operativo">Operativo</option>
            <option value="In Manutenzione">In Manutenzione</option>
            <option value="Guasto">Guasto</option>
            <option value="Dismesso">Dismesso</option>
          </select>
        </div>
        <div class="flex items-center gap-3">
          <i class="fas fa-calendar text-gray-600"></i>
          <button onclick="toggleFiltro60gg()" id="btn60gg" class="border rounded p-2 text-sm flex-1 text-left hover:bg-gray-50">
            Scadono entro 60gg
          </button>
        </div>
        <div class="flex items-center gap-3">
          <i class="fas fa-search text-gray-600"></i>
          <input type="text" id="filtroRicerca" oninput="caricaAttrezzature()" placeholder="Cerca modello/seriale..." class="border rounded p-2 text-sm flex-1">
        </div>
      </div>
    </div>

    <!-- Lista -->
    <div id="listaAttrezzature" class="space-y-3"></div>
  </div>

  <!-- Modal QR -->
  <div id="modalQR" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-lg p-6 max-w-sm w-full">
      <h3 class="font-bold text-lg mb-4">QR Code Attrezzatura</h3>
      <div id="qrcode" class="flex justify-center mb-4"></div>
      <p class="text-xs text-gray-600 text-center mb-4" id="testoQR"></p>
      <div class="flex gap-2">
        <button onclick="stampaQR()" class="flex-1 bg-blue-600 text-white py-2 rounded text-sm"><i class="fas fa-print"></i> Stampa</button>
        <button onclick="chiudiModalQR()" class="flex-1 bg-gray-600 text-white py-2 rounded text-sm">Chiudi</button>
      </div>
    </div>
  </div>

  <script>
    const sottocategorie = {
      'Radio': ['Portatile VHF', 'Portatile UHF', 'Veicolare', 'Base fissa', 'Ponte ripetitore'],
      'Motosega': ['Piccola', 'Media', 'Grande'],
      'DPI': ['Casco con visiera e cuffie', 'Imbragatura', 'Guanti', 'Stivali', 'Gilet AV'],
      'Antenne': ['Dipolo', 'Direttiva', 'Collineare', 'Veicolare'],
      'Materiale Elettrico': ['Prolunga', 'Adattatore', 'Sottoquadro', 'Generatore', 'Plafoniera', 'Faro', 'Torcia', 'Torre faro', 'Altro'],
      'Materiale Idro': ['Idrovora', 'Motopompa', 'Elettropompa', 'Accessorio', 'Altro'],
      'Materiale Logistico': ['Tenda', 'Brandina', 'Gazebo', 'Transenne', 'Altro'],
      'Altro': ['Altro']
    };

    let editId = null;
    let filtro60ggAttivo = false;

    // Caricamento iniziale
    document.addEventListener('DOMContentLoaded', () => {
      caricaAttrezzature();
    });

    function toggleMenu() {
      document.getElementById('sidebar').classList.toggle('-translate-x-full');
      document.getElementById('overlay').classList.toggle('hidden');
    }

    function aggiornaSottocategoria() {
      const cat = document.getElementById('categoria').value;
      const sotto = document.getElementById('sottocategoria');
      sotto.innerHTML = '<option value="">Seleziona tipo</option>';
      if (sottocategorie[cat]) {
        sottocategorie[cat].forEach(s => {
          const opt = document.createElement('option');
          opt.value = s;
          opt.textContent = s;
          sotto.appendChild(opt);
        });
      }
      mostraCampiSpecifici();
    }

    function mostraForm(id = null) {
      const form = document.getElementById('formAttrezzatura');
      const btn = document.getElementById('btnToggleForm');
      const btnPDF = document.getElementById('btnExportPDF');
      const boxFiltri = document.getElementById('boxFiltri');
      const lista = document.getElementById('listaAttrezzature');

      form.classList.remove('hidden');
      document.querySelector('#formAttrezzatura form').reset();
      document.getElementById('previewFoto').classList.add('hidden');
      editId = id;

      boxFiltri.classList.add('hidden');
      lista.classList.add('hidden');
      if (btnPDF) btnPDF.classList.add('hidden');

      btn.innerHTML = '<i class="fas fa-arrow-left"></i> Indietro';
      btn.classList.replace('bg-orange-500', 'bg-blue-600');
      btn.onclick = nascondiForm;

      if (id) {
        document.getElementById('titoloForm').textContent = 'Modifica Attrezzatura';
        const a = JSON.parse(localStorage.getItem('attrezzature') || '[]').find(x => x.id === id);
        if (a) {
          document.getElementById('idAttrezzatura').value = a.id;
          document.getElementById('categoria').value = a.categoria;
          aggiornaSottocategoria();
          setTimeout(() => document.getElementById('sottocategoria').value = a.sottocategoria, 50);
          document.getElementById('modello').value = a.modello;
          document.getElementById('seriale').value = a.seriale || '';
          document.getElementById('quantita').value = a.quantita || 1;
          document.getElementById('disponibili').value = a.disponibili || 1;
          document.getElementById('idRadio').value = a.idRadio || '';
          document.getElementById('identificativo').value = a.identificativo || '';
          document.getElementById('frequenza').value = a.frequenza || '';
          document.getElementById('descrizioneDPI').value = a.descrizioneDPI || '';
          document.getElementById('revisione').value = a.revisione || '';
          document.getElementById('stato').value = a.stato;
          document.getElementById('note').value = a.note || '';
          if (a.foto) {
            document.getElementById('previewFoto').src = a.foto;
            document.getElementById('previewFoto').classList.remove('hidden');
          }
          mostraCampiSpecifici();
        }
      } else {
        document.getElementById('titoloForm').textContent = 'Nuova Attrezzatura';
        nascondiCampiSpecifici();
      }
      window.scrollTo(0,0);
    }

    function nascondiForm() {
      document.getElementById('formAttrezzatura').classList.add('hidden');
      document.getElementById('boxFiltri').classList.remove('hidden');
      document.getElementById('listaAttrezzature').classList.remove('hidden');
      document.getElementById('btnExportPDF').classList.remove('hidden');
      const btn = document.getElementById('btnToggleForm');
      btn.innerHTML = '<i class="fas fa-plus"></i> Nuova Attrezzatura';
      btn.classList.replace('bg-blue-600', 'bg-orange-500');
      btn.onclick = () => mostraForm();
      editId = null;
    }

    function mostraCampiSpecifici() {
      const cat = document.getElementById('categoria').value;
      nascondiCampiSpecifici();
      if (cat === 'Radio') {
        ['campoIdRadio', 'campoIdentificativo', 'campoFrequenza', 'campoSeriale'].forEach(c => document.getElementById(c).classList.remove('hidden'));
      } else if (cat === 'DPI') {
        ['campoDescrizioneDPI', 'campoQuantita', 'campoDisponibili'].forEach(c => document.getElementById(c).classList.remove('hidden'));
        document.getElementById('campoSeriale').classList.add('hidden');
      } else if (cat === 'Motosega') {
        ['campoRevisione', 'campoSeriale'].forEach(c => document.getElementById(c).classList.remove('hidden'));
      } else {
        document.getElementById('campoSeriale').classList.remove('hidden');
      }
    }

    function nascondiCampiSpecifici() {
      ['campoIdRadio', 'campoIdentificativo', 'campoFrequenza', 'campoDescrizioneDPI', 'campoRevisione', 'campoQuantita', 'campoDisponibili'].forEach(c => document.getElementById(c).classList.add('hidden'));
      document.getElementById('campoSeriale').classList.remove('hidden');
    }

    function previewFoto(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          document.getElementById('previewFoto').src = ev.target.result;
          document.getElementById('previewFoto').classList.remove('hidden');
        };
        reader.readAsDataURL(file);
      }
    }

    function salvaAttrezzatura(e) {
      e.preventDefault();
      const id = editId || Date.now();
      const fotoInput = document.getElementById('foto');
      const preview = document.getElementById('previewFoto');

      if (fotoInput.files[0]) {
        const reader = new FileReader();
        reader.onload = (ev) => elaboraSalvataggio(id, ev.target.result);
        reader.readAsDataURL(fotoInput.files[0]);
      } else {
        elaboraSalvataggio(id, preview.classList.contains('hidden') ? null : preview.src);
      }
    }

    function elaboraSalvataggio(id, foto) {
      let attrezzature = JSON.parse(localStorage.getItem('attrezzature') || '[]');
      const nuova = {
        id: id,
        categoria: document.getElementById('categoria').value,
        sottocategoria: document.getElementById('sottocategoria').value,
        modello: document.getElementById('modello').value,
        seriale: document.getElementById('seriale').value,
        quantita: document.getElementById('quantita').value,
        disponibili: document.getElementById('disponibili').value,
        idRadio: document.getElementById('idRadio').value,
        identificativo: document.getElementById('identificativo').value,
        frequenza: document.getElementById('frequenza').value,
        descrizioneDPI: document.getElementById('descrizioneDPI').value,
        revisione: document.getElementById('revisione').value,
        stato: document.getElementById('stato').value,
        note: document.getElementById('note').value,
        foto: foto
      };

      if (editId) {
        const index = attrezzature.findIndex(a => a.id === editId);
        attrezzature[index] = nuova;
      } else {
        attrezzature.push(nuova);
      }

      localStorage.setItem('attrezzature', JSON.stringify(attrezzature));
      nascondiForm();
      caricaAttrezzature();
    }

    function caricaAttrezzature() {
      let data = JSON.parse(localStorage.getItem('attrezzature') || '[]');
      const fCat = document.getElementById('filtroCategoria').value;
      const fStat = document.getElementById('filtroStato').value;
      const fRicerca = document.getElementById('filtroRicerca').value.toLowerCase();

      if (fCat) data = data.filter(a => a.categoria === fCat);
      if (fStat) data = data.filter(a => a.stato === fStat);
      if (fRicerca) data = data.filter(a => a.modello.toLowerCase().includes(fRicerca) || (a.seriale && a.seriale.toLowerCase().includes(fRicerca)));

      if (filtro60ggAttivo) {
        const limite = new Date();
        limite.setDate(limite.getDate() + 60);
        data = data.filter(a => a.revisione && new Date(a.revisione) <= limite);
      }

      const lista = document.getElementById('listaAttrezzature');
      if (data.length === 0) {
        lista.innerHTML = '<div class="bg-white p-8 text-center text-gray-500">Nessuna attrezzatura trovata.</div>';
        return;
      }

      lista.innerHTML = data.map(a => `
        <div class="bg-white rounded-lg shadow p-4 flex flex-col lg:flex-row gap-4 border-l-4 ${a.stato === 'Operativo' ? 'border-green-500' : 'border-red-500'}">
          ${a.foto ? `<img src="${a.foto}" class="w-24 h-24 object-cover rounded">` : '<div class="w-24 h-24 bg-gray-100 rounded flex items-center justify-center text-gray-400"><i class="fas fa-tools fa-2xl"></i></div>'}
          <div class="flex-1">
            <div class="flex justify-between items-start">
              <div>
                <h3 class="font-bold text-lg">${a.categoria} - ${a.modello}</h3>
                <p class="text-sm text-gray-600">${a.sottocategoria} ${a.seriale ? '| S/N: '+a.seriale : ''}</p>
              </div>
              <div class="flex gap-2">
                <button onclick="mostraQR(${a.id})" class="text-purple-600 p-1"><i class="fas fa-qrcode"></i></button>
                <button onclick="mostraForm(${a.id})" class="text-blue-600 p-1"><i class="fas fa-edit"></i></button>
                <button onclick="eliminaAttrezzatura(${a.id})" class="text-red-600 p-1"><i class="fas fa-trash"></i></button>
              </div>
            </div>
            <div class="mt-2 flex gap-3 text-xs">
              <span class="px-2 py-1 rounded bg-gray-100 font-bold">${a.stato}</span>
              ${a.revisione ? `<span class="px-2 py-1 rounded bg-orange-100 text-orange-800">Scadenza: ${new Date(a.revisione).toLocaleDateString()}</span>` : ''}
            </div>
          </div>
        </div>
      `).join('');
      
      controllaScadenze(data);
    }

    function eliminaAttrezzatura(id) {
      if (confirm('Eliminare definitivamente?')) {
        let d = JSON.parse(localStorage.getItem('attrezzature') || '[]').filter(x => x.id !== id);
        localStorage.setItem('attrezzature', JSON.stringify(d));
        caricaAttrezzature();
      }
    }

    function controllaScadenze(data) {
      const oggi = new Date();
      const inScadenza = data.filter(a => a.revisione && new Date(a.revisione) <= new Date(oggi.getTime() + 30 * 24 * 60 * 60 * 1000)).length;
      const alert = document.getElementById('alertScadenze');
      if (inScadenza > 0) {
        alert.classList.remove('hidden');
        document.getElementById('testoAlertScadenze').textContent = `Ci sono ${inScadenza} attrezzature con revisione scaduta o imminente.`;
      } else {
        alert.classList.add('hidden');
      }
    }

    function toggleFiltro60gg() {
      filtro60ggAttivo = !filtro60ggAttivo;
      document.getElementById('btn60gg').classList.toggle('bg-blue-100');
      caricaAttrezzature();
    }

    function mostraQR(id) {
      const a = JSON.parse(localStorage.getItem('attrezzature') || '[]').find(x => x.id === id);
      document.getElementById('modalQR').classList.remove('hidden');
      document.getElementById('qrcode').innerHTML = '';
      document.getElementById('testoQR').textContent = `${a.categoria} - ${a.modello}`;
      new QRCode(document.getElementById('qrcode'), { text: `ID:${a.id}`, width: 160, height: 160 });
    }

    function chiudiModalQR() { document.getElementById('modalQR').classList.add('hidden'); }

    function stampaQR() {
        const qrContent = document.getElementById('qrcode').innerHTML;
        const text = document.getElementById('testoQR').textContent;
        const win = window.open('', '_blank');
        win.document.write(`<html><body onload="window.print();window.close()"><div style="text-align:center"><h3>${text}</h3>${qrContent}</div></body></html>`);
        win.document.close();
    }

    function esportaInventarioPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const data = JSON.parse(localStorage.getItem('attrezzature') || '[]');
      doc.text("Inventario Radio C.B. Lunigiana", 14, 15);
      const rows = data.map(a => [a.categoria, a.modello, a.seriale || '-', a.stato, a.revisione || '-']);
      doc.autoTable({ head: [['Cat.', 'Modello', 'S/N', 'Stato', 'Scadenza']], body: rows, startY: 20 });
      doc.save("inventario.pdf");
    }
  </script>
</body>
</html>
