<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Servizi - Radio C.B. Lunigiana</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/jspdf@latest/dist/jspdf.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100">

  <div class="lg:hidden bg-blue-900 text-white p-4 flex justify-between items-center fixed top-0 left-0 right-0 z-50">
    <button onclick="toggleMenu()" class="text-2xl"><i class="fas fa-bars"></i></button>
    <a href="index.html" class="flex items-center gap-2">
      <img src="https://i.imgur.com/8RvEWed.png" alt="Logo" class="w-8 h-8 rounded-full object-cover">
      <span class="font-bold text-sm">Radio C.B. Lunigiana</span>
    </a>
    <a href="login.html" class="text-xl"><i class="fas fa-sign-out-alt"></i></a>
  </div>

  <div id="sidebar" class="fixed left-0 top-0 h-full w-64 bg-blue-900 text-white transform -translate-x-full lg:translate-x-0 transition-transform duration-200 z-40 overflow-y-auto">
    <div class="p-5 border-b border-blue-800 mt-16 lg:mt-0 text-center">
      <a href="index.html">
        <img src="https://i.imgur.com/8RvEWed.png" alt="Logo" class="w-16 h-16 mx-auto mb-2 rounded-full object-cover hover:opacity-80">
        <h2 class="text-xl font-bold hover:text-blue-200">ProtCiv Manager</h2>
      </a>
    </div>
    <nav class="p-4">
      <a href="index.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-home w-5"></i> Dashboard</a>
      <a href="servizi.html" class="flex items-center gap-3 p-3 rounded bg-blue-800 mb-2"><i class="fas fa-tasks w-5"></i> Servizi</a>
      <a href="volontari.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-users w-5"></i> Volontari</a>
      <a href="corsi.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-graduation-cap w-5"></i> Corsi</a>
      <a href="responsabili.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-user-tie w-5"></i> Responsabili</a>
      <a href="mezzi.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-truck w-5"></i> Mezzi</a>
      <a href="attrezzature.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-walkie-talkie w-5"></i> Attrezzature</a>
      <a href="report.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-file-pdf w-5"></i> Report</a>
      <a href="login.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mt-8"><i class="fas fa-sign-out-alt w-5"></i> Logout</a>
    </nav>
  </div>

  <div id="overlay" onclick="toggleMenu()" class="hidden fixed inset-0 bg-black bg-opacity-50 z-30 lg:hidden"></div>

  <div class="lg:ml-64 pt-20 lg:pt-8 p-4 lg:p-8">
    <div class="mb-4">
      <a href="index.html" class="inline-flex items-center gap-2 text-blue-600 hover:text-blue-800 font-semibold">
        <i class="fas fa-arrow-left"></i> Torna alla Dashboard
      </a>
    </div>

    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold text-gray-800">Gestione Servizi</h1>
      <button onclick="toggleForm()" class="bg-red-600 text-white px-4 py-2 rounded-lg font-bold">
        <i class="fas fa-plus"></i> Nuovo Servizio
      </button>
    </div>

    <div id="formServizio" class="hidden bg-white rounded-lg shadow p-6 mb-6">
      <h3 class="font-bold text-lg mb-4" id="titoloForm">Nuovo Servizio</h3>
      <form onsubmit="salvaServizio(event)">
        <input type="hidden" id="idServizio">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
          <select id="tipo" required class="border p-2 rounded">
            <option value="">Tipo Servizio...</option>
            <optgroup label="EMERGENZE">
              <option value="incendio_boschivo">Incendio Boschivo</option>
              <option value="ricerca_disperso">Ricerca Disperso</option>
              <option value="monitoraggio_fiumi">Monitoraggio Fiumi</option>
              <option value="assistenza_popolazione">Assistenza Popolazione</option>
              <option value="emergenza_nazionale">Emergenza Nazionale</option>
            </optgroup>
            <optgroup label="PROGRAMMATI">
              <option value="assistenza_eventi">Assistenza Eventi</option>
              <option value="assistenza_manifestazioni">Assistenza Manifestazioni</option>
              <option value="presidio_territorio">Presidio Territorio</option>
              <option value="servizio_viabilita">Servizio Viabilità</option>
              <option value="trasporto">Trasporto</option>
              <option value="controllo_accessi">Controllo Accessi</option>
            </optgroup>
            <optgroup label="ADDESTRAMENTO">
              <option value="esercitazione">Esercitazione</option>
              <option value="corso_formazione">Corso Formazione</option>
              <option value="simulazione">Simulazione</option>
            </optgroup>
            <optgroup label="MANUTENZIONE">
              <option value="manutenzione_mezzi">Manutenzione Mezzi</option>
              <option value="manutenzione_sede">Manutenzione Sede</option>
              <option value="controllo_attrezzature">Controllo Attrezzature</option>
            </optgroup>
          </select>
          <input type="text" id="titolo" placeholder="Titolo Servizio *" required class="border p-2 rounded">
          <input type="datetime-local" id="dataInizio" required class="border p-2 rounded">
          <input type="datetime-local" id="dataFine" required class="border p-2 rounded">
          <input type="text" id="luogo" placeholder="Luogo *" required class="border p-2 rounded">
          <select id="stato" required class="border p-2 rounded">
            <option value="Programmato">Programmato</option>
            <option value="In corso">In corso</option>
            <option value="Completato">Completato</option>
            <option value="Annullato">Annullato</option>
          </select>
        </div>

        <div class="bg-blue-50 border-2 border-blue-300 rounded-lg p-4 mb-4">
          <h4 class="font-bold text-blue-900 mb-3"><i class="fas fa-file-contract"></i> Classificazione Ente</h4>
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">Convenzione</label>
              <div class="flex gap-4">
                <label class="flex items-center">
                  <input type="radio" name="convenzione" value="In convenzione" class="mr-2" required>
                  <span>In convenzione</span>
                </label>
                <label class="flex items-center">
                  <input type="radio" name="convenzione" value="Fuori convenzione" class="mr-2" required>
                  <span>Fuori convenzione</span>
                </label>
              </div>
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">Livello Territoriale</label>
              <select id="livello" required class="border p-2 rounded w-full">
                <option value="">Seleziona...</option>
                <option value="Locale">Locale</option>
                <option value="Provinciale">Provinciale</option>
                <option value="Regionale">Regionale</option>
                <option value="Nazionale">Nazionale</option>
              </select>
            </div>
          </div>
        </div>

        <div class="bg-orange-50 border-2 border-orange-300 rounded-lg p-4 mb-4">
          <h4 class="font-bold text-orange-900 mb-3"><i class="fas fa-clock"></i> Gestione Turni</h4>
          <div class="mb-3">
            <label class="flex items-center">
              <input type="radio" name="tipoTurni" value="Unico" checked onchange="toggleTurni()" class="mr-2">
              <span class="font-semibold">Turno Unico</span>
            </label>
            <label class="flex items-center mt-2">
              <input type="radio" name="tipoTurni" value="Multiplo" onchange="toggleTurni()" class="mr-2">
              <span class="font-semibold">Servizio a Turni T1-T6</span>
            </label>
          </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Assegna Volontari</label>
            <div id="listaVolontariAssegna" class="border rounded p-3 max-h-48 overflow-y-auto bg-gray-50">
              <p class="text-sm text-gray-500">Caricamento...</p>
            </div>
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Assegna Mezzi</label>
            <div id="listaMezziAssegna" class="border rounded p-3 max-h-48 overflow-y-auto bg-gray-50">
              <p class="text-sm text-gray-500">Caricamento...</p>
            </div>
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Assegna Attrezzature</label>
            <div id="listaAttrezzatureAssegna" class="border rounded p-3 max-h-48 overflow-y-auto bg-gray-50">
              <p class="text-sm text-gray-500">Caricamento...</p>
            </div>
          </div>
        </div>

        <textarea id="descrizione" placeholder="Descrizione" rows="3" class="border p-2 rounded w-full mb-4"></textarea>
        <div class="flex gap-2">
          <button type="submit" class="bg-red-600 text-white px-6 py-2 rounded font-bold">Salva</button>
          <button type="button" onclick="annullaForm()" class="bg-gray-400 text-white px-6 py-2 rounded">Annulla</button>
        </div>
      </form>
    </div>

    <div class="bg-white rounded-lg shadow p-4 mb-4">
      <div class="flex flex-wrap gap-2 mb-3">
        <button onclick="filtraServizi('tutti')" id="btn-tutti" class="px-3 py-1 rounded-lg text-sm font-semibold bg-blue-600 text-white">Tutti</button>
        <button onclick="filtraServizi('convenzione')" id="btn-convenzione" class="px-3 py-1 rounded-lg text-sm font-semibold bg-gray-200 text-gray-700">In Convenzione</button>
        <button onclick="filtraServizi('fuori')" id="btn-fuori" class="px-3 py-1 rounded-lg text-sm font-semibold bg-gray-200 text-gray-700">Fuori Convenzione</button>
        <button onclick="filtraServizi('Locale')" id="btn-Locale" class="px-3 py-1 rounded-lg text-sm font-semibold bg-gray-200 text-gray-700">Locale</button>
        <button onclick="filtraServizi('Provinciale')" id="btn-Provinciale" class="px-3 py-1 rounded-lg text-sm font-semibold bg-gray-200 text-gray-700">Provinciale</button>
        <button onclick="filtraServizi('Regionale')" id="btn-Regionale" class="px-3 py-1 rounded-lg text-sm font-semibold bg-gray-200 text-gray-700">Regionale</button>
        <button onclick="filtraServizi('Nazionale')" id="btn-Nazionale" class="px-3 py-1 rounded-lg text-sm font-semibold bg-gray-200 text-gray-700">Nazionale</button>
      </div>
      <button onclick="esportaPDF()" class="bg-red-600 text-white px-4 py-2 rounded-lg font-bold text-sm">
        <i class="fas fa-file-pdf"></i> Esporta PDF Riepilogativo
      </button>
      <span id="conteggioFiltro" class="ml-3 text-sm text-gray-600"></span>
    </div>

    <div id="listaServizi" class="space-y-3"></div>
  </div>

  <div id="modalDettaglio" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full max-h overflow-y-auto">
      <div class="sticky top-0 bg-white border-b p-4 flex justify-between items-center">
        <h2 class="text-xl font-bold">Dettaglio Servizio</h2>
        <button onclick="chiudiModal()" class="text-2xl text-gray-600 hover:text-gray-800">&times;</button>
      </div>
      <div id="contenutoDettaglio" class="p-5"></div>
    </div>
  </div>

<script>
let filtroAttuale = 'tutti';
let tipoTurniAttivo = 'Unico';

window.onload = function() {
  mostraServizi();
};

function toggleMenu() {
  document.getElementById('sidebar').classList.toggle('-translate-x-full');
  document.getElementById('overlay').classList.toggle('hidden');
}

function toggleForm() {
  const form = document.getElementById('formServizio');
  form.classList.toggle('hidden');
  if (!form.classList.contains('hidden')) {
    document.getElementById('titoloForm').textContent = 'Nuovo Servizio';
    document.querySelector('form').reset();
    document.getElementById('idServizio').value = '';
    tipoTurniAttivo = 'Unico';
    document.querySelector('input[name="tipoTurni"][value="Unico"]').checked = true;
    caricaListeAssegnazione();
  }
}

function toggleTurni() {
  tipoTurniAttivo = document.querySelector('input[name="tipoTurni"]:checked').value;
  caricaVolontariForm();
}

function caricaListeAssegnazione() {
  caricaVolontariForm();
  caricaMezziForm();
  caricaAttrezzatureForm();
}

function caricaVolontariForm() {
  const volontari = JSON.parse(localStorage.getItem('volontari') || '[]').filter(v => v.stato === 'Attivo');
  const container = document.getElementById('listaVolontariAssegna');
  if (volontari.length === 0) {
    container.innerHTML = '<p class="text-sm text-red-500">Nessun volontario attivo</p>';
    return;
  }
  container.innerHTML = volontari.map(v => {
    const turnoSelect = tipoTurniAttivo === 'Multiplo'? `
      <select class="border p-1 rounded text-xs ml-2 turno-select" data-vol-id="${v.id}">
        <option value="T1">T1</option>
        <option value="T2">T2</option>
        <option value="T3">T3</option>
        <option value="T4">T4</option>
        <option value="T5">T5</option>
        <option value="T6">T6</option>
      </select>
    ` : '';
    return `
      <label class="flex items-center p-2 hover:bg-white rounded cursor-pointer">
        <input type="checkbox" value="${v.id}" class="mr-2 volontario-check">
        <span class="text-sm">${v.nome} ${v.cognome}</span>
        ${turnoSelect}
      </label>
    `;
  }).join('');
}

function caricaMezziForm() {
  const mezzi = JSON.parse(localStorage.getItem('mezzi') || '[]').filter(m => m.stato === 'Operativo' || m.stato === 'Disponibile');
  const container = document.getElementById('listaMezziAssegna');
  if (mezzi.length === 0) {
    container.innerHTML = '<p class="text-sm text-red-500">Nessun mezzo operativo</p>';
    return;
  }
  container.innerHTML = mezzi.map(m => `
    <label class="flex items-center p-2 hover:bg-white rounded cursor-pointer">
      <input type="checkbox" value="${m.id}" class="mr-2 mezzo-check">
      <span class="text-sm">${m.tipo || m.modello || m.nome} - ${m.targa}</span>
    </label>
  `).join('');
}

function caricaAttrezzatureForm() {
  const attr = JSON.parse(localStorage.getItem('attrezzature') || '[]').filter(a => a.stato === 'Operativa' || a.stato === 'Operativo' || a.stato === 'Disponibile');
  const container = document.getElementById('listaAttrezzatureAssegna');
  if (attr.length === 0) {
    container.innerHTML = '<p class="text-sm text-red-500">Nessuna attrezzatura operativa</p>';
    return;
  }
  container.innerHTML = attr.map(a => `
    <label class="flex items-center p-2 hover:bg-white rounded cursor-pointer">
      <input type="checkbox" value="${a.id}" class="mr-2 attr-check">
      <span class="text-sm">${a.descrizione || a.modello || a.nome} ${a.categoria && a.categoria.includes('Radio')? '- ' + a.frequenza : ''}</span>
    </label>
  `).join('');
}

function annullaForm() {
  document.getElementById('formServizio').classList.add('hidden');
  document.querySelector('form').reset();
}

function salvaServizio(e) {
  e.preventDefault();
  const servizi = JSON.parse(localStorage.getItem('servizi') || '[]');
  const id = document.getElementById('idServizio').value;
  const volontariSelezionati = [];
  document.querySelectorAll('.volontario-check:checked').forEach(cb => {
    const volId = parseInt(cb.value);
    const turno = tipoTurniAttivo === 'Multiplo'? document.querySelector(`.turno-select[data-vol-id="${volId}"]`).value : 'Unico';
    volontariSelezionati.push({ id: volId, turno: turno });
  });
  const mezziSelezionati = Array.from(document.querySelectorAll('.mezzo-check:checked')).map(cb => parseInt(cb.value));
  const attrSelezionate = Array.from(document.querySelectorAll('.attr-check:checked')).map(cb => parseInt(cb.value));
  const dati = {
    id: id? parseInt(id) : Date.now(),
    tipo: document.getElementById('tipo').value,
    titolo: document.getElementById('titolo').value,
    dataInizio: document.getElementById('dataInizio').value,
    dataFine: document.getElementById('dataFine').value,
    luogo: document.getElementById('luogo').value,
    stato: document.getElementById('stato').value,
    convenzione: document.querySelector('input[name="convenzione"]:checked').value,
    livello: document.getElementById('livello').value,
    tipoTurni: tipoTurniAttivo,
    volontari: volontariSelezionati,
    mezzi: mezziSelezionati,
    attrezzature: attrSelezionate,
    descrizione: document.getElementById('descrizione').value
  };
  if (id) {
    const index = servizi.findIndex(s => s.id === parseInt(id));
    servizi[index] = dati;
  } else {
    servizi.push(dati);
  }
  localStorage.setItem('servizi', JSON.stringify(servizi));
  annullaForm();
  mostraServizi();
}

function modificaServizio(id) {
  const servizi = JSON.parse(localStorage.getItem('servizi') || '[]');
  const s = servizi.find(s => s.id === id);
  document.getElementById('idServizio').value = s.id;
  document.getElementById('tipo').value = s.tipo;
  document.getElementById('titolo').value = s.titolo;
  document.getElementById('dataInizio').value = s.dataInizio;
  document.getElementById('dataFine').value = s.dataFine;
  document.getElementById('luogo').value = s.luogo;
  document.getElementById('stato').value = s.stato;
  document.querySelector(`input[name="convenzione"][value="${s.convenzione}"]`).checked = true;
  document.getElementById('livello').value = s.livello;
  document.getElementById('descrizione').value = s.descrizione || '';
  tipoTurniAttivo = s.tipoTurni || 'Unico';
  document.querySelector(`input[name="tipoTurni"][value="${tipoTurniAttivo}"]`).checked = true;
  document.getElementById('titoloForm').textContent = 'Modifica Servizio';
  document.getElementById('formServizio').classList.remove('hidden');
  caricaListeAssegnazione();
  setTimeout(() => {
    if (s.volontari) {
      s.volontari.forEach(v => {
        const cb = document.querySelector(`.volontario-check[value="${v.id}"]`);
        if (cb) {
          cb.checked = true;
          if (tipoTurniAttivo === 'Multiplo') {
            const select = document.querySelector(`.turno-select[data-vol-id="${v.id}"]`);
            if (select) select.value = v.turno;
          }
        }
      });
    }
    if (s.mezzi) {
      s.mezzi.forEach(id => {
        const cb = document.querySelector(`.mezzo-check[value="${id}"]`);
        if (cb) cb.checked = true;
      });
    }
    if (s.attrezzature) {
      s.attrezzature.forEach(id => {
        const cb = document.querySelector(`.attr-check[value="${id}"]`);
        if (cb) cb.checked = true;
      });
    }
  }, 100);
  window.scrollTo(0, 0);
}

function eliminaServizio(id) {
  if (!confirm('Eliminare questo servizio?')) return;
  let servizi = JSON.parse(localStorage.getItem('servizi') || '[]');
  servizi = servizi.filter(s => s.id!== id);
  localStorage.setItem('servizi', JSON.stringify(servizi));
  mostraServizi();
}

function filtraServizi(tipo) {
  filtroAttuale = tipo;
  document.querySelectorAll('[id^="btn-"]').forEach(btn => {
    btn.classList.remove('bg-blue-600', 'text-white');
    btn.classList.add('bg-gray-200', 'text-gray-700');
  });
  document.getElementById('btn-' + tipo).classList.remove('bg-gray-200', 'text-gray-700');
  document.getElementById('btn-' + tipo).classList.add('bg-blue-600', 'text-white');
  mostraServizi();
}

function getServiziFiltrati() {
  let servizi = JSON.parse(localStorage.getItem('servizi') || '[]');
  if (filtroAttuale === 'convenzione') {
    servizi = servizi.filter(s => s.convenzione === 'In convenzione');
  } else if (filtroAttuale === 'fuori') {
    servizi = servizi.filter(s => s.convenzione === 'Fuori convenzione');
  } else if (filtroAttuale!== 'tutti') {
    servizi = servizi.filter(s => s.livello === filtroAttuale);
  }
  return servizi;
}

function mostraServizi() {
  const servizi = getServiziFiltrati();
  const volontari = JSON.parse(localStorage.getItem('volontari') || '[]');
  const mezzi = JSON.parse(localStorage.getItem('mezzi') || '[]');
  const attrezzature = JSON.parse(localStorage.getItem('attrezzature') || '[]');
  const lista = document.getElementById('listaServizi');
  document.getElementById('conteggioFiltro').textContent = `${servizi.length} servizi trovati`;
  if (servizi.length === 0) {
    lista.innerHTML = `<div class="bg-white rounded-lg shadow p-8 text-center text-gray-500">
      <i class="fas fa-tasks text-5xl mb-3 text-gray-300"></i>
      <p class="text-lg">Nessun servizio trovato</p>
    </div>`;
    return;
  }
  lista.innerHTML = servizi.map(s => {
    const coloreStato = s.stato === 'Completato'? 'bg-green-100 text-green-800' :
                       s.stato === 'In corso'? 'bg-blue-100 text-blue-800' :
                       s.stato === 'Annullato'? 'bg-red-100 text-red-800' :
                       'bg-yellow-100 text-yellow-800';
    const badgeConv = s.convenzione === 'In convenzione'?
      '<span class="text-xs px-2 py-1 rounded bg-green-100 text-green-800 ml-2"><i class="fas fa-check"></i> In convenzione</span>' :
      '<span class="text-xs px-2 py-1 rounded bg-gray-100 text-gray-800 ml-2">Fuori convenzione</span>';
    const badgeLiv = `<span class="text-xs px-2 py-1 rounded bg-purple-100 text-purple-800 ml-2">${s.livello || 'N/D'}</span>`;
    const badgeTurni = s.tipoTurni === 'Multiplo'?
      '<span class="text-xs px-2 py-1 rounded bg-orange-100 text-orange-800 ml-2"><i class="fas fa-clock"></i> A Turni</span>' : '';
    let listaVol = '';
    if (s.volontari && s.volontari.length > 0) {
      listaVol = '<div class="mt-2 text-xs text-gray-600"><i class="fas fa-users"></i> ';
      listaVol += s.volontari.map(v => {
        const vol = volontari.find(vo => vo.id === v.id);
        return vol? `${vol.nome} ${vol.cognome} [${v.turno}]` : '';
      }).filter(n => n).join(', ');
      listaVol += '</div>';
    }
    let listaMezzi = '';
    if (s.mezzi && s.mezzi.length > 0) {
      listaMezzi = '<div class="mt-1 text-xs text-gray-600"><i class="fas fa-truck"></i> ';
      listaMezzi += s.mezzi.map(id => {
        const m = mezzi.find(me => me.id === id);
        return m? `${m.tipo || m.modello || m.nome}` : '';
      }).filter(n => n).join(', ');
      listaMezzi += '</div>';
    }
    let listaAttr = '';
    if (s.attrezzature && s.attrezzature.length > 0) {
      listaAttr = '<div class="mt-1 text-xs text-gray-600"><i class="fas fa-walkie-talkie"></i> ';
      listaAttr += s.attrezzature.map(id => {
        const a = attrezzature.find(at => at.id === id);
        return a? `${a.descrizione || a.modello || a.nome}` : '';
      }).filter(n => n).join(', ');
      listaAttr += '</div>';
    }
    return `
    <div class="bg-white rounded-lg shadow p-4">
      <div class="flex justify-between items-start mb-3">
        <div>
          <h3 class="font-bold text-lg">${s.titolo}${badgeConv}${badgeLiv}${badgeTurni}</h3>
          <span class="text-xs px-2 py-1 rounded ${coloreStato}">${s.stato}</span>
        </div>
        <div class="flex gap-2">
          <button onclick="mostraDettaglioServizio(${s.id})" class="bg-blue-600 text-white px-3 py-1 rounded text-xs font-bold">
            <i class="fas fa-eye"></i> Dettaglio
          </button>
          <button onclick="modificaServizio(${s.id})" class="text-blue-600 hover:text-blue-800"><i class="fas fa-edit"></i></button>
          <button onclick="eliminaServizio(${s.id})" class="text-red-600 hover:text-red-800"><i class="fas fa-trash"></i></button>
        </div>
      </div>
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-2 text-sm">
        <p><i class="fas fa-calendar text-gray-500"></i> ${new Date(s.dataInizio).toLocaleString('it-IT')}</p>
        <p><i class="fas fa-map-marker-alt text-gray-500"></i> ${s.luogo}</p>
        <p><i class="fas fa-tag text-gray-500"></i> ${s.tipo.replace(/_/g, ' ')}</p>
      </div>
      ${listaVol}
      ${listaMezzi}
      ${listaAttr}
    </div>
  `;
  }).join('');
}
