<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Servizi - Radio C.B. Lunigiana</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gray-100">

  <div class="lg:hidden bg-blue-900 text-white p-4 flex justify-between items-center fixed top-0 left-0 right-0 z-50">
    <button onclick="toggleMenu()" class="text-2xl"><i class="fas fa-bars"></i></button>
    <a href="index.html" class="flex items-center gap-2">
      <img src="https://i.imgur.com/8RvEWed.png" alt="Logo" class="w-8 h-8 rounded-full object-cover">
      <span class="font-bold text-sm">Radio C.B. Lunigiana</span>
    </a>
    <a href="login.html" class="text-xl"><i class="fas fa-sign-out-alt"></i></a>
  </div>

  <div id="sidebar" class="fixed left-0 top-0 h-full w-64 bg-blue-900 text-white transform -translate-x-full lg:translate-x-0 transition-transform duration-200 z-40 overflow-y-auto">
    <div class="p-5 border-b border-blue-800 mt-16 lg:mt-0 text-center">
      <a href="index.html">
        <img src="https://i.imgur.com/8RvEWed.png" alt="Logo" class="w-16 h-16 mx-auto mb-2 rounded-full object-cover hover:opacity-80">
        <h2 class="text-xl font-bold hover:text-blue-200">ProtCiv Manager</h2>
      </a>
    </div>
    <nav class="p-4">
      <a href="index.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-home w-5"></i> Dashboard</a>
      <a href="servizi.html" class="flex items-center gap-3 p-3 rounded bg-blue-800 mb-2"><i class="fas fa-tasks w-5"></i> Servizi</a>
      <a href="volontari.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-users w-5"></i> Volontari</a>
      <a href="mezzi.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-truck w-5"></i> Mezzi</a>
      <a href="report.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-file-pdf w-5"></i> Report</a>
    </nav>
  </div>

  <div id="overlay" onclick="toggleMenu()" class="hidden fixed inset-0 bg-black bg-opacity-50 z-30 lg:hidden"></div>

  <div class="lg:ml-64 pt-20 lg:pt-8 p-4 lg:p-8">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold text-gray-800">Gestione Servizi</h1>
      <button onclick="toggleForm()" class="bg-red-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-red-700 transition">
        <i class="fas fa-plus"></i> Nuovo Servizio
      </button>
    </div>

    <div id="formServizio" class="hidden bg-white rounded-lg shadow p-6 mb-6">
      <h3 class="font-bold text-lg mb-4" id="titoloForm">Nuovo Servizio</h3>
      <form onsubmit="salvaServizio(event)">
        <input type="hidden" id="idServizio">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
          <select id="tipo" required class="border p-2 rounded">
            <option value="assistenza_eventi">Assistenza Eventi</option>
            <option value="incendio_boschivo">Incendio Boschivo</option>
            <option value="emergenza">Emergenza</option>
            <option value="esercitazione">Esercitazione</option>
          </select>
          <input type="text" id="titolo" placeholder="Titolo Servizio *" required class="border p-2 rounded">
          <input type="datetime-local" id="dataInizio" required class="border p-2 rounded">
          <input type="datetime-local" id="dataFine" required class="border p-2 rounded">
          <input type="text" id="luogo" placeholder="Luogo *" required class="border p-2 rounded">
          <select id="stato" required class="border p-2 rounded">
            <option value="Programmato">Programmato</option>
            <option value="In corso">In corso</option>
            <option value="Completato">Completato</option>
          </select>
        </div>

        <div class="bg-blue-50 border-2 border-blue-300 rounded-lg p-4 mb-4">
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-semibold mb-2">Convenzione</label>
              <div class="flex gap-4">
                <label><input type="radio" name="convenzione" value="In convenzione" checked> In conv.</label>
                <label><input type="radio" name="convenzione" value="Fuori convenzione"> Fuori conv.</label>
              </div>
            </div>
            <div>
              <label class="block text-sm font-semibold mb-2">Livello</label>
              <select id="livello" class="border p-2 rounded w-full">
                <option value="Locale">Locale</option>
                <option value="Regionale">Regionale</option>
                <option value="Nazionale">Nazionale</option>
              </select>
            </div>
          </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
          <div>
            <label class="block text-sm font-bold mb-2">Assegna Volontari</label>
            <div id="listaVolontariAssegna" class="border rounded p-3 h-40 overflow-y-auto bg-gray-50"></div>
          </div>
          <div>
            <label class="block text-sm font-bold mb-2">Assegna Mezzi</label>
            <div id="listaMezziAssegna" class="border rounded p-3 h-40 overflow-y-auto bg-gray-50"></div>
          </div>
        </div>

        <textarea id="descrizione" placeholder="Note aggiuntive..." rows="3" class="border p-2 rounded w-full mb-4"></textarea>
        <div class="flex gap-2">
          <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded font-bold">Salva</button>
          <button type="button" onclick="annullaForm()" class="bg-gray-400 text-white px-6 py-2 rounded">Annulla</button>
        </div>
      </form>
    </div>

    <div class="bg-white rounded-lg shadow p-4 mb-4 flex justify-between items-center">
        <button onclick="esportaPDF()" class="bg-red-600 text-white px-4 py-2 rounded font-bold text-sm">
            <i class="fas fa-file-pdf mr-2"></i>Esporta PDF
        </button>
        <span id="conteggioFiltro" class="text-sm font-semibold text-gray-600"></span>
    </div>

    <div id="listaServizi" class="space-y-4"></div>
  </div>

  <div id="modalDettaglio" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
      <div class="p-4 border-b flex justify-between items-center bg-blue-900 text-white">
        <h2 class="text-xl font-bold">Dettaglio Servizio</h2>
        <button onclick="chiudiModal()" class="text-2xl">&times;</button>
      </div>
      <div id="contenutoDettaglio" class="p-6"></div>
    </div>
  </div>

<script>
let filtroAttuale = 'tutti';

window.onload = function() {
    mostraServizi();
};

function toggleMenu() {
    document.getElementById('sidebar').classList.toggle('-translate-x-full');
    document.getElementById('overlay').classList.toggle('hidden');
}

function toggleForm() {
    const f = document.getElementById('formServizio');
    f.classList.toggle('hidden');
    if(!f.classList.contains('hidden')) {
        document.querySelector('form').reset();
        document.getElementById('idServizio').value = '';
        caricaListeAssegnazione();
    }
}

function caricaListeAssegnazione() {
    const volontari = JSON.parse(localStorage.getItem('volontari') || '[]');
    const mezzi = JSON.parse(localStorage.getItem('mezzi') || '[]');
    
    document.getElementById('listaVolontariAssegna').innerHTML = volontari.map(v => `
        <label class="flex items-center mb-1 text-sm"><input type="checkbox" value="${v.id}" class="vol-check mr-2"> ${v.nome} ${v.cognome}</label>
    `).join('') || 'Nessun volontario attivo';

    document.getElementById('listaMezziAssegna').innerHTML = mezzi.map(m => `
        <label class="flex items-center mb-1 text-sm"><input type="checkbox" value="${m.id}" class="mez-check mr-2"> ${m.targa} - ${m.modello || m.tipo}</label>
    `).join('') || 'Nessun mezzo disponibile';
}

function salvaServizio(e) {
    e.preventDefault();
    const servizi = JSON.parse(localStorage.getItem('servizi') || '[]');
    const id = document.getElementById('idServizio').value;
    
    const nuovo = {
        id: id ? parseInt(id) : Date.now(),
        titolo: document.getElementById('titolo').value,
        tipo: document.getElementById('tipo').value,
        dataInizio: document.getElementById('dataInizio').value,
        dataFine: document.getElementById('dataFine').value,
        luogo: document.getElementById('luogo').value,
        stato: document.getElementById('stato').value,
        convenzione: document.querySelector('input[name="convenzione"]:checked').value,
        livello: document.getElementById('livello').value,
        descrizione: document.getElementById('descrizione').value,
        volontari: Array.from(document.querySelectorAll('.vol-check:checked')).map(cb => parseInt(cb.value)),
        mezzi: Array.from(document.querySelectorAll('.mez-check:checked')).map(cb => parseInt(cb.value))
    };

    if(id) {
        const idx = servizi.findIndex(s => s.id === parseInt(id));
        servizi[idx] = nuovo;
    } else {
        servizi.push(nuovo);
    }

    localStorage.setItem('servizi', JSON.stringify(servizi));
    toggleForm();
    mostraServizi();
}

function mostraServizi() {
    const servizi = JSON.parse(localStorage.getItem('servizi') || '[]');
    const container = document.getElementById('listaServizi');
    document.getElementById('conteggioFiltro').innerText = `${servizi.length} servizi totali`;

    container.innerHTML = servizi.map(s => `
        <div class="bg-white p-4 rounded-lg shadow border-l-4 border-blue-600 flex justify-between items-center">
            <div>
                <h3 class="font-bold text-blue-900">${s.titolo}</h3>
                <p class="text-sm text-gray-500"><i class="fas fa-calendar-alt mr-1"></i> ${new Date(s.dataInizio).toLocaleDateString()}</p>
            </div>
            <div class="flex gap-2">
                <button onclick="mostraDettaglioServizio(${s.id})" class="bg-gray-100 p-2 rounded hover:bg-gray-200"><i class="fas fa-eye"></i></button>
                <button onclick="eliminaServizio(${s.id})" class="bg-red-50 p-2 rounded text-red-600"><i class="fas fa-trash"></i></button>
            </div>
        </div>
    `).join('') || '<p class="text-center text-gray-500 py-10">Nessun servizio registrato</p>';
}

function mostraDettaglioServizio(id) {
    const s = JSON.parse(localStorage.getItem('servizi') || '[]').find(x => x.id === id);
    if(!s) return;

    const html = `
        <div class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div><span class="block font-bold text-xs text-gray-400 uppercase">Inizio</span> ${new Date(s.dataInizio).toLocaleString()}</div>
                <div><span class="block font-bold text-xs text-gray-400 uppercase">Fine</span> ${new Date(s.dataFine).toLocaleString()}</div>
                <div><span class="block font-bold text-xs text-gray-400 uppercase">Luogo</span> ${s.luogo}</div>
                <div><span class="block font-bold text-xs text-gray-400 uppercase">Stato</span> ${s.stato}</div>
            </div>
            <div class="border-t pt-4">
                <h4 class="font-bold text-blue-800 mb-2">Note:</h4>
                <p class="text-sm text-gray-600 italic">${s.descrizione || 'Nessuna nota'}</p>
            </div>
            <button onclick="chiudiModal()" class="w-full bg-gray-200 py-2 rounded font-bold mt-4">Chiudi</button>
        </div>
    `;
    document.getElementById('contenutoDettaglio').innerHTML = html;
    document.getElementById('modalDettaglio').classList.remove('hidden');
}

function chiudiModal() { document.getElementById('modalDettaglio').classList.add('hidden'); }

function eliminaServizio(id) {
    if(confirm('Eliminare questo servizio?')) {
        let servizi = JSON.parse(localStorage.getItem('servizi') || '[]');
        servizi = servizi.filter(s => s.id !== id);
        localStorage.setItem('servizi', JSON.stringify(servizi));
        mostraServizi();
    }
}

function esportaPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const servizi = JSON.parse(localStorage.getItem('servizi') || '[]');

    doc.setFontSize(18);
    doc.text("REPORT SERVIZI - RADIO C.B. LUNIGIANA", 15, 20);
    
    let y = 35;
    servizi.forEach((s, i) => {
        if(y > 270) { doc.addPage(); y = 20; }
        doc.setFontSize(11);
        doc.text(`${i+1}. ${s.titolo} - ${s.luogo}`, 15, y);
        doc.setFontSize(9);
        doc.text(`Data: ${new Date(s.dataInizio).toLocaleDateString()} | Stato: ${s.stato}`, 15, y+5);
        y += 15;
    });

    doc.save("report-servizi.pdf");
}

function annullaForm() {
    document.getElementById('formServizio').classList.add('hidden');
}
</script>
</body>
</html>
