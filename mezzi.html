<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mezzi - Radio C.B. Lunigiana</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100">

  <div class="lg:hidden bg-blue-900 text-white p-4 flex justify-between items-center fixed top-0 left-0 right-0 z-50">
    <button onclick="toggleMenu()" class="text-2xl"><i class="fas fa-bars"></i></button>
    <a href="index.html" class="flex items-center gap-2">
      <img src="https://i.imgur.com/8RvEWed.png" alt="Logo" class="w-8 h-8 rounded-full object-cover">
      <span class="font-bold text-sm">Radio C.B. Lunigiana</span>
    </a>
    <a href="login.html" class="text-xl"><i class="fas fa-sign-out-alt"></i></a>
  </div>

  <div id="sidebar" class="fixed left-0 top-0 h-full w-64 bg-blue-900 text-white transform -translate-x-full lg:translate-x-0 transition-transform duration-200 z-40 overflow-y-auto">
    <div class="p-5 border-b border-blue-800 mt-16 lg:mt-0 text-center">
      <a href="index.html">
        <img src="https://i.imgur.com/8RvEWed.png" alt="Logo" class="w-16 h-16 mx-auto mb-2 rounded-full object-cover hover:opacity-80">
        <h2 class="text-xl font-bold hover:text-blue-200">ProtCiv Manager</h2>
      </a>
    </div>
    <nav class="p-4">
      <a href="index.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-home w-5"></i> Dashboard</a>
      <a href="servizi.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-tasks w-5"></i> Servizi</a>
      <a href="volontari.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-users w-5"></i> Volontari</a>
      <a href="attestati.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-certificate w-5"></i> Attestati</a>
      <a href="corsi.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-graduation-cap w-5"></i> Corsi</a>
      <a href="responsabili.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-user-tie w-5"></i> Responsabili</a>
      <a href="mezzi.html" class="flex items-center gap-3 p-3 rounded bg-blue-800 mb-2"><i class="fas fa-truck w-5"></i> Mezzi</a>
      <a href="attrezzature.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-walkie-talkie w-5"></i> Attrezzature</a>
      <a href="report.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-file-pdf w-5"></i> Report</a>
      <a href="login.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mt-8"><i class="fas fa-sign-out-alt w-5"></i> Logout</a>
    </nav>
  </div>

  <div id="overlay" onclick="toggleMenu()" class="hidden fixed inset-0 bg-black bg-opacity-50 z-30 lg:hidden"></div>

  <div class="lg:ml-64 pt-20 lg:pt-8 p-4 lg:p-8">
    <div class="mb-4">
      <a href="index.html" class="inline-flex items-center gap-2 text-blue-600 hover:text-blue-800 font-semibold">
        <i class="fas fa-arrow-left"></i> Torna alla Dashboard
      </a>
    </div>

    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold text-gray-800">Gestione Mezzi</h1>
      <button onclick="toggleForm()" class="bg-green-600 text-white px-4 py-2 rounded-lg font-bold">
        <i class="fas fa-plus"></i> Nuovo Mezzo
      </button>
    </div>

    <div id="alertScadenze" class="hidden bg-red-50 border-l-4 border-red-500 p-4 mb-4 rounded">
      <div class="flex items-center">
        <i class="fas fa-exclamation-triangle text-red-500 text-xl mr-3"></i>
        <div>
          <p class="font-bold text-red-800">Attenzione: Scadenze imminenti</p>
          <p class="text-sm text-red-700" id="testoAlertScadenze"></p>
        </div>
      </div>
    </div>

    <div id="formMezzo" class="hidden bg-white rounded-lg shadow p-6 mb-6">
      <h3 class="font-bold text-lg mb-4" id="titoloForm">Nuovo Mezzo</h3>
      <form onsubmit="salvaMezzo(event)">
        <input type="hidden" id="idMezzo">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Tipo Mezzo *</label>
            <select id="tipo" required class="w-full border p-2 rounded">
              <option value="">Seleziona tipo</option>
              <option value="Fuoristrada">Fuoristrada</option>
              <option value="Pick-up">Pick-up</option>
              <option value="Ambulanza">Ambulanza</option>
              <option value="Furgone">Furgone</option>
              <option value="Autocarro">Autocarro</option>
              <option value="Autobotte">Autobotte</option>
              <option value="Rimorchio">Rimorchio</option>
              <option value="Altro">Altro</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Targa *</label>
            <input type="text" id="targa" placeholder="Es. AB123CD" required class="w-full border p-2 rounded">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Modello</label>
            <input type="text" id="modello" placeholder="Es. Land Rover Defender" class="w-full border p-2 rounded">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Anno Immatricolazione</label>
            <input type="number" id="anno" min="1980" max="2026" placeholder="Es. 2018" class="w-full border p-2 rounded">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Scadenza Revisione *</label>
            <input type="date" id="revisione" required class="w-full border p-2 rounded">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Scadenza Assicurazione *</label>
            <input type="date" id="assicurazione" required class="w-full border p-2 rounded">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Stato *</label>
            <select id="stato" required class="w-full border p-2 rounded">
              <option value="Operativo">Operativo</option>
              <option value="Manutenzione">In Manutenzione</option>
              <option value="Fuori servizio">Fuori Servizio</option>
            </select>
          </div>
        </div>

        <div class="mt-4 p-4 bg-blue-50 border-l-4 border-blue-500 rounded">
          <p class="text-sm font-semibold text-gray-800 mb-3">Dotazioni</p>
          <div class="grid grid-cols-2 lg:grid-cols-3 gap-3">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" id="gancioTraino" class="w-4 h-4">
              <span class="text-sm">Gancio Traino</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" id="verricello" class="w-4 h-4">
              <span class="text-sm">Verricello</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" id="quattroPerQuattro" class="w-4 h-4">
              <span class="text-sm">4x4</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" id="moduloAIB" class="w-4 h-4">
              <span class="text-sm">Modulo AIB</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" id="gps" class="w-4 h-4">
              <span class="text-sm">GPS</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" id="radioVHF" class="w-4 h-4">
              <span class="text-sm">Radio VHF</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" id="lampeggianti" class="w-4 h-4">
              <span class="text-sm">Lampeggianti</span>
            </label>
          </div>
        </div>

        <div class="mt-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Note</label>
          <textarea id="note" placeholder="Note aggiuntive..." rows="2" class="border p-2 rounded w-full"></textarea>
        </div>

        <div class="flex gap-2 mt-4">
          <button type="submit" class="bg-green-600 text-white px-6 py-2 rounded font-bold">Salva</button>
          <button type="button" onclick="annullaForm()" class="bg-gray-400 text-white px-6 py-2 rounded">Annulla</button>
        </div>
      </form>
    </div>

    <div id="listaMezzi" class="space-y-3"></div>
  </div>

  <script>
    let mezzi = [];
    let editId = null;

    function toggleMenu() {
      document.getElementById('sidebar').classList.toggle('-translate-x-full');
      document.getElementById('overlay').classList.toggle('hidden');
    }

    function toggleForm() {
      const form = document.getElementById('formMezzo');
      form.classList.toggle('hidden');
      if (!form.classList.contains('hidden')) {
        document.getElementById('titoloForm').textContent = 'Nuovo Mezzo';
        document.querySelector('form').reset();
        document.getElementById('idMezzo').value = '';
        editId = null;
      }
    }

    function annullaForm() {
      document.getElementById('formMezzo').classList.add('hidden');
      document.querySelector('form').reset();
      editId = null;
    }

    function salvaMezzo(e) {
      e.preventDefault();
      const dati = {
        id: editId || Date.now(),
        tipo: document.getElementById('tipo').value,
        targa: document.getElementById('targa').value.toUpperCase(),
        modello: document.getElementById('modello').value,
        anno: document.getElementById('anno').value,
        revisione: document.getElementById('revisione').value,
        assicurazione: document.getElementById('assicurazione').value,
        stato: document.getElementById('stato').value,
        gancioTraino: document.getElementById('gancioTraino').checked,
        verricello: document.getElementById('verricello').checked,
        quattroPerQuattro: document.getElementById('quattroPerQuattro').checked,
        moduloAIB: document.getElementById('moduloAIB').checked,
        gps: document.getElementById('gps').checked,
        radioVHF: document.getElementById('radioVHF').checked,
        lampeggianti: document.getElementById('lampeggianti').checked,
        note: document.getElementById('note').value
      };

      if (editId) {
        mezzi = mezzi.map(m => m.id === editId ? dati : m);
      } else {
        mezzi.push(dati);
      }

      localStorage.setItem('mezzi', JSON.stringify(mezzi));
      annullaForm();
      mostraMezzi();
    }

    function modificaMezzo(id) {
      const m = mezzi.find(x => x.id === id);
      if (!m) return;
      
      editId = id;
      document.getElementById('idMezzo').value = m.id;
      document.getElementById('tipo').value = m.tipo;
      document.getElementById('targa').value = m.targa;
      document.getElementById('modello').value = m.modello || '';
      document.getElementById('anno').value = m.anno || '';
      document.getElementById('revisione').value = m.revisione || '';
      document.getElementById('assicurazione').value = m.assicurazione || '';
      document.getElementById('stato').value = m.stato;
      document.getElementById('gancioTraino').checked = m.gancioTraino || false;
      document.getElementById('verricello').checked = m.verricello || false;
      document.getElementById('quattroPerQuattro').checked = m.quattroPerQuattro || false;
      document.getElementById('moduloAIB').checked = m.moduloAIB || false;
      document.getElementById('gps').checked = m.gps || false;
      document.getElementById('radioVHF').checked = m.radioVHF || false;
      document.getElementById('lampeggianti').checked = m.lampeggianti || false;
      document.getElementById('note').value = m.note || '';

      document.getElementById('titoloForm').textContent = 'Modifica Mezzo';
      document.getElementById('formMezzo').classList.remove('hidden');
      window.scrollTo(0, 0);
    }

    function eliminaMezzo(id) {
      if (!confirm('Eliminare questo mezzo?')) return;
      mezzi = mezzi.filter(m => m.id !== id);
      localStorage.setItem('mezzi', JSON.stringify(mezzi));
      mostraMezzi();
    }

    function calcolaStatoScadenza(data) {
      if (!data) return 'N/A';
      const oggi = new Date();
      oggi.setHours(0,0,0,0);
      const scad = new Date(data);
      scad.setHours(0,0,0,0);
      const diff = (scad - oggi) / (1000 * 60 * 60 * 24);
      if (diff < 0) return 'Scaduto';
      if (diff <= 30) return 'In scadenza';
      return 'OK';
    }

    function controllaScadenzeImminenti() {
      let scaduti = 0;
      let inScadenza = 0;
      
      mezzi.forEach(m => {
        if (calcolaStatoScadenza(m.revisione) === 'Scaduto' || calcolaStatoScadenza(m.assicurazione) === 'Scaduto') scaduti++;
        if (calcolaStatoScadenza(m.revisione) === 'In scadenza' || calcolaStatoScadenza(m.assicurazione) === 'In scadenza') inScadenza++;
      });

      const alertDiv = document.getElementById('alertScadenze');
      const testoDiv = document.getElementById('testoAlertScadenze');
      
      if (scaduti > 0 || inScadenza > 0) {
        alertDiv.classList.remove('hidden');
        let msg = [];
        if (scaduti > 0) msg.push(`${scaduti} mezzi con documenti scaduti`);
        if (inScadenza > 0) msg.push(`${inScadenza} in scadenza entro 30 giorni`);
        testoDiv.textContent = msg.join(' • ') + '. Verifica revisione e assicurazione.';
      } else {
        alertDiv.classList.add('hidden');
      }
    }

        function mostraMezzi() {
      mezzi = JSON.parse(localStorage.getItem('mezzi') || '[]');
      const lista = document.getElementById('listaMezzi');

      if (mezzi.length === 0) {
        lista.innerHTML = `<div class="bg-white rounded-lg shadow p-8 text-center text-gray-500">
          <i class="fas fa-truck text-5xl mb-3 text-gray-300"></i>
          <p class="text-lg">Nessun mezzo inserito</p>
        </div>`;
        controllaScadenzeImminenti();
        return;
      }

      lista.innerHTML = mezzi.map(m => {
        const coloreStato = m.stato === 'Operativo' ? 'bg-green-100 text-green-800' :
                           m.stato === 'Manutenzione' ? 'bg-yellow-100 text-yellow-800' :
                           'bg-red-100 text-red-800';

        const statoRev = calcolaStatoScadenza(m.revisione);
        const statoAss = calcolaStatoScadenza(m.assicurazione);
        const colRev = statoRev === 'Scaduto' ? 'text-red-600 font-bold' : statoRev === 'In scadenza' ? 'text-orange-600 font-bold' : 'text-gray-600';
        const colAss = statoAss === 'Scaduto' ? 'text-red-600 font-bold' : statoAss === 'In scadenza' ? 'text-orange-600 font-bold' : 'text-gray-600';

        const dotazioni = [];
        if (m.gancioTraino) dotazioni.push('<i class="fas fa-link text-blue-600" title="Gancio Traino"></i>');
        if (m.verricello) dotazioni.push('<i class="fas fa-cog text-blue-600" title="Verricello"></i>');
        if (m.quattroPerQuattro) dotazioni.push('<span class="font-bold text-xs bg-blue-600 text-white px-1 rounded" title="4x4">4x4</span>');
        if (m.moduloAIB) dotazioni.push('<i class="fas fa-fire text-red-600" title="Modulo AIB"></i>');
        if (m.gps) dotazioni.push('<i class="fas fa-satellite-dish text-blue-600" title="GPS"></i>');
        if (m.radioVHF) dotazioni.push('<i class="fas fa-broadcast-tower text-blue-600" title="Radio VHF"></i>');
        if (m.lampeggianti) dotazioni.push('<i class="fas fa-lightbulb text-yellow-500" title="Lampeggianti"></i>');

        return `
        <div class="bg-white rounded-lg shadow p-4">
          <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-3 mb-3">
            <div class="flex-1">
              <div class="flex items-center gap-2 flex-wrap mb-1">
                <h3 class="font-bold text-lg">${m.tipo} - ${m.targa}</h3>
                <span class="text-xs px-2 py-1 rounded ${coloreStato}">${m.stato}</span>
              </div>
              ${dotazioni.length > 0 ? `<div class="flex gap-2 items-center">${dotazioni.join('')}</div>` : ''}
            </div>
            <div class="flex gap-2">
              <button onclick="modificaMezzo(${m.id})" class="text-blue-600 hover:text-blue-800 bg-blue-50 px-3 py-1 rounded">
                <i class="fas fa-edit"></i> Modifica
              </button>
              <button onclick="eliminaMezzo(${m.id})" class="text-red-600 hover:text-red-800 bg-red-50 px-3 py-1 rounded">
                <i class="fas fa-trash"></i> Elimina
              </button>
            </div>
          </div>
          
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-3 text-sm border-t pt-3">
            <div>
              <p class="text-gray-500 text-xs mb-1">Modello</p>
              <p class="font-semibold"><i class="fas fa-car text-gray-400 mr-1"></i> ${m.modello || '-'} ${m.anno || ''}</p>
            </div>
            <div>
              <p class="text-gray-500 text-xs mb-1">Assicurazione</p>
              <p class="${colAss}"><i class="fas fa-shield-alt mr-1"></i> ${m.assicurazione ? new Date(m.assicurazione).toLocaleDateString('it-IT') : '-'} ${statoAss !== 'OK' ? `(${statoAss})` : ''}</p>
            </div>
            <div>
              <p class="text-gray-500 text-xs mb-1">Revisione</p>
              <p class="${colRev}"><i class="fas fa-wrench mr-1"></i> ${m.revisione ? new Date(m.revisione).toLocaleDateString('it-IT') : '-'} ${statoRev !== 'OK' ? `(${statoRev})` : ''}</p>
            </div>
          </div>
          ${m.note ? `<div class="border-t mt-3 pt-2"><p class="text-xs text-gray-600"><i class="fas fa-sticky-note mr-1"></i> ${m.note}</p></div>` : ''}
        </div>
      `}).join('');
      
      controllaScadenzeImminenti();
    }

      lista.innerHTML = mezzi.map(m => {
        const coloreStato = m.stato === 'Operativo' ? 'bg-green-100 text-green-800' :
                           m.stato === 'Manutenzione' ? 'bg-yellow-100 text-yellow-800' :
                           'bg-red-100 text-red-800';

        const statoRev = calcolaStatoScadenza(m.revisione);
        const statoAss = calcolaStatoScadenza(m.assicurazione);
        const colRev = statoRev === 'Scaduto' ? 'text-red-600' : statoRev === 'In scadenza' ? 'text-orange-600' : 'text-gray-600';
        const colAss = statoAss === 'Scaduto' ? 'text-red-600' : statoAss === 'In scadenza' ? 'text-orange-600' : 'text-gray-600';

        const dotazioni = [];
        if (m.gancioTraino) dotazioni.push('<i class="fas fa-link" title="Gancio Traino"></i>');
        if (m.verricello) dotazioni.push('<i class="fas fa-cog" title="Verricello"></i>');
        if (m.quattroPerQuattro) dotazioni.push('<span class="font-bold text-xs" title="4x4">4x4</span>');
        if (m.moduloAIB) dotazioni.push('<i class="fas fa-fire" title="Modulo AIB"></i>');
        if (m.gps) dotazioni.push('<i class="fas fa-satellite-dish" title="GPS"></i>');
        if (m.radioVHF) dotazioni.push('<i class="fas fa-broadcast-tower" title="Radio VHF"></i>');
        if (m.lampeggianti) dotazioni.push('<i class="fas fa-lightbulb" title="Lampeggianti"></i>');

        return `
        <div class="bg-white rounded-lg shadow p-4">
          <div class="flex justify-between items-start mb-3">
            <div class="flex-1">
              <div class="flex items-center gap-2 mb-1 flex-wrap">
                <h3 class="font-bold text-lg">${m.tipo} - ${m.targa}</h3>
                <span class="text-xs px-2 py-1 rounded ${coloreStato}">${m.stato}</span>
                ${dotazioni.length > 0 ? `<span class="flex gap-2 text-blue-600">${dotazioni.join('')}</span>` : ''}
              </div>
            </div>
            <div class="flex gap-2">
              <button onclick="modificaMezzo(${m.id})" class="text-blue-600 hover:text-blue-800"><i class="fas fa-edit"></i></button>
              <button onclick="eliminaMezzo(${m.id})" class="text-red-600 hover:text-red-800"><i class="fas fa-trash"></i></button>
            </div>
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-2 text-sm">
            <p><i class="fas fa-car text-gray-500"></i> ${m.modello || '-'} ${m.anno || ''}</p>
            <p class="${colAss}"><i class="fas fa-shield-alt"></i> Ass: ${m.assicurazione ? new Date(m.assicurazione).toLocaleDateString('it-IT') : '-'} ${statoAss !== 'OK' ? `<span class="font-bold">(${statoAss})</span>` : ''}</p>
            <p class="${colRev}"><i class="fas fa-wrench"></i> Rev: ${m.revisione ? new Date(m.revisione).toLocaleDateString('it-IT') : '-'} ${statoRev !== 'OK' ? `<span class="font-bold">(${statoRev})</span>` : ''}</p>
          </div>
          ${m.note ? `<p class="text-xs text-gray-600 mt-2"><i class="fas fa-sticky-note"></i> ${m.note}</p>` : ''}
        </div>
      `}).join('');
      
      controllaScadenzeImminenti();
    }

    mostraMezzi();
  </script>
</body>
</html>
