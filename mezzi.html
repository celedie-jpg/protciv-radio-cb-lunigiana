<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mezzi - Radio C.B. Lunigiana</title>
<style>
:root {
  --bg: #F2F2F7; --card: #FFFFFF; --text: #1C1C1E; --text-secondary: #8E8E93;
  --primary: #0A84FF; --green: #30D158; --orange: #FF9F0A; --red: #FF453A;
  --border: #E5E5EA; --shadow: 0 1px 3px rgba(0,0,0,0.06);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 24px; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
h1 { font-size: 28px; font-weight: 700; }
.btn {
  background: var(--primary); color: white; border: none; padding: 12px 20px;
  border-radius: 12px; font-weight: 600; font-size: 14px; cursor: pointer;
}
.btn:hover { opacity: 0.85; }
.btn-secondary { background: var(--bg); color: var(--text); }
.card { background: var(--card); border-radius: 16px; padding: 24px; box-shadow: var(--shadow); }
.mezzi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.mezzo-card {
  padding: 20px; border: 2px solid var(--border); border-radius: 16px;
  transition: all 0.2s;
}
.mezzo-card:hover { border-color: var(--primary); }
.mezzo-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px; }
.mezzo-icon { font-size: 32px; }
.mezzo-nome { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.mezzo-targa { font-size: 13px; color: var(--text-secondary); }
.badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 500; text-transform: uppercase; }
.badge-green { background: rgba(48,209,88,0.1); color: var(--green); }
.badge-orange { background: rgba(255,159,10,0.1); color: var(--orange); }
.badge-red { background: rgba(255,69,58,0.1); color: var(--red); }
.mezzo-info { font-size: 13px; color: var(--text-secondary); margin: 12px 0; }
.mezzo-actions { display: flex; gap: 8px; }
.btn-small { padding: 8px 12px; font-size: 12px; border-radius: 8px; }
.modal {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4); z-index: 1000; align-items: center; justify-content: center;
}
.modal.show { display: flex; }
.modal-content {
  background: var(--card); border-radius: 20px; padding: 32px;
  width: 90%; max-width: 500px;
}
.modal-title { font-size: 20px; font-weight: 700; margin-bottom: 24px; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; }
.form-group input, .form-group select {
  width: 100%; padding: 12px; border: 1px solid var(--border);
  border-radius: 12px; font-size: 14px;
}
.modal-actions { display: flex; gap: 12px; margin-top: 24px; }
.empty { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
</style>
</head>
<body>

<div class="header">
  <h1>Mezzi</h1>
  <button class="btn" onclick="apriModalMezzo()">+ Nuovo Mezzo</button>
</div>

<div class="card">
  <div class="mezzi-grid" id="mezziGrid"></div>
</div>

<!-- Modal Nuovo Mezzo -->
<div class="modal" id="modalMezzo">
  <div class="modal-content">
    <div class="modal-title">Nuovo Mezzo</div>
    <div class="form-group">
      <label>Nome Mezzo *</label>
      <input type="text" id="mezzoNome" placeholder="Es: Pick-up Protezione Civile">
    </div>
    <div class="form-group">
      <label>Targa</label>
      <input type="text" id="mezzoTarga" placeholder="Es: PC001XX">
    </div>
    <div class="form-group">
      <label>Stato</label>
      <select id="mezzoStato">
        <option value="disponibile">Disponibile</option>
        <option value="in_servizio">In Servizio</option>
        <option value="manutenzione">Manutenzione</option>
      </select>
    </div>
    <div class="form-group">
      <label>Note</label>
      <input type="text" id="mezzoNote" placeholder="Note aggiuntive...">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="chiudiModalMezzo()">Annulla</button>
      <button class="btn" onclick="salvaMezzo()">Salva Mezzo</button>
    </div>
  </div>
</div>

<script>
let dbMezzi = JSON.parse(localStorage.getItem('pc_mezzi') || '[]');

function renderMezzi() {
  const grid = document.getElementById('mezziGrid');
  if (dbMezzi.length === 0) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1">Nessun mezzo registrato</div>';
    return;
  }

  grid.innerHTML = dbMezzi.map(m => {
    const statoBadge = m.stato === 'disponibile'? 'badge-green' : 
      m.stato === 'in_servizio'? 'badge-orange' : 'badge-red';
    const statoLabel = m.stato === 'disponibile'? 'Disponibile' : 
      m.stato === 'in_servizio'? 'In Servizio' : 'Manutenzione';

    return `
      <div class="mezzo-card">
        <div class="mezzo-header">
          <div class="mezzo-icon">🚒</div>
          <span class="badge ${statoBadge}">${statoLabel}</span>
        </div>
        <div class="mezzo-nome">${m.nome}</div>
        <div class="mezzo-targa">${m.targa || 'N/D'}</div>
        ${m.note? `<div class="mezzo-info">${m.note}</div>` : ''}
        <div class="mezzo-actions">
          <button class="btn-small btn-secondary" onclick="cambiaStato(${m.id})">Cambia Stato</button>
          <button class="btn-small btn-secondary" onclick="eliminaMezzo(${m.id})">🗑️</button>
        </div>
      </div>
    `;
  }).join('');
}

function apriModalMezzo() {
  document.getElementById('modalMezzo').classList.add('show');
}

function chiudiModalMezzo() {
  document.getElementById('modalMezzo').classList.remove('show');
}

function salvaMezzo() {
  const nome = document.getElementById('mezzoNome').value.trim();
  const targa = document.getElementById('mezzoTarga').value.trim();
  const stato = document.getElementById('mezzoStato').value;
  const note = document.getElementById('mezzoNote').value.trim();

  if (!nome) {
    alert('Inserisci il nome del mezzo');
    return;
  }

  dbMezzi.push({ id: Date.now(), nome, targa, stato, note });
  localStorage.setItem('pc_mezzi', JSON.stringify(dbMezzi));
  chiudiModalMezzo();
  renderMezzi();
}

function cambiaStato(id) {
  const m = dbMezzi.find(mezzo => mezzo.id === id);
  if (!m) return;

  const stati = ['disponibile', 'in_servizio', 'manutenzione'];
  const idx = stati.indexOf(m.stato);
  m.stato = stati[(idx + 1) % stati.length];
  
  localStorage.setItem('pc_mezzi', JSON.stringify(dbMezzi));
  renderMezzi();
}

function eliminaMezzo(id) {
  if (!confirm('Eliminare questo mezzo?')) return;
  dbMezzi = dbMezzi.filter(m => m.id!== id);
  localStorage.setItem('pc_mezzi', JSON.stringify(dbMezzi));
  renderMezzi();
}

renderMezzi();
</script>

</body>
</html>
