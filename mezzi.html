<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mezzi - Radio C.B. Lunigiana</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100">

  <div class="lg:hidden bg-blue-900 text-white p-4 flex justify-between items-center fixed top-0 left-0 right-0 z-50">
    <button onclick="toggleMenu()" class="text-2xl"><i class="fas fa-bars"></i></button>
    <a href="index.html" class="flex items-center gap-2">
      <img src="https://i.imgur.com/8RvEWed.png" alt="Logo" class="w-8 h-8 rounded-full object-cover">
      <span class="font-bold text-sm">Radio C.B. Lunigiana</span>
    </a>
    <a href="login.html" class="text-xl"><i class="fas fa-sign-out-alt"></i></a>
  </div>

  <div id="sidebar" class="fixed left-0 top-0 h-full w-64 bg-blue-900 text-white transform -translate-x-full lg:translate-x-0 transition-transform duration-200 z-40 overflow-y-auto">
    <div class="p-5 border-b border-blue-800 mt-16 lg:mt-0 text-center">
      <a href="index.html">
        <img src="https://i.imgur.com/8RvEWed.png" alt="Logo" class="w-16 h-16 mx-auto mb-2 rounded-full object-cover hover:opacity-80">
        <h2 class="text-xl font-bold hover:text-blue-200">ProtCiv Manager</h2>
      </a>
    </div>
    <nav class="p-4">
      <a href="index.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-home w-5"></i> Dashboard</a>
      <a href="servizi.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-tasks w-5"></i> Servizi</a>
      <a href="volontari.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-users w-5"></i> Volontari</a>
      <a href="corsi.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-graduation-cap w-5"></i> Corsi</a>
      <a href="responsabili.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-user-tie w-5"></i> Responsabili</a>
      <a href="mezzi.html" class="flex items-center gap-3 p-3 rounded bg-blue-800 mb-2"><i class="fas fa-truck w-5"></i> Mezzi</a>
      <a href="attrezzature.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-walkie-talkie w-5"></i> Attrezzature</a>
      <a href="report.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mb-2"><i class="fas fa-file-pdf w-5"></i> Report</a>
      <a href="login.html" class="flex items-center gap-3 p-3 rounded hover:bg-blue-800 mt-8"><i class="fas fa-sign-out-alt w-5"></i> Logout</a>
    </nav>
  </div>

  <div id="overlay" onclick="toggleMenu()" class="hidden fixed inset-0 bg-black bg-opacity-50 z-30 lg:hidden"></div>

  <div class="lg:ml-64 pt-20 lg:pt-8 p-4 lg:p-8">
    <div class="mb-4">
      <a href="index.html" class="inline-flex items-center gap-2 text-blue-600 hover:text-blue-800 font-semibold">
        <i class="fas fa-arrow-left"></i> Torna alla Dashboard
      </a>
    </div>

    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold text-gray-800">Gestione Mezzi</h1>
      <button onclick="toggleForm()" class="bg-green-600 text-white px-4 py-2 rounded-lg font-bold">
        <i class="fas fa-plus"></i> Nuovo Mezzo
      </button>
    </div>

    <div id="formMezzo" class="hidden bg-white rounded-lg shadow p-6 mb-6">
      <h3 class="font-bold text-lg mb-4" id="titoloForm">Nuovo Mezzo</h3>
      <form onsubmit="salvaMezzo(event)">
        <input type="hidden" id="idMezzo">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
          <select id="tipo" required class="border p-2 rounded">
            <option value="">Tipo Mezzo...</option>
            <option value="Fuoristrada">Fuoristrada</option>
            <option value="Pick-up">Pick-up</option>
            <option value="Ambulanza">Ambulanza</option>
            <option value="Furgone">Furgone</option>
            <option value="Autocarro">Autocarro</option>
            <option value="Motopompa">Motopompa</option>
            <option value="Carrello">Carrello</option>
          </select>
          <input type="text" id="targa" placeholder="Targa *" required class="border p-2 rounded">
          <input type="text" id="modello" placeholder="Modello" class="border p-2 rounded">
          <input type="number" id="anno" placeholder="Anno" class="border p-2 rounded">
          <input type="date" id="assicurazione" placeholder="Scadenza Assicurazione" class="border p-2 rounded">
          <input type="date" id="revisione" placeholder="Scadenza Revisione" class="border p-2 rounded">
          <select id="stato" required class="border p-2 rounded">
            <option value="Operativo">Operativo</option>
            <option value="Manutenzione">In Manutenzione</option>
            <option value="Fuori servizio">Fuori Servizio</option>
          </select>
        </div>
        <textarea id="note" placeholder="Note" rows="2" class="border p-2 rounded w-full mt-4"></textarea>
        <div class="flex gap-2 mt-4">
          <button type="submit" class="bg-green-600 text-white px-6 py-2 rounded font-bold">Salva</button>
          <button type="button" onclick="annullaForm()" class="bg-gray-400 text-white px-6 py-2 rounded">Annulla</button>
        </div>
      </form>
    </div>

    <div id="listaMezzi" class="space-y-3"></div>
  </div>

  <script>
    function toggleMenu() {
      document.getElementById('sidebar').classList.toggle('-translate-x-full');
      document.getElementById('overlay').classList.toggle('hidden');
    }

    function toggleForm() {
      const form = document.getElementById('formMezzo');
      form.classList.toggle('hidden');
      if (!form.classList.contains('hidden')) {
        document.getElementById('titoloForm').textContent = 'Nuovo Mezzo';
        document.querySelector('form').reset();
        document.getElementById('idMezzo').value = '';
      }
    }

    function annullaForm() {
      document.getElementById('formMezzo').classList.add('hidden');
      document.querySelector('form').reset();
    }

    function salvaMezzo(e) {
      e.preventDefault();
      const mezzi = JSON.parse(localStorage.getItem('mezzi') || '[]');
      const id = document.getElementById('idMezzo').value;

      const dati = {
        id: id? parseInt(id) : Date.now(),
        tipo: document.getElementById('tipo').value,
        targa: document.getElementById('targa').value,
        modello: document.getElementById('modello').value,
        anno: document.getElementById('anno').value,
        assicurazione: document.getElementById('assicurazione').value,
        revisione: document.getElementById('revisione').value,
        stato: document.getElementById('stato').value,
        note: document.getElementById('note').value
      };

      if (id) {
        const index = mezzi.findIndex(m => m.id === parseInt(id));
        mezzi[index] = dati;
      } else {
        mezzi.push(dati);
      }

      localStorage.setItem('mezzi', JSON.stringify(mezzi));
      annullaForm();
      mostraMezzi();
    }

    function modificaMezzo(id) {
      const mezzi = JSON.parse(localStorage.getItem('mezzi') || '[]');
      const m = mezzi.find(m => m.id === id);

      document.getElementById('idMezzo').value = m.id;
      document.getElementById('tipo').value = m.tipo;
      document.getElementById('targa').value = m.targa;
      document.getElementById('modello').value = m.modello || '';
      document.getElementById('anno').value = m.anno || '';
      document.getElementById('assicurazione').value = m.assicurazione || '';
      document.getElementById('revisione').value = m.revisione || '';
      document.getElementById('stato').value = m.stato;
      document.getElementById('note').value = m.note || '';

      document.getElementById('titoloForm').textContent = 'Modifica Mezzo';
      document.getElementById('formMezzo').classList.remove('hidden');
      window.scrollTo(0, 0);
    }

    function eliminaMezzo(id) {
      if (!confirm('Eliminare questo mezzo?')) return;
      let mezzi = JSON.parse(localStorage.getItem('mezzi') || '[]');
      mezzi = mezzi.filter(m => m.id!== id);
      localStorage.setItem('mezzi', JSON.stringify(mezzi));
      mostraMezzi();
    }

    function mostraMezzi() {
      const mezzi = JSON.parse(localStorage.getItem('mezzi') || '[]');
      const lista = document.getElementById('listaMezzi');

      if (mezzi.length === 0) {
        lista.innerHTML = `<div class="bg-white rounded-lg shadow p-8 text-center text-gray-500">
          <i class="fas fa-truck text-5xl mb-3 text-gray-300"></i>
          <p class="text-lg">Nessun mezzo inserito</p>
        </div>`;
        return;
      }

      lista.innerHTML = mezzi.map(m => {
        const coloreStato = m.stato === 'Operativo'? 'bg-green-100 text-green-800' :
                           m.stato === 'Manutenzione'? 'bg-yellow-100 text-yellow-800' :
                           'bg-red-100 text-red-800';

        return `
        <div class="bg-white rounded-lg shadow p-4">
          <div class="flex justify-between items-start mb-3">
            <div>
              <h3 class="font-bold text-lg">${m.tipo} - ${m.targa}</h3>
              <span class="text-xs px-2 py-1 rounded ${coloreStato}">${m.stato}</span>
            </div>
            <div class="flex gap-2">
              <button onclick="modificaMezzo(${m.id})" class="text-blue-600 hover:text-blue-800"><i class="fas fa-edit"></i></button>
              <button onclick="eliminaMezzo(${m.id})" class="text-red-600 hover:text-red-800"><i class="fas fa-trash"></i></button>
            </div>
          </div>
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-2 text-sm">
            <p><i class="fas fa-car text-gray-500"></i> ${m.modello || '-'} ${m.anno || ''}</p>
            <p><i class="fas fa-shield-alt text-gray-500"></i> Ass: ${m.assicurazione? new Date(m.assicurazione).toLocaleDateString('it-IT') : '-'}</p>
            <p><i class="fas fa-wrench text-gray-500"></i> Rev: ${m.revisione? new Date(m.revisione).toLocaleDateString('it-IT') : '-'}</p>
          </div>
        </div>
      `}).join('');
    }

    mostraMezzi();
  </script>
</body>
</html>
