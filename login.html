<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProtCiv Manager - Radio C.B. Lunigiana</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F2F2F7; --card: #FFFFFF; --text: #1C1C1E; --text-secondary: #8E8E93;
  --primary: #0A84FF; --red: #FF453A; --border: #E5E5EA;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: linear-gradient(135deg, var(--primary), #AF52DE);
  min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
}
.login-card {
  background: var(--card); border-radius: 24px; padding: 40px;
  width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.logo { text-align: center; margin-bottom: 32px; }
.logo-img {
  width: 90px; height: 90px; object-fit: contain; margin-bottom: 16px;
  border-radius: 16px;
}
.logo-text { font-size: 18px; font-weight: 700; margin-bottom: 4px; line-height: 1.3; }
.logo-sub { font-size: 13px; color: var(--text-secondary); }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; }
.form-group input {
  width: 100%; padding: 14px; border: 1px solid var(--border);
  border-radius: 12px; font-size: 14px; font-family: inherit;
}
.form-group input:focus { outline: none; border-color: var(--primary); }
.btn {
  width: 100%; background: var(--primary); color: white; border: none;
  padding: 14px; border-radius: 12px; font-weight: 600;
  font-size: 14px; cursor: pointer; transition: all 0.2s;
}
.btn:hover { opacity: 0.85; }
.error {
  background: rgba(255,69,58,0.1); color: var(--red); padding: 12px;
  border-radius: 12px; font-size: 13px; margin-bottom: 20px; display: none;
}
.error.show { display: block; }
.footer { text-align: center; margin-top: 24px; font-size: 12px; color: var(--text-secondary); }
</style>
</head>
<body>

<div class="login-card">
  <div class="logo">
    <img src="https://i.imgur.com/8RvEWed.png" class="logo-img" alt="Logo Radio C.B. Lunigiana">
    <div class="logo-text">Associazione Radio C.B. Lunigiana - OdV</div>
    <div class="logo-sub">ProtCiv Manager</div>
  </div>

  <div class="error" id="errorMsg"></div>

  <div class="form-group">
    <label>Username</label>
    <input type="text" id="username" placeholder="Inserisci username" autocomplete="username">
  </div>

  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Inserisci password" autocomplete="current-password">
  </div>

  <button class="btn" onclick="login()">Accedi</button>

  <div class="footer">Sistema gestione Protezione Civile v1.0</div>
</div>

<script>
const utenti = [
  { username: 'admin', password: 'admin123', ruolo: 'admin', nome: 'Amministratore', volontarioId: null },
  { username: 'mario.rossi', password: 'volontario123', ruolo: 'volontario', nome: 'Mario Rossi', volontarioId: 1 }
];

if (localStorage.getItem('pc_session')) window.location.href = 'index.html';

function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errorMsg = document.getElementById('errorMsg');
  const user = utenti.find(u => u.username === username && u.password === password);

  if (!user) {
    errorMsg.textContent = 'Username o password errati';
    errorMsg.classList.add('show');
    setTimeout(() => errorMsg.classList.remove('show'), 3000);
    return;
  }

  localStorage.setItem('pc_session', JSON.stringify({
    username: user.username, ruolo: user.ruolo, nome: user.nome, volontarioId: user.volontarioId
  }));

  window.location.href = 'index.html';
}

document.addEventListener('keypress', (e) => { if (e.key === 'Enter') login(); });
</script>

</body>
</html>
