<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Radio C.B. Lunigiana</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-900 to-blue-700 min-h-screen flex items-center justify-center p-4">
  
  <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
    <div class="text-center mb-8">
      <img src="https://i.imgur.com/8RvEWed.png" alt="Logo Radio C.B. Lunigiana" class="w-24 h-24 mx-auto mb-4 rounded-full object-cover border-4 border-blue-100">
      <h1 class="text-2xl font-bold text-gray-800">ProtCiv Manager</h1>
      <p class="text-gray-500 text-sm">Radio C.B. Lunigiana</p>
    </div>

    <form id="loginForm" class="space-y-5">
      <div>
        <input type="text" id="username" required 
          class="w-full px-4 py-3 border border-gray-300 rounded-lg"
          placeholder="Username">
      </div>
      <div>
        <input type="password" id="password" required 
          class="w-full px-4 py-3 border border-gray-300 rounded-lg"
          placeholder="Password">
      </div>
      <button type="submit" 
        class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">
        Accedi
      </button>
    </form>
    <p id="error" class="text-red-600 text-sm text-center mt-4 hidden">Username o password errati</p>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      
      if (user === 'admin' && pass === 'admin123') {
        localStorage.setItem('user', JSON.stringify({username: 'admin'}));
        window.location.href = 'index.html';
      } else {
        document.getElementById('error').classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
