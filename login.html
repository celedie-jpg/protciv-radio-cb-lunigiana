<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ProtCiv Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-blue-900 to-blue-700 min-h-screen flex items-center justify-center p-4">

  <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
    <div class="text-center mb-8">
      <img src="https://i.imgur.com/8RvEWed.png" alt="Logo" class="w-20 h-20 mx-auto mb-4 rounded-full object-cover">
      <h1 class="text-3xl font-bold text-blue-900">ProtCiv Manager</h1>
      <p class="text-gray-600 mt-2">Radio C.B. Lunigiana</p>
    </div>

    <form onsubmit="effettuaLogin(event)">
      <div class="mb-4">
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          <i class="fas fa-user"></i> Username
        </label>
        <input type="text" id="username" required 
               class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-600 focus:outline-none"
               placeholder="Inserisci username">
      </div>

      <div class="mb-6">
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          <i class="fas fa-lock"></i> Password
        </label>
        <input type="password" id="password" required 
               class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-600 focus:outline-none"
               placeholder="Inserisci password">
      </div>

      <button type="submit" 
              class="w-full bg-blue-900 hover:bg-blue-800 text-white font-bold py-3 rounded-lg transition">
        <i class="fas fa-sign-in-alt"></i> Accedi
      </button>
    </form>

    <div id="messaggioErrore" class="hidden mt-4 bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">
      <i class="fas fa-exclamation-triangle"></i> <span id="testoErrore"></span>
    </div>

    <div class="mt-6 text-center text-sm text-gray-500">
      <p>Accesso riservato al personale autorizzato</p>
    </div>
  </div>

<script>
const utenti = [
  {
    username: 'DiegoM',
    password: 'Diegomolli83@',
    nome: 'Diego Molli',
    ruolo: 'Admin'
  }
];

function effettuaLogin(event) {
  event.preventDefault();
  
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const msgErrore = document.getElementById('messaggioErrore');
  const testoErrore = document.getElementById('testoErrore');

  const utente = utenti.find(function(u) { 
    return u.username === username && u.password === password; 
  });

  if (utente) {
    localStorage.setItem('utente_username', utente.username);
    localStorage.setItem('utente_nome', utente.nome);
    localStorage.setItem('utente_ruolo', utente.ruolo);
    localStorage.setItem('utente_login_time', new Date().toISOString());
    window.location.href = 'index.html';
  } else {
    testoErrore.textContent = 'Username o password errati';
    msgErrore.classList.remove('hidden');
    setTimeout(function() {
      msgErrore.classList.add('hidden');
    }, 3000);
  }
}

window.onload = function() {
  if (localStorage.getItem('utente_ruolo')) {
    window.location.href = 'index.html';
  }
};
</script>

</body>
</html>
